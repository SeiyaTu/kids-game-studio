<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎮 Kids Game Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: auto; padding: 20px;
}
h1 {
  color: #fff; font-size: 36px; margin-bottom: 8px;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
  letter-spacing: 3px;
}
.subtitle {
  color: rgba(255,255,255,0.8); font-size: 14px; margin-bottom: 30px;
}
.games-grid {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
  max-width: 600px;
}
.game-card {
  width: 250px; background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  border: 3px solid rgba(255,255,255,0.4);
  border-radius: 24px; padding: 24px 20px;
  text-align: center; cursor: pointer;
  transition: all 0.3s; text-decoration: none; color: #fff;
  display: flex; flex-direction: column; align-items: center;
}
.game-card:hover, .game-card:active {
  transform: scale(1.05); background: rgba(255,255,255,0.35);
  border-color: #fff; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.game-icon { font-size: 64px; margin-bottom: 12px; }
.game-title { font-size: 22px; font-weight: bold; margin-bottom: 6px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.game-desc { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.4; }
.game-badge {
  display: inline-block; margin-top: 10px; padding: 4px 12px;
  background: rgba(255,255,255,0.25); border-radius: 12px;
  font-size: 11px; color: rgba(255,255,255,0.9);
}
.coming-soon { opacity: 0.5; pointer-events: none; }
.coming-soon .game-badge { background: rgba(255,255,255,0.15); }
footer {
  margin-top: 30px; color: rgba(255,255,255,0.5);
  font-size: 12px; text-align: center;
}
</style>
</head>
<body>

<h1>🎮 Kids Game Studio</h1>
<p class="subtitle">选择一个游戏开始玩吧！</p>

<div class="games-grid">
  <a href="airplane-shooter/" class="game-card">
    <div class="game-icon">🛸</div>
    <div class="game-title">飞行大冒险</div>
    <div class="game-desc">驾驶卡通飞机，击败外星怪物和巨型BOSS！20个关卡等你挑战</div>
    <span class="game-badge">✅ 可以玩</span>
  </a>

  <a href="stickman-fighter/" class="game-card">
    <div class="game-icon">🥊</div>
    <div class="game-title">火柴人格斗</div>
    <div class="game-desc">控制火柴人对战AI，拳脚组合、必杀技、多角色解锁！</div>
    <span class="game-badge">✅ 可以玩</span>
  </a>

  <a href="bunny-castle-3d/index.html" class="game-card">
    <div class="game-icon">🐰</div>
    <div class="game-title">🐰 兔兔守城记 3D</div>
    <div class="game-desc">全新3D版！领养可爱兔兔，放置机关保卫城堡！</div>
    <span class="game-badge">✅ 3D新版</span>
  </a>

  <a href="bunny-castle/index.html" class="game-card" style="opacity:0.7">
    <div class="game-icon">🐰</div>
    <div class="game-title">兔兔守城记 经典版</div>
    <div class="game-desc">2D经典版本</div>
    <span class="game-badge">📦 经典</span>
  </a>
</div>

<footer>Made with ❤️ by Kids Game Studio · Powered by Azure Claw</footer>

</body>
</html>
