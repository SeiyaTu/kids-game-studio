<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #87CEEB; overflow: hidden; touch-action: none; font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%;
  padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
  color: #fff; font-size: 18px; font-weight: bold;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
  pointer-events: none; z-index: 10;
}
#ui-center { font-size: 14px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
#combo-display {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-60%);
  font-size: 52px; font-weight: bold; color: #FFD700; text-shadow: 3px 3px #FF8C00;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  pointer-events: none; z-index: 15;
  opacity: 0; transition: opacity 0.15s;
}
#combo-display.active { opacity: 1; }
#combo-display.break { color: #FF6B6B; text-shadow: 3px 3px #CC5555; font-size: 36px; }
#boss-hp-bar {
  position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
  width: 60%; max-width: 300px; height: 12px; background: rgba(255,255,255,0.3); border: 2px solid #FF7043; border-radius: 6px;
  z-index: 15; pointer-events: none; display: none; overflow: hidden;
}
#boss-hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #FF7043, #FFAB91); transition: width 0.2s; border-radius: 4px; }
#boss-name {
  position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
  color: #FF7043; font-size: 14px; font-weight: bold;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  z-index: 15; pointer-events: none; display: none;
}
#sound-toggle {
  position: absolute; top: 10px; right: 60px; z-index: 25;
  background: rgba(255,255,255,0.3); border: 2px solid #fff; color: #fff;
  font-size: 18px; width: 36px; height: 36px; cursor: pointer; border-radius: 18px;

}

  background: #fff; opacity: 0; pointer-events: none; z-index: 12;

  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 11; opacity: 0;
  box-shadow: inset 0 0 60px 20px #FFD700;
  transition: opacity 0.3s;

.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;

<script>
// ============ PIXEL RENDERING ============
const PIXEL_SCALE = 2;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H;
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  W = Math.floor(canvas.width / PIXEL_SCALE);
  H = Math.floor(canvas.height / PIXEL_SCALE);
}
resize(); window.addEventListener('resize', resize);

let offCanvas, offCtx;
function createOffscreen() {
  offCanvas = document.createElement('canvas');
  offCanvas.width = W;
  offCanvas.height = H;
  offCtx = offCanvas.getContext('2d');
  offCtx.imageSmoothingEnabled = false;
}
createOffscreen();
window.addEventListener('resize', createOffscreen);

function pxRect(x, y, w, h, color) {
  offCtx.fillStyle = color;
  offCtx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}
function pxDot(x, y, color) {
  offCtx.fillStyle = color;
  offCtx.fillRect(Math.floor(x), Math.floor(y), 1, 1);
}
// Draw a 2x2 "fat pixel" for bigger sprites
function pxDot2(x, y, color) {
  offCtx.fillStyle = color;
  offCtx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
}

// ============ AUDIO SYSTEM (Web Audio API) ============
let audioCtx = null;
let masterGain = null;
let soundEnabled = true;
let bgmPlaying = false;
let bgmOscillators = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-toggle');
  btn.classList.toggle('muted', !soundEnabled);
  btn.textContent = soundEnabled ? '♫' : '✕';
  if (masterGain) masterGain.gain.value = soundEnabled ? 0.3 : 0;
  if (!soundEnabled) stopBGM();
  else if (game && game.running) startBGM();
}

function playTone(freq, duration, type, vol, detune) {
  if (!audioCtx || !soundEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  if (detune) osc.detune.value = detune;
  gain.gain.value = vol || 0.1;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxShoot() { playTone(800, 0.05, 'square', 0.06); }
function sfxExplosion(big) {
  if (!audioCtx || !soundEnabled) return;
  const dur = big ? 0.4 : 0.2;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = big ? 80 : 120;
  osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + dur);
  gain.gain.value = big ? 0.15 : 0.08;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / data.length * 4);
  const noise = audioCtx.createBufferSource();
  const ng = audioCtx.createGain();
  noise.buffer = buf;
  ng.gain.value = big ? 0.12 : 0.05;
  ng.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  noise.connect(ng); ng.connect(masterGain);
  noise.start(); noise.stop(audioCtx.currentTime + dur);
}
function sfxPickup() { playTone(1200, 0.08, 'sine', 0.1); setTimeout(() => playTone(1600, 0.08, 'sine', 0.1), 80); }
function sfxBossAlarm() {
  for (let i = 0; i < 4; i++) {
    setTimeout(() => { playTone(400, 0.15, 'square', 0.12); }, i * 300);
    setTimeout(() => { playTone(600, 0.15, 'square', 0.12); }, i * 300 + 150);
  }
}
function sfxCombo(count) { playTone(400 + count * 80, 0.1, 'square', 0.08); }
function sfxBossDeath() {
  for (let i = 0; i < 8; i++) setTimeout(() => sfxExplosion(true), i * 100);
}

// BGM
let bgmInterval = null;
function startBGM() {
  if (!audioCtx || !soundEnabled || bgmPlaying) return;
  bgmPlaying = true;
  const notes = [262, 330, 392, 330, 262, 392, 330, 262, 349, 294, 262, 330, 392, 523, 440, 392];
  let idx = 0;
  bgmInterval = setInterval(() => {
    if (!soundEnabled) { stopBGM(); return; }
    playTone(notes[idx % notes.length], 0.12, 'square', 0.03);
    playTone(notes[idx % notes.length] / 2, 0.12, 'triangle', 0.02);
    idx++;
  }, 180);
}
function stopBGM() {
  bgmPlaying = false;
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

// Draw sprite with each pixel as 2x2 for bigger characters
function drawSprite(sprite, cx, cy, flash) {
  const h = sprite.length;
  const w = sprite[0].length;
  const sx = Math.floor(cx - w);
  const sy = Math.floor(cy - h);
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const color = sprite[r][c];
      if (color) pxDot2(sx+c*2, sy+r*2, flash || color);
    }
  }
}

// Sprite dimensions in world units (2x pixel size)
function spriteW(sprite) { return sprite[0].length * 2; }
function spriteH(sprite) { return sprite.length * 2; }

// ============ LEVEL CONFIG (slowed down ~30%) ============
function getLevelConfig(level) {
  const L = Math.min(level, 10);
  return {
    level: L,
    enemyHpMult: 0.6 + L * 0.2,
    enemySpeedMult: (0.5 + L * 0.12) * 0.7,  // 30% slower
    spawnInterval: Math.max(25, 100 - L * 6),  // slower spawning
    extraSpawnChance: Math.min(0.35, Math.max(0, (L - 3) * 0.06)),  // less extra spawns
    enemyShootMult: (0.7 + L * 0.12) * 0.7,   // 30% slower shooting
    enemyBulletSpeed: (2.5 + L * 0.4) / PIXEL_SCALE * 0.7,  // 30% slower bullets
    killsToWin: 10 + L * 5,
    tankMinLevel: 5,
    heliMinLevel: 3,
    bigPlaneMinLevel: 3,
    bossHp: 30 + L * 15,
    bossType: L <= 3 ? 0 : L <= 6 ? 1 : 2,
    theme: LEVEL_THEMES[(L - 1) % 10],
  };
}

class BgCloud {
  constructor(theme) {
    this.theme = theme;
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.w = 20 + Math.random() * 35;
    this.h = 6 + Math.random() * 8;
    this.speed = 0.05 + Math.random() * 0.1;
    this.alpha = 0.08 + Math.random() * 0.1;
  }
  update() { this.y += this.speed; if (this.y > H + 10) { this.y = -this.h; this.x = Math.random() * W; } }
  draw() {
    offCtx.globalAlpha = this.alpha;
    pxRect(this.x, this.y, this.w, this.h, this.theme.cloud || 'rgba(255,255,255,0.15)');
    pxRect(this.x + 3, this.y + 1, this.w - 6, this.h - 2, this.theme.cloud || 'rgba(255,255,255,0.15)');
    offCtx.globalAlpha = 1;
  }
}

// ============ PLAYER ============
class Player {
  constructor() {
    this.w = 18; this.h = 18;  // 2x sprite size
    this.x = W / 2; this.y = H - 40;
    this.shootTimer = 0; this.shootInterval = 14;
    this.bulletLevel = 1;
    this.shield = 0; this.speedBoost = 0; this.invincible = 0;
    this.missileTimer = 0; this.missileInterval = 90;
    this.hasMissile = false; this.missileLevel = 0;
  }
  draw() {
    if (this.invincible > 0 && Math.floor(this.invincible/4) % 2) return;
    const flame = SPRITES.player.map(r => [...r]);
    if (Math.random() > 0.5) { flame[7][4] = '#FFE082'; flame[8][4] = '#FFB74D'; }
    else { flame[7][4] = '#FFAB40'; flame[8][4] = '#FFE082'; }
    drawSprite(flame, this.x, this.y);
    if (this.shield > 0) {
      const blink = Math.floor(Date.now()/200) % 2;
      const c = blink ? '#64FFDA' : '#26A69A';
      const sw = this.w/2 + 4, sh = this.h/2 + 4;
      pxRect(this.x-sw, this.y-sh, sw*2, 2, c);
      pxRect(this.x-sw, this.y+sh-2, sw*2, 2, c);
      pxRect(this.x-sw, this.y-sh, 2, sh*2, c);
      pxRect(this.x+sw-2, this.y-sh, 2, sh*2, c);
    }
  }
  shoot(bullets) {
    this.shootTimer++;
    if (this.invincible > 0) this.invincible--;
    if (this.shield > 0) this.shield--;
    if (this.speedBoost > 0) this.speedBoost--;
    const interval = this.speedBoost > 0 ? Math.floor(this.shootInterval * 0.6) : this.shootInterval;
    if (this.shootTimer < interval) return;
    this.shootTimer = 0;
    sfxShoot();
    const bx = this.x, by = this.y - 8;
    const bspd = -2.8; // 30% slower than original -4
    if (this.bulletLevel >= 1) bullets.push({x:bx, y:by, vx:0, vy:bspd, w:2, h:4});
    if (this.bulletLevel >= 2) {
      bullets.push({x:bx-5, y:by+3, vx:0, vy:bspd, w:2, h:4});
      bullets.push({x:bx+5, y:by+3, vx:0, vy:bspd, w:2, h:4});
    }
    if (this.bulletLevel >= 3) {
      bullets.push({x:bx-3, y:by, vx:-0.5, vy:bspd*0.95, w:2, h:3});
      bullets.push({x:bx+3, y:by, vx:0.5, vy:bspd*0.95, w:2, h:3});
    }
  }
  launchMissile(missiles) {
    if (!this.hasMissile) return;
    this.missileTimer++;
    const interval = this.missileLevel >= 2 ? 60 : this.missileInterval;
    if (this.missileTimer >= interval) {
      this.missileTimer = 0;
      missiles.push(new Missile(this.x - 5, this.y - 6));
      if (this.missileLevel >= 2) missiles.push(new Missile(this.x + 5, this.y - 6));
    }
  }
}

// ============ ENEMY ============
class Enemy {
  constructor(type, cfg, fixedX, fixedY) {
    this.type = type;
    this.x = fixedX !== undefined ? fixedX : 15 + Math.random() * (W - 30);
    this.y = fixedY !== undefined ? fixedY : -15;
    this.wobble = Math.random() * Math.PI * 2;
    this.shootTimer = Math.random() * 60;
    this.hitFlash = 0;
    const hm = cfg.enemyHpMult, sm = cfg.enemySpeedMult, bs = cfg.enemyBulletSpeed;

    switch(type) {
      case 0:
        this.w = 14; this.h = 10;
        this.speed = (0.8 + Math.random() * 0.5) * sm;
        this.hp = Math.ceil(1 * hm); this.maxHp = this.hp;
        this.score = 10;
        this.shootInterval = Math.max(20, Math.floor(100 / cfg.enemyShootMult));
        this.canShoot = cfg.level > 1;
        this.bulletSpeed = bs;
        break;
      case 1:
        this.w = 18; this.h = 14;
        this.speed = (0.3 + Math.random() * 0.2) * sm;
        this.hp = Math.ceil(5 * hm); this.maxHp = this.hp;
        this.score = 50;
        this.shootInterval = Math.max(16, Math.floor(65 / cfg.enemyShootMult));
        this.canShoot = true;
        this.bulletSpeed = bs;
        break;
      case 2:
        this.w = 20; this.h = 14;
        this.speed = (0.2 + Math.random() * 0.1) * sm;
        this.hp = Math.ceil(8 * hm); this.maxHp = this.hp;
        this.score = 80;
        this.shootInterval = Math.max(14, Math.floor(45 / cfg.enemyShootMult));
        this.canShoot = true;
        this.bulletSpeed = bs + 0.2;
        break;
      case 3:
        this.w = 18; this.h = 14;
        this.speed = (0.4 + Math.random() * 0.2) * sm;
        this.hp = Math.ceil(3 * hm); this.maxHp = this.hp;
        this.score = 35;
        this.shootInterval = Math.max(16, Math.floor(75 / cfg.enemyShootMult));
        this.canShoot = true;
        this.bulletSpeed = bs;
        this.moveDir = Math.random() > 0.5 ? 1 : -1;
        break;
    }
  }
  update(enemyBullets, playerX) {
    this.y += this.speed;
    this.wobble += 0.04;
    if (this.hitFlash > 0) this.hitFlash--;
    if (this.type === 0) this.x += Math.sin(this.wobble) * 0.4;
    if (this.type === 3) {
      this.x += this.moveDir * 0.5;
      if (this.x < 12 || this.x > W - 12) this.moveDir *= -1;
    }
    if (this.canShoot) {
      this.shootTimer++;
      if (this.shootTimer >= this.shootInterval) {
        this.shootTimer = 0;
        const dx = playerX - this.x, dy = 100;
        const len = Math.sqrt(dx*dx + dy*dy);
        const spd = this.bulletSpeed;
        if (this.type === 2) {
          enemyBullets.push({x:this.x, y:this.y+this.h/2, vx:0, vy:spd, w:3, h:3});
          enemyBullets.push({x:this.x-3, y:this.y+this.h/2, vx:-0.4, vy:spd, w:2, h:3});
          enemyBullets.push({x:this.x+3, y:this.y+this.h/2, vx:0.4, vy:spd, w:2, h:3});
        } else {
          enemyBullets.push({x:this.x, y:this.y+this.h/2, vx:dx/len*spd, vy:dy/len*spd, w:2, h:3});
        }
      }
    }
  }
  draw() {
    const flash = this.hitFlash > 0 ? '#fff' : null;
    switch(this.type) {
      case 0: drawSprite(SPRITES.enemy_small, this.x, this.y, flash); break;
      case 1: drawSprite(SPRITES.enemy_big, this.x, this.y, flash); break;
      case 2: drawSprite(SPRITES.tank, this.x, this.y, flash); break;
      case 3:
        const heli = SPRITES.heli.map(r => [...r]);
        if (Math.floor(Date.now()/60) % 2) {
          heli[0] = [0,0,0,'#E0E0E0','#AB47BC','#E0E0E0',0,0,0];
        }
        drawSprite(heli, this.x, this.y, flash);
        break;
    }
    if (this.maxHp > 1) {
      const bw = this.w + 4;
      const bx = Math.floor(this.x - bw/2);
      const by = Math.floor(this.y - this.h/2 - 4);
      pxRect(bx, by, bw, 2, 'rgba(0,0,0,0.3)');
      const fillW = Math.max(1, Math.floor(bw * (this.hp/this.maxHp)));
      pxRect(bx, by, fillW, 2, this.hp/this.maxHp > 0.3 ? '#81C784' : '#FF8A65');
    }
  }
}

// ============ BOSS ============
class Boss {
  constructor(type, cfg) {
    this.type = type;
    this.x = W / 2; this.y = -30;
    this.targetY = 35;
    this.w = 30; this.h = 20;  // 2x sprite
    this.maxHp = cfg.bossHp;
    this.hp = this.maxHp;
    this.score = 500 + cfg.level * 100;
    this.phase = 1;
    this.attackTimer = 0;
    this.attackPattern = 0;
    this.moveDir = 1;
    this.moveSpeed = 0.25;  // slower
    this.entered = false;
    this.hitFlash = 0;
    this.summonTimer = 0;
    this.cfg = cfg;
    this.alive = true;
    this.deathTimer = 0;
    this.names = ['🔥 PHOENIX', '🛡️ IRON FORT', '🌀 VOID PHANTOM'];
  }
  get enraged() { return this.hp <= this.maxHp * 0.5; }
  update(enemyBullets, enemies, playerX, playerY) {
    if (!this.alive) return;
    if (this.hitFlash > 0) this.hitFlash--;

    if (!this.entered) {
      this.y += 0.4;
      if (this.y >= this.targetY) { this.y = this.targetY; this.entered = true; }
      return;
    }

    if (this.enraged && this.phase === 1) {
      this.phase = 2;
      this.moveSpeed = 0.4;
      if (game) { game.slowMo = 5; triggerScreenFlash(); }
    }

    const speed = this.enraged ? this.moveSpeed * 1.3 : this.moveSpeed;
    this.x += this.moveDir * speed;
    if (this.x < 20 || this.x > W - 20) this.moveDir *= -1;

    this.attackTimer++;
    const interval = this.enraged ? 45 : 70;  // slower attacks
    if (this.attackTimer >= interval) {
      this.attackTimer = 0;
      this.attackPattern = (this.attackPattern + 1) % 3;
      this.doAttack(enemyBullets, playerX, playerY);
    }

    this.summonTimer++;
    const summonInterval = this.enraged ? 250 : 400;  // less frequent summons
    if (this.summonTimer >= summonInterval) {
      this.summonTimer = 0;
      const type = Math.random() < 0.5 ? 0 : 3;
      enemies.push(new Enemy(type, this.cfg, this.x - 15, this.y + 8));
      enemies.push(new Enemy(type, this.cfg, this.x + 15, this.y + 8));
    }
  }
  doAttack(enemyBullets, px, py) {
    const bs = this.cfg.enemyBulletSpeed * 0.9;  // slower boss bullets
    switch(this.attackPattern) {
      case 0: // Spread shot - fewer bullets
        for (let i = -2; i <= 2; i++) {
          const angle = Math.PI/2 + i * 0.25;
          enemyBullets.push({x:this.x, y:this.y+8, vx:Math.cos(angle)*bs, vy:Math.sin(angle)*bs, w:3, h:3, boss:true});
        }
        if (this.enraged) {
          for (let i = -3; i <= 3; i++) {
            const angle = Math.PI/2 + i * 0.18;
            enemyBullets.push({x:this.x, y:this.y+8, vx:Math.cos(angle)*bs*0.7, vy:Math.sin(angle)*bs*0.7, w:2, h:2, boss:true});
          }
        }
        break;
      case 1: // Tracking shots
        const dx = px - this.x, dy = py - this.y;
        const len = Math.sqrt(dx*dx+dy*dy) || 1;
        enemyBullets.push({x:this.x, y:this.y+8, vx:dx/len*bs, vy:dy/len*bs, w:3, h:3, boss:true});
        if (this.enraged) {
          enemyBullets.push({x:this.x-6, y:this.y+8, vx:dx/len*bs*0.85, vy:dy/len*bs*0.85, w:3, h:3, boss:true});
          enemyBullets.push({x:this.x+6, y:this.y+8, vx:dx/len*bs*0.85, vy:dy/len*bs*0.85, w:3, h:3, boss:true});
        }
        break;
      case 2: // Circle burst - fewer bullets
        const count = this.enraged ? 10 : 7;
        for (let i = 0; i < count; i++) {
          const a = (Math.PI*2/count) * i + this.attackTimer * 0.08;
          enemyBullets.push({x:this.x, y:this.y, vx:Math.cos(a)*bs*0.7, vy:Math.sin(a)*bs*0.7, w:2, h:2, boss:true});
        }
        break;
    }
  }
  draw() {
    if (!this.alive && this.deathTimer <= 0) return;
    const flash = this.hitFlash > 0 ? '#fff' : (this.enraged ? '#FFAB91' : null);
    const spriteKey = ['boss1','boss2','boss3'][this.type];
    let sprite = SPRITES[spriteKey];
    if (this.enraged && !flash && Math.floor(Date.now()/200) % 3 === 0) {
      drawSprite(sprite, this.x, this.y, '#FFAB91');
    } else {
      drawSprite(sprite, this.x, this.y, flash);
    }
  }
  takeDamage(dmg) {
    this.hp -= dmg;
    this.hitFlash = 3;
    if (this.hp <= 0) {
      this.hp = 0;
      this.alive = false;
      return true;
    }
    return false;
  }
}

// ============ FORMATION SYSTEM ============
const FORMATIONS = {
  vShape(cx, count, cfg) {
    const enemies = [];
    const type = getEnemyType(cfg);
    for (let i = 0; i < count; i++) {
      const side = i % 2 === 0 ? -1 : 1;
      const row = Math.floor(i / 2);
      const x = cx + side * (row + 1) * 14;
      const y = -15 - row * 12;
      enemies.push(new Enemy(type, cfg, x, y));
    }
    return enemies;
  },
  line(cx, count, cfg) {
    const enemies = [];
    const type = getEnemyType(cfg);
    const startX = cx - (count - 1) * 10;
    for (let i = 0; i < count; i++) {
      enemies.push(new Enemy(type, cfg, startX + i * 20, -15));
    }
    return enemies;
  },
  circle(cx, count, cfg) {
    const enemies = [];
    const type = getEnemyType(cfg);
    const radius = 22;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i - Math.PI / 2;
      const x = cx + Math.cos(angle) * radius;
      const y = -25 + Math.sin(angle) * radius;
      enemies.push(new Enemy(type, cfg, x, y));
    }
    return enemies;
  }
};

function getEnemyType(cfg) {
  const r = Math.random();
  if (cfg.level < cfg.heliMinLevel && cfg.level < cfg.bigPlaneMinLevel) return 0;
  if (cfg.level < cfg.tankMinLevel) return r < 0.5 ? 0 : r < 0.75 ? 1 : 3;
  return r < 0.3 ? 0 : r < 0.5 ? 1 : r < 0.7 ? 2 : 3;
}

// ============ COMBO SYSTEM ============
class ComboSystem {
  constructor() { this.reset(); }
  reset() {
    this.count = 0;
    this.timer = 0;
    this.maxCombo = 0;
    this.breakTimer = 0;
  }
  registerKill() {
    if (this.count > 0 && this.timer <= 0) {
      this.count = 1;
    } else {
      this.count++;
    }
    this.timer = 120;
    if (this.count > this.maxCombo) this.maxCombo = this.count;
    if (this.count >= 2) sfxCombo(this.count);
  }
  update() {
    if (this.timer > 0) {
      this.timer--;
      if (this.timer <= 0 && this.count >= 3) {
        this.breakTimer = 60;
      }
      if (this.timer <= 0) this.count = 0;
    }
    if (this.breakTimer > 0) this.breakTimer--;
  }
  getMultiplier() { return this.count >= 2 ? this.count : 1; }
  draw() {
    const el = document.getElementById('combo-display');
    const glow = document.getElementById('combo-glow');
    if (this.count >= 2) {
      el.textContent = `⭐x${this.count}`;
      el.className = 'active';
      glow.style.opacity = Math.min(0.3, this.count * 0.05);
      if (this.count >= 5) glow.style.boxShadow = 'inset 0 0 80px 30px #FFB74D';
      else if (this.count >= 3) glow.style.boxShadow = 'inset 0 0 60px 20px #FFD700';
      else glow.style.boxShadow = 'inset 0 0 40px 15px #FFE082';
    } else if (this.breakTimer > 0) {
      el.textContent = 'BREAK!';
      el.className = 'active break';
      glow.style.opacity = 0;
    } else {
      el.className = '';
      glow.style.opacity = 0;
    }
  }
}

// ============ MISSILE ============
class Missile {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 3; this.h = 6;
    this.speed = 1.2; this.maxSpeed = 2.5;
    this.vx = 0; this.vy = -1.2;
    this.turnRate = 0.12; this.life = 180; this.damage = 3;
    this.trail = [];
  }
  findTarget(enemies, boss) {
    let closest = null, minDist = Infinity;
    const targets = boss && boss.alive ? [...enemies, boss] : enemies;
    for (const e of targets) {
      const dx = e.x-this.x, dy = e.y-this.y, dist = dx*dx+dy*dy;
      if (dist < minDist) { minDist = dist; closest = e; }
    }
    return closest;
  }
  update(enemies, boss) {
    this.life--;
    this.trail.push({x:this.x, y:this.y, life:8});
    this.trail = this.trail.filter(t => { t.life--; return t.life > 0; });
    const target = this.findTarget(enemies, boss);
    if (target) {
      const dx = target.x-this.x, dy = target.y-this.y, dist = Math.sqrt(dx*dx+dy*dy);
      this.vx += (dx/dist*this.maxSpeed - this.vx) * this.turnRate;
      this.vy += (dy/dist*this.maxSpeed - this.vy) * this.turnRate;
    }
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if (spd > this.maxSpeed) { this.vx=this.vx/spd*this.maxSpeed; this.vy=this.vy/spd*this.maxSpeed; }
    if (spd < this.speed) { if(spd>0){this.vx=this.vx/spd*this.speed; this.vy=this.vy/spd*this.speed;} }
    this.x += this.vx; this.y += this.vy;
  }
  draw() {
    this.trail.forEach(t => { if(t.life>4) pxDot(t.x,t.y,'#FFB74D'); else pxDot(t.x,t.y,'#FFCC80'); });
    pxRect(this.x-1, this.y-3, 3, 6, '#fff');
    pxDot2(this.x-1, this.y-4, '#FF7043');
    if (Math.random()>0.5) pxDot(this.x, this.y+3, '#FFE082');
    else pxDot(this.x, this.y+3, '#FFB74D');
  }
}

// ============ POWERUP ============
class PowerUp {
  constructor(x, y) {
    const r = Math.random();
    if (r < 0.25) this.type = 0;
    else if (r < 0.4) this.type = 1;
    else if (r < 0.55) this.type = 2;
    else if (r < 0.7) this.type = 3;
    else if (r < 0.82) this.type = 4;
    else this.type = 5;
    this.x = x; this.y = y; this.w = 8; this.h = 8;  // bigger
    this.speed = 0.5; this.age = 0;
    this.labels = ['W+','T+','🛡️','❤️','⚡','🚀'];
    this.colors = ['#FFD700','#FF9800','#64FFDA','#FF80AB','#69F0AE','#FF7043'];
  }
  update() { this.y += this.speed; this.age++; }
  draw() {
    const blink = Math.floor(this.age/10) % 2;
    const c = blink ? this.colors[this.type] : '#fff';
    // Bigger powerup box
    pxRect(this.x-4, this.y-4, 8, 8, 'rgba(0,0,0,0.2)');
    pxRect(this.x-4, this.y-4, 8, 2, c);
    pxRect(this.x-4, this.y+2, 8, 2, c);
    pxRect(this.x-4, this.y-4, 2, 8, c);
    pxRect(this.x+2, this.y-4, 2, 8, c);
    pxDot2(this.x-1, this.y-1, c);
  }
  apply(player) {
    sfxPickup();
    switch(this.type) {
      case 0: player.bulletLevel = Math.max(player.bulletLevel,2); break;
      case 1: player.bulletLevel = 3; break;
      case 2: player.shield = 300; break;
      case 3: return 'life';
      case 4: player.speedBoost = 360; break;
      case 5: player.hasMissile = true; player.missileLevel = Math.min(player.missileLevel+1,2); break;
    }
    return this.labels[this.type];
  }
}

// ============ EXPLOSION (colorful particles!) ============
class Explosion {
  constructor(x, y, color='#FFB74D', big=false) {
    this.particles = [];
    const count = big ? 14 : 8;
    const colors = ['#FFE082','#FFB74D','#FF7043','#64FFDA','#CE93D8','#81C784','#64D2FF','#FF80AB'];
    for (let i = 0; i < count; i++) {
      const angle = Math.random()*Math.PI*2, speed = (big?1:0.5)+Math.random()*(big?2:1.5);
      this.particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:12+Math.random()*8,color:colors[Math.floor(Math.random()*colors.length)]});
    }
  }
  update() { this.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.95;p.vy*=0.95;}); this.particles=this.particles.filter(p=>p.life>0); }
  draw() {
    this.particles.forEach(p=>{
      const c = p.life > 10 ? '#fff' : p.life > 5 ? p.color : '#FFCC80';
      pxDot2(p.x, p.y, c);
    });
  }
  get done() { return this.particles.length === 0; }
}

class MegaExplosion {
  constructor(x, y) {
    this.particles = [];
    const colors = ['#fff','#FFE082','#FFB74D','#FF80AB','#CE93D8','#64FFDA','#81C784','#64D2FF'];
    for (let layer = 0; layer < 4; layer++) {
      const count = 15 + layer * 5;
      const delay = layer * 4;
      for (let i = 0; i < count; i++) {
        const angle = Math.random()*Math.PI*2;
        const speed = (1 + layer * 0.5) + Math.random() * 2;
        this.particles.push({
          x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
          life: 15 + Math.random()*10 + delay,
          delay,
          color: colors[Math.floor(Math.random()*colors.length)]
        });
      }
    }
  }
  update() {
    this.particles.forEach(p => {
      if (p.delay > 0) { p.delay--; return; }
      p.x += p.vx; p.y += p.vy; p.life--; p.vx *= 0.96; p.vy *= 0.96;
    });
    this.particles = this.particles.filter(p => p.life > 0 || p.delay > 0);
  }
  draw() {
    this.particles.forEach(p => {
      if (p.delay > 0) return;
      const c = p.life > 12 ? '#fff' : p.life > 6 ? p.color : '#FFCC80';
      pxDot2(p.x, p.y, c);
      if (p.life > 10) pxDot2(p.x+2, p.y, c);
    });
  }
  get done() { return this.particles.length === 0; }
}

// ============ SCREEN EFFECTS ============
function triggerScreenFlash() {
  const el = document.getElementById('screen-flash');
  el.style.opacity = '0.4';
  setTimeout(() => el.style.opacity = '0', 80);
}

// ============ HEARTS DISPLAY ============
function updateHeartsDisplay(lives) {
  const el = document.getElementById('lives-display');
  let hearts = '';
  for (let i = 0; i < Math.min(lives, 10); i++) hearts += '❤️';
  el.textContent = hearts || '💔';
}

// ============ GAME STATE ============
let game = null;
let targetX = null, targetY = null;

canvas.addEventListener('mousemove', e => { if(game&&game.running){targetX=e.clientX/PIXEL_SCALE;targetY=e.clientY/PIXEL_SCALE;} });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(game&&game.running){targetX=e.touches[0].clientX/PIXEL_SCALE;targetY=e.touches[0].clientY/PIXEL_SCALE;} }, {passive:false});
canvas.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); if(game&&game.running){targetX=e.touches[0].clientX/PIXEL_SCALE;targetY=e.touches[0].clientY/PIXEL_SCALE;} }, {passive:false});
canvas.addEventListener('mousedown', () => initAudio());

function collides(a, b) { return Math.abs(a.x-b.x)<(a.w+b.w)/2 && Math.abs(a.y-b.y)<(a.h+b.h)/2; }

// ============ PIXEL TEXT ============
function drawPixelText(text, x, y, color, size) {
  offCtx.fillStyle = color;
  offCtx.font = 'bold ' + (size || 7) + 'px Arial, sans-serif';
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';
  // soft shadow
  offCtx.fillStyle = 'rgba(0,0,0,0.3)';
  offCtx.fillText(text, Math.floor(x)+1, Math.floor(y)+1);
  offCtx.fillStyle = color;
  offCtx.fillText(text, Math.floor(x), Math.floor(y));
}

// ============ DRAW GRADIENT BACKGROUND ============
function drawGradientBg(theme) {
  const grd = offCtx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, theme.bg1);
  grd.addColorStop(1, theme.bg2);
  offCtx.fillStyle = grd;
  offCtx.fillRect(0, 0, W, H);
}

// ============ LEVEL SELECT ============
function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    const cleared = clearedLevels.includes(i);
    const locked = i > maxUnlocked;
    btn.className = 'level-btn' + (locked ? ' locked' : '') + (cleared ? ' cleared' : '');
    btn.innerHTML = locked ? '🔒' : `${i}<span>${cleared ? '⭐' : '·'}</span>`;
    if (!locked) btn.onclick = () => playLevel(i);
    grid.appendChild(btn);
  }
  const hint = document.getElementById('level-hint');
  if (maxUnlocked <= 10) hint.textContent = `已解锁: ${maxUnlocked}/10`;
  else hint.textContent = '🎉 全部通关! 🎉';
}

function showLevelSelect() {
  hideAllScreens();
  stopBGM();
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('ui').classList.add('hidden');
  document.getElementById('boss-hp-bar').style.display = 'none';
  document.getElementById('boss-name').style.display = 'none';
  document.getElementById('combo-display').className = '';
  document.getElementById('combo-glow').style.opacity = 0;
  buildLevelGrid();
}

function hideAllScreens() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('level-clear').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
}

function playLevel(level) {
  initAudio();
  currentLevel = level;
  hideAllScreens();
  document.getElementById('ui').classList.remove('hidden');
  document.getElementById('boss-hp-bar').style.display = 'none';
  document.getElementById('boss-name').style.display = 'none';
  targetX = null; targetY = null;
  const cfg = getLevelConfig(level);
  game = {
    player: new Player(), bullets: [], enemyBullets: [], enemies: [], missiles: [],
    explosions: [], powerups: [], stars: Array.from({length:40}, () => new Star(cfg.theme)),
    bgClouds: Array.from({length:6}, () => new BgCloud(cfg.theme)),
    score: 0, lives: 8, frame: 0,
    spawnTimer: 0, cfg: cfg,
    killCount: 0, running: true,
    powerupMsg: '', powerupMsgTimer: 0,
    levelAnnounce: 120,
    screenShake: 0, shakeX: 0, shakeY: 0,
    combo: new ComboSystem(),
    boss: null, bossSpawned: false, bossDefeated: false,
    formationTimer: 0, formationWave: 0,
    slowMo: 0, slowMoAccum: 0,
  };
  updateHeartsDisplay(game.lives);
  startBGM();
  loop();
}

function playNextLevel() {
  if (currentLevel < 10) playLevel(currentLevel + 1);
  else showLevelSelect();
}

function levelCleared() {
  game.running = false;
  stopBGM();
  if (!clearedLevels.includes(currentLevel)) clearedLevels.push(currentLevel);
  if (currentLevel >= maxUnlocked && currentLevel < 10) maxUnlocked = currentLevel + 1;
  saveProgress();
  document.getElementById('clear-level').textContent = currentLevel;
  document.getElementById('clear-score').textContent = game.score;
  document.getElementById('level-clear').classList.remove('hidden');
  document.getElementById('boss-hp-bar').style.display = 'none';
  document.getElementById('boss-name').style.display = 'none';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.toggle('locked', currentLevel >= 10);
  nextBtn.textContent = currentLevel >= 10 ? '🎉 全部通关!' : '下一关 >>';
}

function gameOver() {
  game.running = false;
  stopBGM();
  document.getElementById('fail-level').textContent = currentLevel;
  document.getElementById('final-score').textContent = game.score;
  document.getElementById('gameover-screen').classList.remove('hidden');
  document.getElementById('boss-hp-bar').style.display = 'none';
  document.getElementById('boss-name').style.display = 'none';
}

// ============ SPAWN ============
function spawnEnemy() {
  const cfg = game.cfg;
  const type = getEnemyType(cfg);
  game.enemies.push(new Enemy(type, cfg));
}

function spawnFormation() {
  const g = game;
  const cfg = g.cfg;
  const types = [FORMATIONS.vShape, FORMATIONS.line, FORMATIONS.circle];
  const fn = types[g.formationWave % 3];
  const count = 3 + Math.floor(cfg.level / 3);
  const cx = 30 + Math.random() * (W - 60);
  const enemies = fn(cx, count, cfg);
  enemies.forEach(e => g.enemies.push(e));
  g.formationWave++;
}

// ============ MAIN LOOP ============
function loop() {
  if (!game || !game.running) return;
  const g = game;

  // Slow motion
  if (g.slowMo > 0) {
    g.slowMoAccum += 0.3;
    g.slowMo--;
    if (g.slowMoAccum < 1) { requestAnimationFrame(loop); return; }
    g.slowMoAccum -= 1;
  }

  const theme = g.cfg.theme;

  // Clear with gradient background
  drawGradientBg(theme);

  // Background clouds
  g.bgClouds.forEach(c => { c.update(); c.draw(); });

  // Stars (decorative sparkles)
  g.stars.forEach(s => { s.update(); s.draw(); });

  // Screen shake
  if (g.screenShake > 0) {
    g.screenShake--;
    g.shakeX = (Math.random()-0.5) * 3;
    g.shakeY = (Math.random()-0.5) * 3;
  } else { g.shakeX = 0; g.shakeY = 0; }

  // Level announcement
  if (g.levelAnnounce > 0) {
    g.levelAnnounce--;
    if (g.levelAnnounce > 30 || Math.floor(g.levelAnnounce/4)%2) {
      drawPixelText(`STAGE ${g.cfg.level}`, W/2, H/2-10, '#fff', 9);
      drawPixelText(`消灭 ${g.cfg.killsToWin} 个 + BOSS`, W/2, H/2+4, 'rgba(255,255,255,0.7)', 6);
    }
  }

  // Player movement
  const moveSpeed = g.player.speedBoost > 0 ? 0.2 : 0.15;
  if (targetX !== null) {
    g.player.x += (targetX - g.player.x) * moveSpeed;
    g.player.y += (targetY - g.player.y) * moveSpeed;
  }
  g.player.x = Math.max(10, Math.min(W-10, g.player.x));
  g.player.y = Math.max(10, Math.min(H-10, g.player.y));

  g.player.shoot(g.bullets);
  g.player.launchMissile(g.missiles);

  // Update bullets
  g.bullets = g.bullets.filter(b => { b.x+=b.vx; b.y+=b.vy; return b.y>-5&&b.x>-5&&b.x<W+5; });
  g.enemyBullets = g.enemyBullets.filter(b => { b.x+=b.vx; b.y+=b.vy; return b.y<H+5&&b.y>-5&&b.x>-5&&b.x<W+5; });

  // Spawn enemies (before boss)
  g.frame++;
  if (!g.bossSpawned) {
    g.spawnTimer++;
    if (g.spawnTimer >= g.cfg.spawnInterval) { g.spawnTimer = 0; spawnEnemy(); }
    if (g.frame % 150 === 0 && Math.random() < g.cfg.extraSpawnChance) spawnEnemy();

    // Formation spawning (less frequent)
    g.formationTimer++;
    const formInterval = Math.max(280, 500 - g.cfg.level * 20);
    if (g.formationTimer >= formInterval) {
      g.formationTimer = 0;
      spawnFormation();
    }

    // Check if it's boss time
    if (g.killCount >= g.cfg.killsToWin && !g.bossSpawned) {
      g.bossSpawned = true;
      g.boss = new Boss(g.cfg.bossType, g.cfg);
      sfxBossAlarm();
      document.getElementById('boss-name').style.display = 'block';
      document.getElementById('boss-name').textContent = g.boss.names[g.boss.type];
      document.getElementById('boss-hp-bar').style.display = 'block';
    }
  }

  // Update enemies
  g.enemies.forEach(e => e.update(g.enemyBullets, g.player.x));

  // Update boss
  if (g.boss && g.boss.alive) {
    g.boss.update(g.enemyBullets, g.enemies, g.player.x, g.player.y);
    const fill = document.getElementById('boss-hp-fill');
    fill.style.width = (g.boss.hp / g.boss.maxHp * 100) + '%';
    fill.style.background = g.boss.enraged ? 'linear-gradient(90deg, #FF7043, #FF5722)' : 'linear-gradient(90deg, #FF7043, #FFAB91)';
  }

  // Update missiles
  g.missiles = g.missiles.filter(m => {
    m.update(g.enemies, g.boss);
    if (m.life<=0||m.x<-20||m.x>W+20||m.y<-20||m.y>H+20) return false;

    if (g.boss && g.boss.alive && g.boss.entered) {
      if (Math.abs(m.x-g.boss.x)<(g.boss.w+m.w)/2 && Math.abs(m.y-g.boss.y)<(g.boss.h+m.h)/2) {
        g.explosions.push(new Explosion(m.x, m.y, '#FFB74D', true));
        g.screenShake = 4;
        if (g.boss.takeDamage(m.damage)) handleBossDeath();
        return false;
      }
    }

    for (let i = g.enemies.length-1; i >= 0; i--) {
      const e = g.enemies[i];
      if (Math.abs(m.x-e.x)<(e.w+m.w)/2 && Math.abs(m.y-e.y)<(e.h+m.h)/2) {
        e.hp -= m.damage; e.hitFlash = 3;
        g.explosions.push(new Explosion(m.x, m.y, '#FFB74D', true));
        g.screenShake = 4;
        if (e.hp <= 0) {
          handleEnemyKill(e, i);
        }
        return false;
      }
    }
    return true;
  });

  // Player bullets hit enemies & boss
  g.bullets = g.bullets.filter(b => {
    if (g.boss && g.boss.alive && g.boss.entered) {
      if (Math.abs(b.x-g.boss.x)<(g.boss.w+b.w)/2 && Math.abs(b.y-g.boss.y)<(g.boss.h+b.h)/2) {
        if (g.boss.takeDamage(1)) handleBossDeath();
        else g.explosions.push(new Explosion(b.x, b.y, '#FFE082'));
        return false;
      }
    }

    for (let i = g.enemies.length-1; i >= 0; i--) {
      const e = g.enemies[i];
      if (collides({x:b.x,y:b.y,w:b.w,h:b.h}, e)) {
        e.hp--; e.hitFlash = 3;
        if (e.hp <= 0) {
          handleEnemyKill(e, i);
        } else { g.explosions.push(new Explosion(b.x,b.y,'#FFE082')); }
        return false;
      }
    }
    return true;
  });

  // Combo update
  g.combo.update();
  g.combo.draw();

  // Enemy bullets hit player
  if (g.player.invincible <= 0) {
    g.enemyBullets = g.enemyBullets.filter(b => {
      if (collides({x:b.x,y:b.y,w:b.w,h:b.h}, g.player)) {
        if (g.player.shield > 0) { g.player.shield = Math.max(0,g.player.shield-60); g.explosions.push(new Explosion(b.x,b.y,'#64FFDA')); }
        else { g.lives--; updateHeartsDisplay(g.lives); g.player.invincible=90; g.explosions.push(new Explosion(g.player.x,g.player.y,'#64D2FF')); g.screenShake=5;
          if(g.lives<=0) gameOver(); }
        return false;
      }
      return true;
    });
  }

  // Player body collision with enemies
  if (g.player.invincible <= 0) {
    g.enemies = g.enemies.filter(e => {
      if (e.y > H+15) return false;
      if (collides(g.player, e)) {
        if (g.player.shield > 0) { g.player.shield=0; e.hp-=2; g.explosions.push(new Explosion(e.x,e.y,'#64FFDA'));
          if(e.hp<=0){ handleEnemyKill(e, -1); return false;} return true; }
        g.lives--; updateHeartsDisplay(g.lives); g.player.invincible=90; g.explosions.push(new Explosion(e.x,e.y,'#FF80AB',true)); g.screenShake=6;
        if(g.lives<=0) gameOver();
        return false;
      }
      return true;
    });
  } else { g.enemies = g.enemies.filter(e => e.y <= H+15); }

  // Powerups
  g.powerups.forEach(p => p.update());
  g.powerups = g.powerups.filter(p => {
    if (p.y > H+10) return false;
    if (collides(g.player, p)) {
      const result = p.apply(g.player);
      if (result === 'life') { g.lives = Math.min(g.lives+1, 10); updateHeartsDisplay(g.lives); }
      g.powerupMsg = typeof result==='string' && result!=='life' ? result : '❤️+1';
      g.powerupMsgTimer = 60;
      return false;
    }
    return true;
  });

  // ====== DRAW ======
  // Enemy bullets (orange, not red)
  g.enemyBullets.forEach(b => {
    const c = b.boss ? '#FF9800' : '#FFAB40';
    pxRect(b.x-1, b.y-1, b.w, b.h, c);
  });
  // Player bullets (soft cyan/blue)
  g.bullets.forEach(b => pxRect(b.x-1, b.y-1, b.w, b.h, '#64D2FF'));
  g.enemies.forEach(e => e.draw());
  if (g.boss) g.boss.draw();
  g.missiles.forEach(m => m.draw());
  g.powerups.forEach(p => p.draw());
  g.player.draw();
  g.explosions.forEach(e => { e.update(); e.draw(); });
  g.explosions = g.explosions.filter(e => !e.done);

  // Powerup message
  if (g.powerupMsgTimer > 0) {
    g.powerupMsgTimer--;
    if (Math.floor(g.powerupMsgTimer/3) % 2)
      drawPixelText(g.powerupMsg, W/2, H/2-20, '#FFD700', 8);
  }

  // Progress bar (kills until boss)
  if (!g.bossSpawned) {
    const progress = g.killCount / g.cfg.killsToWin;
    const barW = 40, barX = Math.floor(W/2-barW/2), barY = 14;
    pxRect(barX, barY, barW, 3, 'rgba(0,0,0,0.2)');
    pxRect(barX, barY, Math.max(1, Math.floor(barW * Math.min(1, progress))), 3, '#81C784');
  }

  // BOSS WARNING text
  if (g.bossSpawned && g.boss && !g.boss.entered) {
    if (Math.floor(g.frame/10) % 2)
      drawPixelText('⚠️ WARNING ⚠️', W/2, H/2, '#FF7043', 8);
  }

  // UI
  document.getElementById('score').textContent = g.score;
  const pd = document.getElementById('ui-center');
  const parts = [`LV${g.cfg.level}`];
  if (g.player.bulletLevel>=2) parts.push('W');
  if (g.player.bulletLevel>=3) parts.push('T');
  if (g.player.shield>0) parts.push('🛡️');
  if (g.player.speedBoost>0) parts.push('⚡');
  if (g.player.hasMissile) parts.push('🚀');
  pd.textContent = parts.join(' ');

  // Render to main canvas (NO scanlines!)
  ctx.imageSmoothingEnabled = false;
  const sx = Math.floor(g.shakeX * PIXEL_SCALE);
  const sy = Math.floor(g.shakeY * PIXEL_SCALE);
  ctx.fillStyle = theme.bg2 || '#E1F5FE';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(offCanvas, sx, sy, W, H, 0, 0, canvas.width, canvas.height);
  // No scanlines - removed for kid-friendly experience

  requestAnimationFrame(loop);
}

// ============ KILL HANDLERS ============
function handleEnemyKill(e, idx) {
  const g = game;
  g.combo.registerKill();
  const mult = g.combo.getMultiplier();
  g.score += e.score * mult;
  g.killCount++;
  const isBig = e.type >= 1;
  // Colorful explosions
  g.explosions.push(new Explosion(e.x, e.y, '#FFB74D', isBig));
  sfxExplosion(isBig);
  g.screenShake = isBig ? 4 : 1;
  if (isBig) g.slowMo = 3;
  if (Math.random() < (isBig ? 0.25 : 0.12)) g.powerups.push(new PowerUp(e.x, e.y));
  if (idx >= 0) g.enemies.splice(idx, 1);
}

function handleBossDeath() {
  const g = game;
  g.combo.registerKill();
  const mult = g.combo.getMultiplier();
  g.score += g.boss.score * mult;
  g.boss.alive = false;
  g.bossDefeated = true;
  g.explosions.push(new MegaExplosion(g.boss.x, g.boss.y));
  g.screenShake = 15;
  g.slowMo = 8;
  triggerScreenFlash();
  sfxBossDeath();
  g.enemyBullets = [];
  setTimeout(() => { if (game === g) levelCleared(); }, 1500);
}

// Init
buildLevelGrid();
</script>
