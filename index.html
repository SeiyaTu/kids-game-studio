<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✈️ 像素飞机大作战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%;
  padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
  color: #fff; font-size: 16px; font-weight: bold;
  font-family: 'Courier New', monospace;
  pointer-events: none; z-index: 10;
}
#ui-center { font-size: 13px; color: #ff0; }
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; z-index: 20; background: rgba(0,0,0,0.92);
  font-family: 'Courier New', monospace;
}
.overlay h1 { font-size: 32px; margin-bottom: 10px; color: #0f0; text-shadow: 2px 2px #030; letter-spacing: 3px; }
.overlay p { font-size: 14px; color: #8f8; margin-bottom: 15px; }
.overlay .score { font-size: 22px; margin-bottom: 20px; color: #0ff; }
.btn {
  padding: 12px 32px; font-size: 16px; border: 3px solid #0f0;
  background: #020; color: #0f0; font-family: 'Courier New', monospace;
  cursor: pointer; transition: all 0.2s; margin: 5px; letter-spacing: 1px;
}
.btn:hover, .btn:active { background: #0f0; color: #000; }
.btn.locked { border-color: #333; color: #333; pointer-events: none; background: #111; }
.hidden { display: none !important; }
.level-grid { display: flex; flex-wrap: wrap; justify-content: center; max-width: 340px; gap: 8px; margin: 15px 0; }
.level-btn {
  width: 56px; height: 56px; border: 3px solid #0f0; background: #020;
  color: #0f0; font-size: 20px; font-weight: bold; font-family: 'Courier New', monospace;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.level-btn span { font-size: 10px; margin-top: 2px; }
.level-btn:hover { background: #040; }
.level-btn.locked { border-color: #222; color: #333; background: #111; cursor: not-allowed; }
.level-btn.cleared { border-color: #ff0; color: #ff0; background: #220; }
.level-btn.cleared span { color: #ff0; }
</style>
</head>
<body>

<div id="start-screen" class="overlay">
  <h1>[ 像素飞机大作战 ]</h1>
  <p>== PIXEL SHOOTER ==</p>
  <p style="font-size:12px;color:#484;">触屏拖动 / 鼠标控制 · 自动射击 · 导弹追踪</p>
  <div class="level-grid" id="level-grid"></div>
  <p id="level-hint" style="font-size:12px;color:#484;margin-top:5px;"></p>
</div>

<div id="level-clear" class="overlay hidden">
  <h1>[ STAGE CLEAR ]</h1>
  <div class="score">第 <span id="clear-level">1</span> 关 · 得分：<span id="clear-score">0</span></div>
  <div style="display:flex;gap:10px;">
    <button class="btn" onclick="showLevelSelect()">选关</button>
    <button class="btn" id="next-btn" onclick="playNextLevel()">下一关 >></button>
  </div>
</div>

<div id="gameover-screen" class="overlay hidden">
  <h1>[ GAME OVER ]</h1>
  <div class="score">第 <span id="fail-level">1</span> 关 · 得分：<span id="final-score">0</span></div>
  <div style="display:flex;gap:10px;">
    <button class="btn" onclick="showLevelSelect()">选关</button>
    <button class="btn" onclick="playLevel(currentLevel)">重试</button>
  </div>
</div>

<div id="ui" class="hidden">
  <div>HP:<span id="lives">4</span></div>
  <div id="ui-center"></div>
  <div>SC:<span id="score">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
// ============ PIXEL RENDERING ============
// We render at low resolution and scale up for pixel-art look
const PIXEL_SCALE = 3;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H; // logical (low-res) dimensions
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  W = Math.floor(canvas.width / PIXEL_SCALE);
  H = Math.floor(canvas.height / PIXEL_SCALE);
}
resize(); window.addEventListener('resize', resize);

// Offscreen low-res canvas for pixel rendering
let offCanvas, offCtx;
function createOffscreen() {
  offCanvas = document.createElement('canvas');
  offCanvas.width = W;
  offCanvas.height = H;
  offCtx = offCanvas.getContext('2d');
  offCtx.imageSmoothingEnabled = false;
}
createOffscreen();
window.addEventListener('resize', createOffscreen);

// Pixel drawing helpers
function pxRect(x, y, w, h, color) {
  offCtx.fillStyle = color;
  offCtx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}
function pxDot(x, y, color) {
  offCtx.fillStyle = color;
  offCtx.fillRect(Math.floor(x), Math.floor(y), 1, 1);
}

// ============ PIXEL SPRITE DATA ============
// Sprites are defined as 2D arrays of hex colors (0 = transparent)
const SPRITES = {
  player: [
    [0,0,0,0,'#4cf',0,0,0,0],
    [0,0,0,'#4cf','#fff','#4cf',0,0,0],
    [0,0,'#4cf','#4cf','#fff','#4cf','#4cf',0,0],
    [0,'#08f','#4cf','#4cf','#4cf','#4cf','#4cf','#08f',0],
    ['#08f','#08f','#08f','#4cf','#4cf','#4cf','#08f','#08f','#08f'],
    [0,'#08f',0,'#4cf','#4cf','#4cf',0,'#08f',0],
    [0,0,0,'#06a','#4cf','#06a',0,0,0],
    [0,0,0,0,'#f80',0,0,0,0],
    [0,0,0,0,'#ff0',0,0,0,0],
  ],
  enemy_small: [
    [0,0,'#f44','#f44','#f44',0,0],
    [0,'#f44','#c22','#f44','#c22','#f44',0],
    ['#f44','#f44','#f44','#c22','#f44','#f44','#f44'],
    [0,'#c22',0,'#f44',0,'#c22',0],
    [0,0,0,'#f80',0,0,0],
  ],
  enemy_big: [
    [0,0,0,'#888','#888','#888',0,0,0],
    [0,0,'#888','#aaa','#fff','#aaa','#888',0,0],
    [0,'#666','#888','#aaa','#aaa','#aaa','#888','#666',0],
    ['#666','#666','#888','#888','#888','#888','#888','#666','#666'],
    ['#555','#666','#666','#888','#f80','#888','#666','#666','#555'],
    [0,'#555',0,'#666','#888','#666',0,'#555',0],
    [0,0,0,'#f60',0,'#f60',0,0,0],
  ],
  tank: [
    [0,0,0,0,'#4a5','#4a5',0,0,0,0],
    [0,0,0,0,'#4a5','#4a5',0,0,0,0],
    [0,0,0,'#5b6','#5b6','#5b6','#5b6',0,0,0],
    [0,'#363','#4a5','#5b6','#7d7','#5b6','#4a5','#363',0,0],
    ['#2a3','#363','#4a5','#4a5','#4a5','#4a5','#4a5','#363','#2a3',0],
    ['#2a3','#363','#4a5','#4a5','#4a5','#4a5','#4a5','#363','#2a3',0],
    [0,'#252','#363','#363','#363','#363','#363','#252',0,0],
  ],
  heli: [
    [0,'#ddf','#ddf','#ddf','#ddf','#ddf','#ddf','#ddf',0],
    [0,0,0,0,'#83c',0,0,0,0],
    [0,0,0,'#a5f','#a5f','#a5f',0,0,0],
    [0,0,'#a5f','#a5f','#ff0','#a5f','#a5f',0,0],
    [0,0,0,'#a5f','#a5f','#a5f',0,0,0],
    [0,'#888',0,0,0,0,0,'#888',0],
    ['#666',0,0,0,0,0,0,0,'#666'],
  ],
};

function drawSprite(sprite, cx, cy, flash) {
  const h = sprite.length;
  const w = sprite[0].length;
  const sx = Math.floor(cx - w/2);
  const sy = Math.floor(cy - h/2);
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const color = sprite[r][c];
      if (color) pxDot(sx+c, sy+r, flash || color);
    }
  }
}

// ============ SAVE DATA ============
let maxUnlocked = parseInt(localStorage.getItem('maxUnlocked') || '1');
let clearedLevels = JSON.parse(localStorage.getItem('clearedLevels') || '[]');
let currentLevel = 1;

function saveProgress() {
  localStorage.setItem('maxUnlocked', maxUnlocked);
  localStorage.setItem('clearedLevels', JSON.stringify(clearedLevels));
}

// ============ LEVEL CONFIG ============
function getLevelConfig(level) {
  const L = Math.min(level, 10);
  return {
    level: L,
    enemyHpMult: 0.6 + L * 0.2,
    enemySpeedMult: 0.5 + L * 0.12,
    spawnInterval: Math.max(15, 80 - L * 6),
    extraSpawnChance: Math.min(0.5, Math.max(0, (L - 3) * 0.08)),
    enemyShootMult: 0.7 + L * 0.12,
    enemyBulletSpeed: (2.5 + L * 0.4) / PIXEL_SCALE,
    killsToWin: 10 + L * 5,
    tankMinLevel: 5,
    heliMinLevel: 3,
    bigPlaneMinLevel: 3,
  };
}

// ============ STARS ============
class Star {
  constructor() { this.reset(); this.y = Math.random() * H; }
  reset() { this.x = Math.floor(Math.random() * W); this.y = -1; this.speed = 0.3 + Math.random(); this.alpha = Math.random() > 0.5 ? 1 : 0.6; }
  update() { this.y += this.speed; if (this.y > H) this.reset(); }
  draw() { const c = this.alpha > 0.8 ? '#fff' : '#888'; pxDot(this.x, this.y, c); }
}

// ============ PLAYER ============
class Player {
  constructor() {
    this.w = 9; this.h = 9;
    this.x = W / 2; this.y = H - 30;
    this.shootTimer = 0; this.shootInterval = 14;
    this.bulletLevel = 1;
    this.shield = 0; this.speedBoost = 0; this.invincible = 0;
    this.missileTimer = 0; this.missileInterval = 90;
    this.hasMissile = false; this.missileLevel = 0;
  }
  draw() {
    if (this.invincible > 0 && Math.floor(this.invincible/4) % 2) return;
    // Flame flicker
    const flame = SPRITES.player.map(r => [...r]);
    if (Math.random() > 0.5) { flame[7][4] = '#ff0'; flame[8][4] = '#f80'; }
    else { flame[7][4] = '#f60'; flame[8][4] = '#ff0'; }
    drawSprite(flame, this.x, this.y);
    if (this.shield > 0) {
      // Pixel shield border
      const blink = Math.floor(Date.now()/200) % 2;
      const c = blink ? '#0ff' : '#0aa';
      pxRect(this.x-6, this.y-6, 12, 1, c);
      pxRect(this.x-6, this.y+5, 12, 1, c);
      pxRect(this.x-6, this.y-6, 1, 12, c);
      pxRect(this.x+5, this.y-6, 1, 12, c);
    }
  }
  shoot(bullets) {
    this.shootTimer++;
    if (this.invincible > 0) this.invincible--;
    if (this.shield > 0) this.shield--;
    if (this.speedBoost > 0) this.speedBoost--;
    const interval = this.speedBoost > 0 ? Math.floor(this.shootInterval * 0.6) : this.shootInterval;
    if (this.shootTimer < interval) return;
    this.shootTimer = 0;
    const bx = this.x, by = this.y - 5;
    if (this.bulletLevel >= 1) bullets.push({x:bx, y:by, vx:0, vy:-4, w:1, h:3});
    if (this.bulletLevel >= 2) {
      bullets.push({x:bx-3, y:by+2, vx:0, vy:-4, w:1, h:3});
      bullets.push({x:bx+3, y:by+2, vx:0, vy:-4, w:1, h:3});
    }
    if (this.bulletLevel >= 3) {
      bullets.push({x:bx-2, y:by, vx:-0.7, vy:-3.8, w:1, h:2});
      bullets.push({x:bx+2, y:by, vx:0.7, vy:-3.8, w:1, h:2});
    }
  }
  launchMissile(missiles) {
    if (!this.hasMissile) return;
    this.missileTimer++;
    const interval = this.missileLevel >= 2 ? 60 : this.missileInterval;
    if (this.missileTimer >= interval) {
      this.missileTimer = 0;
      missiles.push(new Missile(this.x - 3, this.y - 4));
      if (this.missileLevel >= 2) missiles.push(new Missile(this.x + 3, this.y - 4));
    }
  }
}

// ============ ENEMY ============
class Enemy {
  constructor(type, cfg) {
    this.type = type;
    this.x = 10 + Math.random() * (W - 20);
    this.y = -10;
    this.wobble = Math.random() * Math.PI * 2;
    this.shootTimer = Math.random() * 60;
    this.hitFlash = 0;
    const hm = cfg.enemyHpMult, sm = cfg.enemySpeedMult, bs = cfg.enemyBulletSpeed;

    switch(type) {
      case 0:
        this.w = 7; this.h = 5;
        this.speed = (0.8 + Math.random() * 0.5) * sm;
        this.hp = Math.ceil(1 * hm); this.maxHp = this.hp;
        this.score = 10;
        this.shootInterval = Math.max(15, Math.floor(80 / cfg.enemyShootMult));
        this.canShoot = cfg.level > 1;
        this.bulletSpeed = bs;
        break;
      case 1:
        this.w = 9; this.h = 7;
        this.speed = (0.3 + Math.random() * 0.2) * sm;
        this.hp = Math.ceil(5 * hm); this.maxHp = this.hp;
        this.score = 50;
        this.shootInterval = Math.max(12, Math.floor(50 / cfg.enemyShootMult));
        this.canShoot = true;
        this.bulletSpeed = bs;
        break;
      case 2:
        this.w = 10; this.h = 7;
        this.speed = (0.2 + Math.random() * 0.1) * sm;
        this.hp = Math.ceil(8 * hm); this.maxHp = this.hp;
        this.score = 80;
        this.shootInterval = Math.max(10, Math.floor(35 / cfg.enemyShootMult));
        this.canShoot = true;
        this.bulletSpeed = bs + 0.3;
        break;
      case 3:
        this.w = 9; this.h = 7;
        this.speed = (0.4 + Math.random() * 0.2) * sm;
        this.hp = Math.ceil(3 * hm); this.maxHp = this.hp;
        this.score = 35;
        this.shootInterval = Math.max(12, Math.floor(60 / cfg.enemyShootMult));
        this.canShoot = true;
        this.bulletSpeed = bs;
        this.moveDir = Math.random() > 0.5 ? 1 : -1;
        break;
    }
  }
  update(enemyBullets, playerX) {
    this.y += this.speed;
    this.wobble += 0.04;
    if (this.hitFlash > 0) this.hitFlash--;
    if (this.type === 0) this.x += Math.sin(this.wobble) * 0.4;
    if (this.type === 3) {
      this.x += this.moveDir * 0.6;
      if (this.x < 8 || this.x > W - 8) this.moveDir *= -1;
    }
    if (this.canShoot) {
      this.shootTimer++;
      if (this.shootTimer >= this.shootInterval) {
        this.shootTimer = 0;
        const dx = playerX - this.x, dy = 100;
        const len = Math.sqrt(dx*dx + dy*dy);
        const spd = this.bulletSpeed;
        if (this.type === 2) {
          enemyBullets.push({x:this.x, y:this.y+this.h/2, vx:0, vy:spd, w:2, h:2});
          enemyBullets.push({x:this.x-2, y:this.y+this.h/2, vx:-0.6, vy:spd, w:1, h:2});
          enemyBullets.push({x:this.x+2, y:this.y+this.h/2, vx:0.6, vy:spd, w:1, h:2});
        } else {
          enemyBullets.push({x:this.x, y:this.y+this.h/2, vx:dx/len*spd, vy:dy/len*spd, w:1, h:2});
        }
      }
    }
  }
  draw() {
    const flash = this.hitFlash > 0 ? '#fff' : null;
    switch(this.type) {
      case 0: drawSprite(SPRITES.enemy_small, this.x, this.y, flash); break;
      case 1: drawSprite(SPRITES.enemy_big, this.x, this.y, flash); break;
      case 2: drawSprite(SPRITES.tank, this.x, this.y, flash); break;
      case 3:
        // Animate rotor
        const heli = SPRITES.heli.map(r => [...r]);
        if (Math.floor(Date.now()/60) % 2) {
          heli[0] = [0,0,0,'#ddf','#83c','#ddf',0,0,0];
        }
        drawSprite(heli, this.x, this.y, flash);
        break;
    }
    // HP bar
    if (this.maxHp > 1) {
      const bw = this.w + 2;
      const bx = Math.floor(this.x - bw/2);
      const by = Math.floor(this.y - this.h/2 - 3);
      pxRect(bx, by, bw, 1, '#333');
      const fillW = Math.max(1, Math.floor(bw * (this.hp/this.maxHp)));
      pxRect(bx, by, fillW, 1, this.hp/this.maxHp > 0.3 ? '#0f0' : '#f00');
    }
  }
}

// ============ MISSILE ============
class Missile {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 2; this.h = 4;
    this.speed = 1.5; this.maxSpeed = 3;
    this.vx = 0; this.vy = -1.5;
    this.turnRate = 0.12; this.life = 180; this.damage = 3;
    this.trail = [];
  }
  findTarget(enemies) {
    let closest = null, minDist = Infinity;
    for (const e of enemies) {
      const dx = e.x-this.x, dy = e.y-this.y, dist = dx*dx+dy*dy;
      if (dist < minDist) { minDist = dist; closest = e; }
    }
    return closest;
  }
  update(enemies) {
    this.life--;
    this.trail.push({x:this.x, y:this.y, life:8});
    this.trail = this.trail.filter(t => { t.life--; return t.life > 0; });
    const target = this.findTarget(enemies);
    if (target) {
      const dx = target.x-this.x, dy = target.y-this.y, dist = Math.sqrt(dx*dx+dy*dy);
      this.vx += (dx/dist*this.maxSpeed - this.vx) * this.turnRate;
      this.vy += (dy/dist*this.maxSpeed - this.vy) * this.turnRate;
    }
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if (spd > this.maxSpeed) { this.vx=this.vx/spd*this.maxSpeed; this.vy=this.vy/spd*this.maxSpeed; }
    if (spd < this.speed) { this.vx=this.vx/spd*this.speed; this.vy=this.vy/spd*this.speed; }
    this.x += this.vx; this.y += this.vy;
  }
  draw() {
    this.trail.forEach(t => { if(t.life>4) pxDot(t.x,t.y,'#f80'); else pxDot(t.x,t.y,'#840'); });
    pxRect(this.x-1, this.y-2, 2, 4, '#fff');
    pxDot(this.x, this.y-3, '#f44');
    if (Math.random()>0.5) pxDot(this.x, this.y+2, '#ff0');
    else pxDot(this.x, this.y+2, '#f80');
  }
}

// ============ POWERUP ============
class PowerUp {
  constructor(x, y) {
    const r = Math.random();
    if (r < 0.25) this.type = 0;
    else if (r < 0.4) this.type = 1;
    else if (r < 0.55) this.type = 2;
    else if (r < 0.7) this.type = 3;
    else if (r < 0.82) this.type = 4;
    else this.type = 5;
    this.x = x; this.y = y; this.w = 5; this.h = 5;
    this.speed = 0.6; this.age = 0;
    this.labels = ['W+','T+','SH','HP','SP','MS'];
    this.colors = ['#ff0','#f80','#0ff','#f4a','#0f0','#f60'];
  }
  update() { this.y += this.speed; this.age++; }
  draw() {
    const blink = Math.floor(this.age/10) % 2;
    const c = blink ? this.colors[this.type] : '#fff';
    pxRect(this.x-2, this.y-2, 5, 5, '#000');
    pxRect(this.x-2, this.y-2, 5, 1, c);
    pxRect(this.x-2, this.y+2, 5, 1, c);
    pxRect(this.x-2, this.y-2, 1, 5, c);
    pxRect(this.x+2, this.y-2, 1, 5, c);
    pxDot(this.x, this.y, c);
  }
  apply(player) {
    switch(this.type) {
      case 0: player.bulletLevel = Math.max(player.bulletLevel,2); break;
      case 1: player.bulletLevel = 3; break;
      case 2: player.shield = 300; break;
      case 3: return 'life';
      case 4: player.speedBoost = 360; break;
      case 5: player.hasMissile = true; player.missileLevel = Math.min(player.missileLevel+1,2); break;
    }
    return this.labels[this.type];
  }
}

// ============ EXPLOSION (pixel particles) ============
class Explosion {
  constructor(x, y, color='#f80', big=false) {
    this.particles = [];
    const count = big ? 12 : 6;
    for (let i = 0; i < count; i++) {
      const angle = Math.random()*Math.PI*2, speed = (big?1:0.5)+Math.random()*(big?2:1.5);
      this.particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:10+Math.random()*8,color});
    }
  }
  update() { this.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.95;p.vy*=0.95;}); this.particles=this.particles.filter(p=>p.life>0); }
  draw() {
    this.particles.forEach(p=>{
      const c = p.life > 10 ? '#fff' : p.life > 5 ? p.color : '#840';
      pxDot(p.x, p.y, c);
    });
  }
  get done() { return this.particles.length === 0; }
}

// ============ GAME STATE ============
let game = null;
let targetX = null, targetY = null;

canvas.addEventListener('mousemove', e => { if(game&&game.running){targetX=e.clientX/PIXEL_SCALE;targetY=e.clientY/PIXEL_SCALE;} });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(game&&game.running){targetX=e.touches[0].clientX/PIXEL_SCALE;targetY=e.touches[0].clientY/PIXEL_SCALE;} }, {passive:false});
canvas.addEventListener('touchstart', e => { e.preventDefault(); if(game&&game.running){targetX=e.touches[0].clientX/PIXEL_SCALE;targetY=e.touches[0].clientY/PIXEL_SCALE;} }, {passive:false});

function collides(a, b) { return Math.abs(a.x-b.x)<(a.w+b.w)/2 && Math.abs(a.y-b.y)<(a.h+b.h)/2; }

// ============ LEVEL SELECT ============
function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    const cleared = clearedLevels.includes(i);
    const locked = i > maxUnlocked;
    btn.className = 'level-btn' + (locked ? ' locked' : '') + (cleared ? ' cleared' : '');
    btn.innerHTML = locked ? '#' : `${i}<span>${cleared ? '*' : '.'}</span>`;
    if (!locked) btn.onclick = () => playLevel(i);
    grid.appendChild(btn);
  }
  const hint = document.getElementById('level-hint');
  if (maxUnlocked <= 10) hint.textContent = `UNLOCKED: ${maxUnlocked}/10`;
  else hint.textContent = '*** ALL CLEAR ***';
}

function showLevelSelect() {
  hideAllScreens();
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('ui').classList.add('hidden');
  buildLevelGrid();
}

function hideAllScreens() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('level-clear').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
}

function playLevel(level) {
  currentLevel = level;
  hideAllScreens();
  document.getElementById('ui').classList.remove('hidden');
  targetX = null; targetY = null;
  const cfg = getLevelConfig(level);
  game = {
    player: new Player(), bullets: [], enemyBullets: [], enemies: [], missiles: [],
    explosions: [], powerups: [], stars: Array.from({length:40}, ()=>new Star()),
    score: 0, lives: 8, frame: 0,
    spawnTimer: 0, cfg: cfg,
    killCount: 0, running: true,
    powerupMsg: '', powerupMsgTimer: 0,
    levelAnnounce: 120,
    screenShake: 0, shakeX: 0, shakeY: 0
  };
  loop();
}

function playNextLevel() {
  if (currentLevel < 10) playLevel(currentLevel + 1);
  else showLevelSelect();
}

function levelCleared() {
  game.running = false;
  if (!clearedLevels.includes(currentLevel)) clearedLevels.push(currentLevel);
  if (currentLevel >= maxUnlocked && currentLevel < 10) maxUnlocked = currentLevel + 1;
  saveProgress();
  document.getElementById('clear-level').textContent = currentLevel;
  document.getElementById('clear-score').textContent = game.score;
  document.getElementById('level-clear').classList.remove('hidden');
  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.toggle('locked', currentLevel >= 10);
  nextBtn.textContent = currentLevel >= 10 ? 'ALL CLEAR!' : '下一关 >>';
}

function gameOver() {
  game.running = false;
  document.getElementById('fail-level').textContent = currentLevel;
  document.getElementById('final-score').textContent = game.score;
  document.getElementById('gameover-screen').classList.remove('hidden');
}

// ============ SPAWN ============
function spawnEnemy() {
  const cfg = game.cfg;
  const r = Math.random();
  let type;
  if (cfg.level < cfg.heliMinLevel && cfg.level < cfg.bigPlaneMinLevel) {
    type = 0;
  } else if (cfg.level < cfg.tankMinLevel) {
    type = r < 0.5 ? 0 : r < 0.75 ? 1 : 3;
  } else {
    type = r < 0.3 ? 0 : r < 0.5 ? 1 : r < 0.7 ? 2 : 3;
  }
  game.enemies.push(new Enemy(type, cfg));
}

// ============ PIXEL TEXT ============
// Simple pixel font for in-game text
function drawPixelText(text, x, y, color) {
  offCtx.fillStyle = color;
  offCtx.font = '5px monospace';
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';
  offCtx.fillText(text, Math.floor(x), Math.floor(y));
}

// ============ SCANLINE EFFECT ============
function drawScanlines() {
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 0; y < canvas.height; y += 3) {
    ctx.fillRect(0, y, canvas.width, 1);
  }
}

// ============ MAIN LOOP ============
function loop() {
  if (!game || !game.running) return;
  const g = game;

  // Clear offscreen
  offCtx.fillStyle = '#0a0a18';
  offCtx.fillRect(0, 0, W, H);

  // Stars
  g.stars.forEach(s => { s.update(); s.draw(); });

  // Screen shake
  if (g.screenShake > 0) {
    g.screenShake--;
    g.shakeX = (Math.random()-0.5) * 2;
    g.shakeY = (Math.random()-0.5) * 2;
  } else { g.shakeX = 0; g.shakeY = 0; }

  // Level announcement
  if (g.levelAnnounce > 0) {
    g.levelAnnounce--;
    if (g.levelAnnounce > 30 || Math.floor(g.levelAnnounce/4)%2) {
      drawPixelText(`STAGE ${g.cfg.level}`, W/2, H/2-8, '#0f0');
      drawPixelText(`KILL ${g.cfg.killsToWin}`, W/2, H/2+2, '#080');
    }
  }

  // Player movement
  const moveSpeed = g.player.speedBoost > 0 ? 0.2 : 0.15;
  if (targetX !== null) {
    g.player.x += (targetX - g.player.x) * moveSpeed;
    g.player.y += (targetY - g.player.y) * moveSpeed;
  }
  g.player.x = Math.max(6, Math.min(W-6, g.player.x));
  g.player.y = Math.max(6, Math.min(H-6, g.player.y));

  g.player.shoot(g.bullets);
  g.player.launchMissile(g.missiles);

  // Update bullets
  g.bullets = g.bullets.filter(b => { b.x+=b.vx; b.y+=b.vy; return b.y>-5&&b.x>-5&&b.x<W+5; });
  g.enemyBullets = g.enemyBullets.filter(b => { b.x+=b.vx; b.y+=b.vy; return b.y<H+5&&b.x>-5&&b.x<W+5; });

  // Spawn enemies
  g.frame++;
  g.spawnTimer++;
  if (g.spawnTimer >= g.cfg.spawnInterval) { g.spawnTimer = 0; spawnEnemy(); }
  if (g.frame % 120 === 0 && Math.random() < g.cfg.extraSpawnChance) spawnEnemy();

  // Update enemies
  g.enemies.forEach(e => e.update(g.enemyBullets, g.player.x));

  // Update missiles
  g.missiles = g.missiles.filter(m => {
    m.update(g.enemies);
    if (m.life<=0||m.x<-20||m.x>W+20||m.y<-20||m.y>H+20) return false;
    for (let i = g.enemies.length-1; i >= 0; i--) {
      const e = g.enemies[i];
      if (Math.abs(m.x-e.x)<(e.w+m.w)/2 && Math.abs(m.y-e.y)<(e.h+m.h)/2) {
        e.hp -= m.damage; e.hitFlash = 3;
        g.explosions.push(new Explosion(m.x, m.y, '#f80', true));
        g.screenShake = 4;
        if (e.hp <= 0) { g.score+=e.score; g.killCount++; g.explosions.push(new Explosion(e.x,e.y,'#f80',true));
          if(Math.random()<0.2) g.powerups.push(new PowerUp(e.x,e.y)); g.enemies.splice(i,1); }
        return false;
      }
    }
    return true;
  });

  // Player bullets hit enemies
  g.bullets = g.bullets.filter(b => {
    for (let i = g.enemies.length-1; i >= 0; i--) {
      const e = g.enemies[i];
      if (collides({x:b.x,y:b.y,w:b.w,h:b.h}, e)) {
        e.hp--; e.hitFlash = 3;
        if (e.hp <= 0) {
          g.score += e.score; g.killCount++;
          g.explosions.push(new Explosion(e.x, e.y, e.type===2?'#4a5':e.type===3?'#a5f':'#f44', e.type>=1));
          g.screenShake = e.type >= 1 ? 3 : 1;
          if (Math.random() < (e.type>=1?0.25:0.12)) g.powerups.push(new PowerUp(e.x,e.y));
          g.enemies.splice(i, 1);
        } else { g.explosions.push(new Explosion(b.x,b.y,'#ff0')); }
        return false;
      }
    }
    return true;
  });

  // Check level clear
  if (g.killCount >= g.cfg.killsToWin) { levelCleared(); return; }

  // Enemy bullets hit player
  if (g.player.invincible <= 0) {
    g.enemyBullets = g.enemyBullets.filter(b => {
      if (collides({x:b.x,y:b.y,w:b.w,h:b.h}, g.player)) {
        if (g.player.shield > 0) { g.player.shield = Math.max(0,g.player.shield-60); g.explosions.push(new Explosion(b.x,b.y,'#0ff')); }
        else { g.lives--; g.player.invincible=90; g.explosions.push(new Explosion(g.player.x,g.player.y,'#0af')); g.screenShake=5;
          if(g.lives<=0) gameOver(); }
        return false;
      }
      return true;
    });
  }

  // Player body collision with enemies
  if (g.player.invincible <= 0) {
    g.enemies = g.enemies.filter(e => {
      if (e.y > H+10) return false;
      if (collides(g.player, e)) {
        if (g.player.shield > 0) { g.player.shield=0; e.hp-=2; g.explosions.push(new Explosion(e.x,e.y,'#0ff'));
          if(e.hp<=0){g.score+=e.score;g.killCount++;g.explosions.push(new Explosion(e.x,e.y,'#f80',true));return false;} return true; }
        g.lives--; g.player.invincible=90; g.explosions.push(new Explosion(e.x,e.y,'#f44',true)); g.screenShake=6;
        if(g.lives<=0) gameOver();
        return false;
      }
      return true;
    });
  } else { g.enemies = g.enemies.filter(e => e.y <= H+10); }

  // Powerups
  g.powerups.forEach(p => p.update());
  g.powerups = g.powerups.filter(p => {
    if (p.y > H+10) return false;
    if (collides(g.player, p)) {
      const result = p.apply(g.player);
      if (result === 'life') g.lives = Math.min(g.lives+1, 10);
      g.powerupMsg = typeof result==='string' && result!=='life' ? result : 'HP+';
      g.powerupMsgTimer = 60;
      return false;
    }
    return true;
  });

  // ====== DRAW ======
  // Enemy bullets
  g.enemyBullets.forEach(b => pxRect(b.x, b.y, b.w, b.h, '#f44'));

  // Player bullets
  g.bullets.forEach(b => pxRect(b.x, b.y, b.w, b.h, '#0ff'));

  g.enemies.forEach(e => e.draw());
  g.missiles.forEach(m => m.draw());
  g.powerups.forEach(p => p.draw());
  g.player.draw();
  g.explosions.forEach(e => { e.update(); e.draw(); });
  g.explosions = g.explosions.filter(e => !e.done);

  // Powerup message
  if (g.powerupMsgTimer > 0) {
    g.powerupMsgTimer--;
    if (Math.floor(g.powerupMsgTimer/3) % 2)
      drawPixelText(g.powerupMsg, W/2, H/2-15, '#ff0');
  }

  // Progress bar
  const progress = g.killCount / g.cfg.killsToWin;
  const barW = 30, barX = Math.floor(W/2-barW/2), barY = 10;
  pxRect(barX, barY, barW, 2, '#222');
  pxRect(barX, barY, Math.max(1, Math.floor(barW * Math.min(1, progress))), 2, '#0f0');

  // UI
  document.getElementById('score').textContent = g.score;
  document.getElementById('lives').textContent = g.lives;
  const pd = document.getElementById('ui-center');
  const parts = [`LV${g.cfg.level}`];
  if (g.player.bulletLevel>=2) parts.push('W');
  if (g.player.bulletLevel>=3) parts.push('T');
  if (g.player.shield>0) parts.push('SH');
  if (g.player.speedBoost>0) parts.push('SP');
  if (g.player.hasMissile) parts.push('MS');
  pd.textContent = parts.join(' ');

  // ====== RENDER TO MAIN CANVAS (scaled up) ======
  ctx.imageSmoothingEnabled = false;
  const sx = Math.floor(g.shakeX * PIXEL_SCALE);
  const sy = Math.floor(g.shakeY * PIXEL_SCALE);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(offCanvas, sx, sy, W, H, 0, 0, canvas.width, canvas.height);

  // Scanline overlay
  drawScanlines();

  requestAnimationFrame(loop);
}

// Init
buildLevelGrid();
</script>
</body>
</html>
