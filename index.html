<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✈️ 飞机射击大作战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #000; 
  overflow: hidden; 
  touch-action: none;
  font-family: 'Arial', sans-serif;
}
canvas { display: block; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%; 
  padding: 10px 15px;
  display: flex; justify-content: space-between;
  color: #fff; font-size: 16px; font-weight: bold;
  text-shadow: 0 0 8px rgba(0,150,255,0.8);
  pointer-events: none; z-index: 10;
}
#start-screen, #gameover-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; z-index: 20; background: rgba(0,0,0,0.85);
}
#start-screen h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 0 0 20px #0af; }
#start-screen p { font-size: 16px; color: #aaa; margin-bottom: 30px; }
#gameover-screen h1 { font-size: 32px; color: #f44; margin-bottom: 10px; }
#gameover-screen .score { font-size: 24px; margin-bottom: 30px; color: #0af; }
.btn {
  padding: 15px 40px; font-size: 20px; border: 2px solid #0af;
  background: transparent; color: #0af; border-radius: 8px;
  cursor: pointer; transition: all 0.3s;
}
.btn:hover, .btn:active { background: #0af; color: #000; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>✈️ 飞机射击大作战</h1>
  <p>消灭敌机，获取高分！</p>
  <p style="font-size:13px;color:#666;margin-bottom:20px;">触屏拖动 / 鼠标移动控制飞机<br>自动射击</p>
  <button class="btn" onclick="startGame()">开始游戏 🚀</button>
</div>

<div id="gameover-screen" class="hidden">
  <h1>💥 游戏结束</h1>
  <div class="score">得分：<span id="final-score">0</span></div>
  <button class="btn" onclick="startGame()">再来一次 🔄</button>
</div>

<div id="ui">
  <div>❤️ <span id="lives">3</span></div>
  <div>⭐ <span id="score">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let game = null;

class Star {
  constructor() { this.reset(); this.y = Math.random() * canvas.height; }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = -2;
    this.speed = 1 + Math.random() * 3;
    this.size = Math.random() * 2;
    this.alpha = 0.3 + Math.random() * 0.7;
  }
  update() {
    this.y += this.speed;
    if (this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

class Player {
  constructor() {
    this.w = 40; this.h = 45;
    this.x = canvas.width / 2;
    this.y = canvas.height - 100;
    this.shootTimer = 0;
    this.shootInterval = 12;
  }
  draw() {
    const x = this.x, y = this.y;
    // Body
    ctx.fillStyle = '#0af';
    ctx.beginPath();
    ctx.moveTo(x, y - this.h/2);
    ctx.lineTo(x - this.w/2, y + this.h/2);
    ctx.lineTo(x - this.w/4, y + this.h/3);
    ctx.lineTo(x + this.w/4, y + this.h/3);
    ctx.lineTo(x + this.w/2, y + this.h/2);
    ctx.closePath();
    ctx.fill();
    // Wings
    ctx.fillStyle = '#08f';
    ctx.beginPath();
    ctx.moveTo(x - this.w/4, y + 5);
    ctx.lineTo(x - this.w/2 - 10, y + this.h/2 + 5);
    ctx.lineTo(x - this.w/4, y + this.h/3);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + this.w/4, y + 5);
    ctx.lineTo(x + this.w/2 + 10, y + this.h/2 + 5);
    ctx.lineTo(x + this.w/4, y + this.h/3);
    ctx.closePath();
    ctx.fill();
    // Engine glow
    ctx.fillStyle = `rgba(0,170,255,${0.3 + Math.random()*0.3})`;
    ctx.beginPath();
    ctx.ellipse(x, y + this.h/2 + 5, 6, 10 + Math.random()*8, 0, 0, Math.PI*2);
    ctx.fill();
  }
  shoot(bullets) {
    this.shootTimer++;
    if (this.shootTimer >= this.shootInterval) {
      this.shootTimer = 0;
      bullets.push({ x: this.x, y: this.y - this.h/2, speed: 10, w: 3, h: 12 });
    }
  }
}

class Enemy {
  constructor(type = 0) {
    this.type = type;
    this.w = type === 0 ? 30 : 45;
    this.h = type === 0 ? 30 : 45;
    this.x = 30 + Math.random() * (canvas.width - 60);
    this.y = -this.h;
    this.speed = type === 0 ? (2 + Math.random() * 2) : (1 + Math.random());
    this.hp = type === 0 ? 1 : 3;
    this.maxHp = this.hp;
    this.score = type === 0 ? 10 : 30;
    this.wobble = Math.random() * Math.PI * 2;
  }
  update() {
    this.y += this.speed;
    this.wobble += 0.05;
    if (this.type === 1) this.x += Math.sin(this.wobble) * 1.5;
  }
  draw() {
    const x = this.x, y = this.y;
    if (this.type === 0) {
      // Small enemy - red triangle
      ctx.fillStyle = '#f44';
      ctx.beginPath();
      ctx.moveTo(x, y + this.h/2);
      ctx.lineTo(x - this.w/2, y - this.h/2);
      ctx.lineTo(x + this.w/2, y - this.h/2);
      ctx.closePath();
      ctx.fill();
    } else {
      // Big enemy - orange diamond
      ctx.fillStyle = '#f80';
      ctx.beginPath();
      ctx.moveTo(x, y - this.h/2);
      ctx.lineTo(x + this.w/2, y);
      ctx.lineTo(x, y + this.h/2);
      ctx.lineTo(x - this.w/2, y);
      ctx.closePath();
      ctx.fill();
      // HP bar
      ctx.fillStyle = '#333';
      ctx.fillRect(x - 20, y - this.h/2 - 8, 40, 4);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(x - 20, y - this.h/2 - 8, 40 * (this.hp/this.maxHp), 4);
    }
  }
}

class Explosion {
  constructor(x, y, color = '#f80') {
    this.x = x; this.y = y; this.color = color;
    this.particles = [];
    for (let i = 0; i < 12; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 4;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 20 + Math.random() * 10,
        size: 2 + Math.random() * 3
      });
    }
  }
  update() {
    this.particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.life--;
      p.size *= 0.95;
    });
    this.particles = this.particles.filter(p => p.life > 0);
  }
  draw() {
    this.particles.forEach(p => {
      ctx.globalAlpha = p.life / 30;
      ctx.fillStyle = this.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;
  }
  get done() { return this.particles.length === 0; }
}

function initGame() {
  return {
    player: new Player(),
    bullets: [],
    enemies: [],
    explosions: [],
    stars: Array.from({length: 80}, () => new Star()),
    score: 0,
    lives: 3,
    frame: 0,
    spawnTimer: 0,
    spawnInterval: 60,
    difficulty: 1,
    running: true
  };
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  game = initGame();
  loop();
}

function gameOver() {
  game.running = false;
  document.getElementById('final-score').textContent = game.score;
  document.getElementById('gameover-screen').classList.remove('hidden');
}

// Controls
let targetX = null, targetY = null;

canvas.addEventListener('mousemove', e => {
  if (game && game.running) { targetX = e.clientX; targetY = e.clientY; }
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (game && game.running) {
    targetX = e.touches[0].clientX;
    targetY = e.touches[0].clientY;
  }
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (game && game.running) {
    targetX = e.touches[0].clientX;
    targetY = e.touches[0].clientY;
  }
}, { passive: false });

function collides(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
         Math.abs(a.y - b.y) < (a.h + b.h) / 2;
}

function loop() {
  if (!game || !game.running) return;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  game.stars.forEach(s => { s.update(); s.draw(); });

  // Move player towards target
  if (targetX !== null) {
    game.player.x += (targetX - game.player.x) * 0.15;
    game.player.y += (targetY - game.player.y) * 0.15;
  }
  game.player.x = Math.max(25, Math.min(canvas.width - 25, game.player.x));
  game.player.y = Math.max(25, Math.min(canvas.height - 25, game.player.y));

  // Shoot
  game.player.shoot(game.bullets);

  // Update bullets
  game.bullets.forEach(b => b.y -= b.speed);
  game.bullets = game.bullets.filter(b => b.y > -20);

  // Spawn enemies
  game.frame++;
  game.spawnTimer++;
  if (game.frame % 600 === 0) {
    game.difficulty += 0.3;
    game.spawnInterval = Math.max(20, 60 - game.difficulty * 5);
  }
  if (game.spawnTimer >= game.spawnInterval) {
    game.spawnTimer = 0;
    const type = Math.random() < 0.2 && game.difficulty > 1.5 ? 1 : 0;
    game.enemies.push(new Enemy(type));
  }

  // Update enemies
  game.enemies.forEach(e => e.update());

  // Bullet-enemy collision
  game.bullets = game.bullets.filter(b => {
    for (let i = game.enemies.length - 1; i >= 0; i--) {
      const e = game.enemies[i];
      if (collides({x: b.x, y: b.y, w: b.w, h: b.h}, e)) {
        e.hp--;
        if (e.hp <= 0) {
          game.score += e.score;
          game.explosions.push(new Explosion(e.x, e.y, e.type === 0 ? '#f44' : '#f80'));
          game.enemies.splice(i, 1);
        }
        return false;
      }
    }
    return true;
  });

  // Player-enemy collision
  game.enemies = game.enemies.filter(e => {
    if (e.y > canvas.height + 50) return false;
    if (collides(game.player, e)) {
      game.lives--;
      game.explosions.push(new Explosion(e.x, e.y, '#f44'));
      if (game.lives <= 0) { gameOver(); return false; }
      return false;
    }
    return true;
  });

  // Draw bullets
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 8;
  game.bullets.forEach(b => {
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  });
  ctx.shadowBlur = 0;

  // Draw enemies
  game.enemies.forEach(e => e.draw());

  // Draw player
  game.player.draw();

  // Explosions
  game.explosions.forEach(e => { e.update(); e.draw(); });
  game.explosions = game.explosions.filter(e => !e.done);

  // UI
  document.getElementById('score').textContent = game.score;
  document.getElementById('lives').textContent = game.lives;

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
