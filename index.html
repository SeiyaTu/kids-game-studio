<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌈 卡通飞行大冒险</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #87CEEB; overflow: hidden; touch-action: none; font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif; }
canvas { display: block; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%;
  padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
  color: #fff; font-size: 18px; font-weight: bold;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  pointer-events: none; z-index: 10;
}
#ui-center { font-size: 14px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
#combo-display {
  position: absolute; top: 12%; left: 50%; transform: translate(-50%,-60%);
  font-size: 28px; font-weight: bold;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  pointer-events: none; z-index: 15;
  opacity: 0; transition: opacity 0.15s, transform 0.2s;
}
#combo-display.active {
  opacity: 1;
  background: linear-gradient(90deg, #FFD700, #FF6B6B, #64D2FF, #81C784);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  animation: comboBounce 0.3s ease;
}
#combo-display.break { opacity:1; color: #FF6B6B; -webkit-text-fill-color: #FF6B6B; font-size: 22px; }
@keyframes comboBounce { 0%{transform:translate(-50%,-60%) scale(1.4)} 100%{transform:translate(-50%,-60%) scale(1)} }
#boss-hp-bar {
  position: absolute; top: 45px; left: 50%; transform: translateX(-50%);
  width: 65%; max-width: 320px; height: 16px; background: rgba(255,255,255,0.35);
  border: 3px solid #FF7043; border-radius: 10px;
  z-index: 15; pointer-events: none; display: none; overflow: hidden;
}
#boss-hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #FF7043, #FFAB91); transition: width 0.2s; border-radius: 7px; }
#boss-name {
  position: absolute; top: 26px; left: 50%; transform: translateX(-50%);
  color: #FF7043; font-size: 16px; font-weight: bold;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  z-index: 15; pointer-events: none; display: none;
}
#sound-toggle {
  position: absolute; top: 10px; right: 60px; z-index: 25;
  background: rgba(255,255,255,0.35); border: 3px solid #fff; color: #fff;
  font-size: 20px; width: 40px; height: 40px; cursor: pointer; border-radius: 20px;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
}
#sound-toggle.muted { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.3); }
#screen-flash {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #fff; opacity: 0; pointer-events: none; z-index: 12;
  transition: opacity 0.05s;
}
#combo-glow {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 11; opacity: 0;
  box-shadow: inset 0 0 80px 30px #FFD700;
  transition: opacity 0.3s;
}
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; z-index: 20;
  background: linear-gradient(180deg, rgba(100,180,255,0.95) 0%, rgba(180,130,230,0.95) 100%);
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
}
.overlay h1 { font-size: 38px; margin-bottom: 12px; color: #fff; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); letter-spacing: 3px; }
.overlay p { font-size: 16px; color: rgba(255,255,255,0.85); margin-bottom: 15px; }
.overlay .score { font-size: 26px; margin-bottom: 20px; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.btn {
  padding: 16px 40px; font-size: 20px; border: 3px solid #fff;
  background: rgba(255,255,255,0.25); color: #fff;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  cursor: pointer; transition: all 0.2s; margin: 5px; letter-spacing: 1px;
  border-radius: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  backdrop-filter: blur(4px);
}
.btn:hover, .btn:active { background: rgba(255,255,255,0.45); transform: scale(1.08); }
.btn.locked { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.3); pointer-events: none; background: rgba(0,0,0,0.1); }
.btn-small {
  padding: 10px 20px; font-size: 16px; border: 2px solid #fff;
  background: rgba(255,255,255,0.25); color: #fff;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  cursor: pointer; transition: all 0.2s; margin: 4px; letter-spacing: 1px;
  border-radius: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  backdrop-filter: blur(4px);
}
.btn-small:hover, .btn-small:active { background: rgba(255,255,255,0.45); transform: scale(1.05); }
.btn-small.selected { border-color: #FFD700; background: rgba(255,215,0,0.35); color: #FFD700; }
.btn-small.disabled { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.3); pointer-events: none; background: rgba(0,0,0,0.1); }
.hidden { display: none !important; }
.level-grid { display: flex; flex-wrap: wrap; justify-content: center; max-width: 380px; gap: 12px; margin: 15px 0; }
.level-btn {
  width: 64px; height: 64px; border: 3px solid #fff; background: rgba(255,255,255,0.25);
  color: #fff; font-size: 24px; font-weight: bold;
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.2s; border-radius: 50%;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
  backdrop-filter: blur(4px);
}
.level-btn span { font-size: 14px; margin-top: 1px; }
.level-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); }
.level-btn.locked { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.25); background: rgba(0,0,0,0.1); cursor: not-allowed; }
.level-btn.cleared { border-color: #FFD700; color: #FFD700; background: rgba(255,215,0,0.25); box-shadow: 0 0 12px rgba(255,215,0,0.4); }
.level-btn.cleared span { color: #FFD700; }
.shop-list { width: 85%; max-width: 360px; max-height: 55vh; overflow-y: auto; margin: 10px 0; }
.shop-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; margin: 6px 0; border-radius: 16px;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
  border: 2px solid rgba(255,255,255,0.3);
}
.shop-item .item-info { flex: 1; text-align: left; }
.shop-item .item-name { font-size: 16px; font-weight: bold; }
.shop-item .item-desc { font-size: 12px; color: rgba(255,255,255,0.7); }
.shop-item .plane-dot { width: 20px; height: 20px; border-radius: 50%; margin-right: 10px; border: 2px solid rgba(255,255,255,0.5); }
</style>
</head>
<body>

<!-- Main Menu -->
<div id="main-menu" class="overlay">
  <h1>🌈 飞行大冒险</h1>
  <p>== CARTOON SHOOTER ==</p>
  <div class="score" id="menu-stars">⭐ 0</div>
  <div style="display:flex;flex-direction:column;gap:10px;">
    <button class="btn" onclick="showLevelSelect()">🎮 选关</button>
    <button class="btn" onclick="showHangar()">✈️ 飞机库</button>
    <button class="btn" onclick="showShop()">🛒 装备库</button>
  </div>
</div>

<!-- Hangar -->
<div id="hangar-screen" class="overlay hidden">
  <h1>✈️ 飞机库</h1>
  <div class="score" id="hangar-stars">⭐ 0</div>
  <div class="shop-list" id="hangar-list"></div>
  <button class="btn" onclick="showMainMenu()">返回</button>
</div>

<!-- Shop -->
<div id="shop-screen" class="overlay hidden">
  <h1>🛒 装备库</h1>
  <div class="score" id="shop-stars">⭐ 0</div>
  <div class="shop-list" id="shop-list"></div>
  <button class="btn" onclick="showMainMenu()">返回</button>
</div>

<div id="start-screen" class="overlay hidden">
  <h1>🌈 飞行大冒险</h1>
  <p>== CARTOON SHOOTER ==</p>
  <p style="font-size:13px;color:rgba(255,255,255,0.7);">触屏拖动 / 鼠标控制 · 自动射击 · 导弹追踪</p>
  <div class="level-grid" id="level-grid"></div>
  <p id="level-hint" style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:5px;"></p>
  <button class="btn" onclick="showMainMenu()" style="margin-top:10px;">返回主菜单</button>
</div>

<div id="level-clear" class="overlay hidden">
  <h1>🎉 STAGE CLEAR 🎉</h1>
  <div class="score">第 <span id="clear-level">1</span> 关 · 得分：<span id="clear-score">0</span></div>
  <div class="score" id="clear-stars-collected" style="font-size:20px;"></div>
  <div style="display:flex;gap:10px;">
    <button class="btn" onclick="showMainMenu()">主菜单</button>
    <button class="btn" onclick="showLevelSelect()">选关</button>
    <button class="btn" id="next-btn" onclick="playNextLevel()">下一关 >></button>
  </div>
</div>

<div id="gameover-screen" class="overlay hidden">
  <h1>💫 GAME OVER</h1>
  <div class="score">第 <span id="fail-level">1</span> 关 · 得分：<span id="final-score">0</span></div>
  <div class="score" id="fail-stars-collected" style="font-size:20px;"></div>
  <div style="display:flex;gap:10px;">
    <button class="btn" onclick="showMainMenu()">主菜单</button>
    <button class="btn" onclick="showLevelSelect()">选关</button>
    <button class="btn" onclick="playLevel(currentLevel)">再来一次!</button>
  </div>
</div>

<div id="ui" class="hidden">
  <div id="lives-display"></div>
  <div id="ui-center"></div>
  <div><span id="ui-stars" style="margin-right:8px;"></span>✨<span id="score">0</span></div>
</div>

<div id="combo-display"></div>
<div id="boss-name">BOSS</div>
<div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
<div id="screen-flash"></div>
<div id="combo-glow"></div>
<button id="sound-toggle" onclick="toggleSound()">♫</button>

<canvas id="game"></canvas>

<script>
// ============ HIGH-RES CANVAS (no pixel scaling!) ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize(); window.addEventListener('resize', resize);

// ============ SAVE DATA ============
let maxUnlocked = parseInt(localStorage.getItem('maxUnlocked') || '1');
let clearedLevels = JSON.parse(localStorage.getItem('clearedLevels') || '[]');
let currentLevel = 1;
let totalStars = parseInt(localStorage.getItem('totalStars') || '0');
let ownedPlanes = JSON.parse(localStorage.getItem('ownedPlanes') || '["blue"]');
let selectedPlane = localStorage.getItem('selectedPlane') || 'blue';
let ownedEquips = JSON.parse(localStorage.getItem('ownedEquips') || '[]');

function saveProgress() {
  localStorage.setItem('maxUnlocked', maxUnlocked);
  localStorage.setItem('clearedLevels', JSON.stringify(clearedLevels));
  localStorage.setItem('totalStars', totalStars);
  localStorage.setItem('ownedPlanes', JSON.stringify(ownedPlanes));
  localStorage.setItem('selectedPlane', selectedPlane);
  localStorage.setItem('ownedEquips', JSON.stringify(ownedEquips));
}

// ============ PLANES & EQUIPS ============
const PLANES = {
  blue:   { name:'蓝色小鸟', cost:0,   color:'#64B5F6', desc:'均衡型',       hpMod:0,  shootMod:1,   speedMod:1,    special:null },
  red:    { name:'红色火箭', cost:50,  color:'#EF5350', desc:'快射-2HP',     hpMod:-2, shootMod:0.8, speedMod:1.15, special:null },
  green:  { name:'绿色坦克', cost:80,  color:'#66BB6A', desc:'+4HP 慢速',   hpMod:4,  shootMod:1,   speedMod:0.7,  special:null },
  purple: { name:'紫色幻影', cost:120, color:'#AB47BC', desc:'双倍导弹',     hpMod:0,  shootMod:1,   speedMod:1,    special:'doubleMissile' },
  gold:   { name:'金色凤凰', cost:200, color:'#FFD54F', desc:'全能+免死',    hpMod:2,  shootMod:0.9, speedMod:1.1,  special:'revive' },
  ew:     { name:'电子战机', cost:200, color:'#00E5FF', desc:'偏转子弹+幻影', hpMod:0, shootMod:1,   speedMod:1,    special:'ew' },
};

const EQUIPS = [
  { id:'magnet',    name:'磁铁',     cost:30,  desc:'星星吸附范围×2' },
  { id:'armor',     name:'厚甲',     cost:40,  desc:'HP+2' },
  { id:'rapid',     name:'快射',     cost:50,  desc:'射速+20%' },
  { id:'bigbullet', name:'大弹头',   cost:60,  desc:'伤害+1' },
  { id:'missile',   name:'导弹专家', cost:80,  desc:'导弹间隔减半' },
  { id:'lucky',     name:'幸运星',   cost:100, desc:'掉落率×2' },
];

function hasEquip(id) { return ownedEquips.includes(id); }

// ============ AUDIO SYSTEM ============
let audioCtx = null, masterGain = null, soundEnabled = true, bgmPlaying = false, bgmInterval = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}
function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-toggle');
  btn.classList.toggle('muted', !soundEnabled);
  btn.textContent = soundEnabled ? '♫' : '✕';
  if (masterGain) masterGain.gain.value = soundEnabled ? 0.3 : 0;
  if (!soundEnabled) stopBGM(); else if (game && game.running) startBGM();
}
function playTone(freq, duration, type, vol, detune) {
  if (!audioCtx || !soundEnabled) return;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.type = type || 'square'; osc.frequency.value = freq;
  if (detune) osc.detune.value = detune;
  gain.gain.value = vol || 0.1;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain); gain.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + duration);
}
function sfxShoot() { playTone(800, 0.05, 'square', 0.06); }
function sfxExplosion(big) {
  if (!audioCtx || !soundEnabled) return;
  const dur = big ? 0.4 : 0.2;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.type = 'sawtooth'; osc.frequency.value = big ? 80 : 120;
  osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + dur);
  gain.gain.value = big ? 0.15 : 0.08;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + dur);
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1)*Math.exp(-i/data.length*4);
  const noise = audioCtx.createBufferSource(), ng = audioCtx.createGain();
  noise.buffer = buf; ng.gain.value = big ? 0.12 : 0.05;
  ng.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  noise.connect(ng); ng.connect(masterGain); noise.start(); noise.stop(audioCtx.currentTime + dur);
}
function sfxPickup() { playTone(1200, 0.08, 'sine', 0.1); setTimeout(() => playTone(1600, 0.08, 'sine', 0.1), 80); }
function sfxBossAlarm() { for (let i = 0; i < 4; i++) { setTimeout(() => playTone(400, 0.15, 'square', 0.12), i*300); setTimeout(() => playTone(600, 0.15, 'square', 0.12), i*300+150); } }
function sfxCombo(count) { playTone(400 + count * 80, 0.1, 'square', 0.08); }
function sfxBossDeath() { for (let i = 0; i < 8; i++) setTimeout(() => sfxExplosion(true), i * 100); }
function sfxStarPickup() { playTone(1400, 0.06, 'sine', 0.08); }
function startBGM() {
  if (!audioCtx || !soundEnabled || bgmPlaying) return;
  bgmPlaying = true;
  const notes = [262,330,392,330,262,392,330,262,349,294,262,330,392,523,440,392];
  let idx = 0;
  bgmInterval = setInterval(() => {
    if (!soundEnabled) { stopBGM(); return; }
    playTone(notes[idx%notes.length], 0.12, 'square', 0.03);
    playTone(notes[idx%notes.length]/2, 0.12, 'triangle', 0.02);
    idx++;
  }, 180);
}
function stopBGM() { bgmPlaying = false; if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; } }

// ============ CARTOON DRAWING HELPERS ============
function drawEllipse(cx, cy, rx, ry, color, stroke, strokeW) {
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
  if (color) { ctx.fillStyle = color; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW || 2; ctx.stroke(); }
}
function drawCircle(cx, cy, r, color, stroke, strokeW) {
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  if (color) { ctx.fillStyle = color; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW || 2; ctx.stroke(); }
}
function drawRoundRect(x, y, w, h, r, color) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
  ctx.fillStyle = color; ctx.fill();
}

// ============ DRAW CARTOON CLOUD ============
function drawCloud(cx, cy, size, alpha) {
  ctx.globalAlpha = alpha || 0.6;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
  ctx.arc(cx - size * 0.4, cy + size * 0.1, size * 0.35, 0, Math.PI * 2);
  ctx.arc(cx + size * 0.45, cy + size * 0.05, size * 0.38, 0, Math.PI * 2);
  ctx.arc(cx - size * 0.15, cy - size * 0.25, size * 0.32, 0, Math.PI * 2);
  ctx.arc(cx + size * 0.2, cy - size * 0.2, size * 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ============ DRAW STAR SHAPE ============
function drawStar(cx, cy, r, points, color, rotation) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const a = (rotation || 0) + (Math.PI * 2 / (points * 2)) * i - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.45;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](cx + Math.cos(a) * rad, cy + Math.sin(a) * rad);
  }
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
}

// ============ DRAW HEART ============
function drawHeart(cx, cy, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, cy + size * 0.3);
  ctx.bezierCurveTo(cx - size * 0.5, cy - size * 0.3, cx - size * 0.8, cy + size * 0.1, cx, cy + size * 0.7);
  ctx.bezierCurveTo(cx + size * 0.8, cy + size * 0.1, cx + size * 0.5, cy - size * 0.3, cx, cy + size * 0.3);
  ctx.fill();
}

// ============ DRAW PLAYER (Cartoon airplane) ============
function drawPlayer(x, y, invincible, shield, speedBoost, time) {
  if (invincible > 0 && Math.floor(invincible / 4) % 2) return;
  ctx.save(); ctx.translate(x, y);

  const planeData = PLANES[selectedPlane] || PLANES.blue;
  const mainColor = planeData.color;
  // Derive darker shade for outlines
  const darkerColor = darkenColor(mainColor, 0.7);
  const lighterColor = lightenColor(mainColor, 0.3);

  // Tail flame (animated)
  const flameOff = Math.sin(time * 0.3) * 3;
  const flameH = 18 + Math.sin(time * 0.5) * 5;
  const flameGrad = ctx.createLinearGradient(0, 20, 0, 20 + flameH);
  flameGrad.addColorStop(0, '#FF9800');
  flameGrad.addColorStop(0.5, '#FFD54F');
  flameGrad.addColorStop(1, 'rgba(255,200,50,0)');
  ctx.beginPath();
  ctx.moveTo(-6, 22);
  ctx.quadraticCurveTo(flameOff, 22 + flameH * 0.6, 0, 22 + flameH);
  ctx.quadraticCurveTo(-flameOff, 22 + flameH * 0.6, 6, 22);
  ctx.fillStyle = flameGrad; ctx.fill();

  // Orange tail wing
  ctx.beginPath();
  ctx.moveTo(-14, 18); ctx.lineTo(0, 10); ctx.lineTo(14, 18);
  ctx.lineTo(10, 22); ctx.lineTo(-10, 22); ctx.closePath();
  ctx.fillStyle = '#FF7043'; ctx.fill();
  ctx.strokeStyle = '#E64A19'; ctx.lineWidth = 1.5; ctx.stroke();

  // Main body
  drawEllipse(0, 0, 16, 22, mainColor, darkerColor, 2);

  // White belly highlight
  ctx.beginPath();
  ctx.ellipse(0, 4, 10, 12, 0, 0, Math.PI);
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();

  // Wings (round)
  ctx.beginPath();
  ctx.ellipse(-24, 6, 14, 7, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = darkerColor; ctx.fill();
  ctx.strokeStyle = darkenColor(mainColor, 0.5); ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(24, 6, 14, 7, 0.2, 0, Math.PI * 2);
  ctx.fillStyle = darkerColor; ctx.fill();
  ctx.strokeStyle = darkenColor(mainColor, 0.5); ctx.lineWidth = 1.5; ctx.stroke();

  // Wing highlights
  drawEllipse(-24, 4, 8, 3, 'rgba(255,255,255,0.3)');
  drawEllipse(24, 4, 8, 3, 'rgba(255,255,255,0.3)');

  // Cockpit (big eye-like window)
  drawEllipse(0, -8, 10, 10, '#E3F2FD', '#90CAF9', 2);
  // Cockpit shine
  drawEllipse(-3, -11, 4, 3, 'rgba(255,255,255,0.7)');

  // Nose tip
  drawCircle(0, -20, 4, '#FFB74D', '#F57C00', 1.5);

  // Shield effect
  if (shield > 0) {
    const pulse = 0.6 + Math.sin(time * 0.15) * 0.2;
    ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(100,255,218,${pulse})`; ctx.lineWidth = 3;
    ctx.setLineDash([8, 4]); ctx.stroke(); ctx.setLineDash([]);
  }

  // Speed boost glow
  if (speedBoost > 0) {
    ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(105,240,174,0.15)'; ctx.fill();
  }

  ctx.restore();
}

// Color helpers
function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}
function lightenColor(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,Math.floor(r+(255-r)*factor))},${Math.min(255,Math.floor(g+(255-g)*factor))},${Math.min(255,Math.floor(b+(255-b)*factor))})`;
}

// ============ LEVEL CONFIG ============
function getLevelConfig(level) {
  const L = Math.min(level, 10);
  return {
    level: L,
    enemyHpMult: 0.6 + L * 0.2,
    enemySpeedMult: (0.5 + L * 0.12) * 0.7,
    spawnInterval: Math.max(25, 100 - L * 6),
    extraSpawnChance: Math.min(0.35, Math.max(0, (L - 3) * 0.06)),
    enemyShootMult: (0.7 + L * 0.12) * 0.7,
    enemyBulletSpeed: (2.5 + L * 0.4) * 0.7,
    killsToWin: 10 + L * 5,
    tankMinLevel: 5, heliMinLevel: 3, bigPlaneMinLevel: 3,
    bossHp: 30 + L * 15,
    bossType: L <= 3 ? 0 : L <= 6 ? 1 : 2,
    theme: LEVEL_THEMES[(L - 1) % 10],
  };
}

// ============ BACKGROUND ELEMENTS ============
class BgCloud {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 30 + Math.random() * 50;
    this.speed = 0.2 + Math.random() * 0.3;
    this.alpha = 0.3 + Math.random() * 0.3;
  }
  update() { this.y += this.speed; if (this.y > H + 50) { this.y = -60; this.x = Math.random() * W; } }
  draw() { drawCloud(this.x, this.y, this.size, this.alpha); }
}

class Rainbow {
  constructor() { this.reset(); this.y = Math.random() * H; }
  reset() { this.x = Math.random() * W; this.y = -40; this.speed = 0.15; this.alpha = 0.15; this.w = 80 + Math.random() * 60; }
  update() { this.y += this.speed; if (this.y > H + 50) this.reset(); }
  draw() {
    ctx.globalAlpha = this.alpha;
    const colors = ['#FF6B6B','#FFB74D','#FFD54F','#81C784','#64B5F6','#CE93D8'];
    colors.forEach((c, i) => {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.w - i * 4, Math.PI, 0);
      ctx.strokeStyle = c; ctx.lineWidth = 3; ctx.stroke();
    });
    ctx.globalAlpha = 1;
  }
}

// ============ STAR COLLECTIBLE ============
class StarCollectible {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 30;
    this.y = y + (Math.random() - 0.5) * 20;
    this.speed = 0.8;
    this.age = 0;
    this.w = 16; this.h = 16;
    this.collected = false;
  }
  update(playerX, playerY) {
    this.age++;
    const magnetRange = hasEquip('magnet') ? 200 : 100;
    const dx = playerX - this.x, dy = playerY - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < magnetRange) {
      const pullSpeed = dist < 40 ? 8 : 3;
      this.x += (dx / dist) * pullSpeed;
      this.y += (dy / dist) * pullSpeed;
    } else {
      this.y += this.speed;
    }
    if (dist < 20) {
      this.collected = true;
    }
  }
  draw(time) {
    const rot = (this.age + time) * 0.08;
    const bounce = Math.sin(this.age * 0.12) * 2;
    ctx.globalAlpha = 0.9;
    // Glow
    const glow = ctx.createRadialGradient(this.x, this.y + bounce, 0, this.x, this.y + bounce, 14);
    glow.addColorStop(0, 'rgba(255,215,0,0.4)');
    glow.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(this.x - 14, this.y + bounce - 14, 28, 28);
    drawStar(this.x, this.y + bounce, 10, 5, '#FFD700', rot);
    drawStar(this.x, this.y + bounce, 5, 5, '#FFF9C4', rot);
    ctx.globalAlpha = 1;
  }
}

// ============ PLAYER ============
class Player {
  constructor() {
    this.w = 50; this.h = 50;
    this.x = W / 2; this.y = H - 100;

    const plane = PLANES[selectedPlane] || PLANES.blue;
    const baseHp = 8 + plane.hpMod + (hasEquip('armor') ? 2 : 0);
    this.maxPlayerHp = baseHp;

    this.shootTimer = 0;
    this.shootInterval = Math.floor(14 * plane.shootMod * (hasEquip('rapid') ? 0.8 : 1));
    this.bulletLevel = 1;
    this.shield = 0; this.speedBoost = 0; this.invincible = 0;

    const missileMult = (plane.special === 'doubleMissile' ? 0.5 : 1) * (hasEquip('missile') ? 0.5 : 1);
    this.missileInterval = Math.floor(300 * missileMult);
    this.missileTimer = Math.floor(this.missileInterval * 0.83);
    this.hasMissile = true; this.missileLevel = 0;

    this.speedMod = plane.speedMod;
    this.canRevive = plane.special === 'revive';
    this.isEW = plane.special === 'ew';
    this.decoyTimer = 0; this.decoyInterval = 180; // spawn decoy every 3s
    this.bulletDamage = 1 + (hasEquip('bigbullet') ? 1 : 0);
  }
  draw(time) { drawPlayer(this.x, this.y, this.invincible, this.shield, this.speedBoost, time); }
  shoot(bullets) {
    this.shootTimer++;
    if (this.invincible > 0) this.invincible--;
    if (this.shield > 0) this.shield--;
    if (this.speedBoost > 0) this.speedBoost--;
    const interval = this.speedBoost > 0 ? Math.floor(this.shootInterval * 0.6) : this.shootInterval;
    if (this.shootTimer < interval) return;
    this.shootTimer = 0; sfxShoot();
    const bx = this.x, by = this.y - 22, bspd = -6;
    if (this.bulletLevel >= 1) bullets.push({x:bx, y:by, vx:0, vy:bspd, r:5});
    if (this.bulletLevel >= 2) {
      bullets.push({x:bx-14, y:by+6, vx:0, vy:bspd, r:4});
      bullets.push({x:bx+14, y:by+6, vx:0, vy:bspd, r:4});
    }
    if (this.bulletLevel >= 3) {
      bullets.push({x:bx-8, y:by, vx:-1.2, vy:bspd*0.95, r:4});
      bullets.push({x:bx+8, y:by, vx:1.2, vy:bspd*0.95, r:4});
    }
  }
  launchMissile(missiles, enemies) {
    this.missileTimer++;
    const interval = this.missileLevel >= 2 ? Math.floor(this.missileInterval * 0.6) : this.missileInterval;
    if (this.missileTimer >= interval && enemies.length > 0) {
      this.missileTimer = 0;
      missiles.push(new Missile(this.x - 12, this.y - 15));
      if (this.missileLevel >= 2) missiles.push(new Missile(this.x + 12, this.y - 15));
      if (typeof sfxShoot === 'function') sfxShoot();
    }
  }
}

// ============ ENEMY ============
class Enemy {

    this.shootTimer = Math.random() * 60;
    this.hitFlash = 0;
    const hm = cfg.enemyHpMult, sm = cfg.enemySpeedMult, bs = cfg.enemyBulletSpeed;
    switch(type) {
      case 0: this.w = 32; this.h = 32; this.speed = (0.8+Math.random()*0.5)*sm; this.hp = Math.ceil(1*hm); this.maxHp = this.hp; this.score = 10;
        this.shootInterval = Math.max(20, Math.floor(120/cfg.enemyShootMult)); this.canShoot = cfg.level > 1; this.bulletSpeed = bs; break;
      case 1: this.w = 48; this.h = 44; this.speed = (0.3+Math.random()*0.2)*sm; this.hp = Math.ceil(5*hm); this.maxHp = this.hp; this.score = 50;
        this.shootInterval = Math.max(16, Math.floor(75/cfg.enemyShootMult)); this.canShoot = true; this.bulletSpeed = bs; break;
      case 2: this.w = 50; this.h = 38; this.speed = (0.2+Math.random()*0.1)*sm; this.hp = Math.ceil(8*hm); this.maxHp = this.hp; this.score = 80;
        this.shootInterval = Math.max(14, Math.floor(52/cfg.enemyShootMult)); this.canShoot = true; this.bulletSpeed = bs + 0.4; break;
      case 3: this.w = 44; this.h = 40; this.speed = (0.4+Math.random()*0.2)*sm; this.hp = Math.ceil(3*hm); this.maxHp = this.hp; this.score = 35;
        this.shootInterval = Math.max(16, Math.floor(90/cfg.enemyShootMult)); this.canShoot = true; this.bulletSpeed = bs;
        this.moveDir = Math.random() > 0.5 ? 1 : -1; break;
    }
  }
  update(enemyBullets, playerX) {
    this.y += this.speed; this.wobble += 0.04;
    if (this.hitFlash > 0) this.hitFlash--;
    if (this.type === 0) this.x += Math.sin(this.wobble) * 0.8;
    if (this.type === 3) { this.x += this.moveDir * 1; if (this.x < 30 || this.x > W - 30) this.moveDir *= -1; }
    if (this.canShoot) {
      this.shootTimer++;
      if (this.shootTimer >= this.shootInterval) {
        this.shootTimer = 0;
        const dx = playerX - this.x, dy = 200, len = Math.sqrt(dx*dx+dy*dy), spd = this.bulletSpeed;
        if (this.type === 2) {
          enemyBullets.push({x:this.x, y:this.y+this.h/2, vx:0, vy:spd, r:5});
          enemyBullets.push({x:this.x-8, y:this.y+this.h/2, vx:-0.8, vy:spd, r:4});
          enemyBullets.push({x:this.x+8, y:this.y+this.h/2, vx:0.8, vy:spd, r:4});
        } else {
          enemyBullets.push({x:this.x, y:this.y+this.h/2, vx:dx/len*spd, vy:dy/len*spd, r:4});
        }
      }
    }
  }
  draw(time) {
    const flash = this.hitFlash > 0 ? '#fff' : null;
    switch(this.type) {
      case 0: drawEnemySmall(this.x, this.y, time, flash); break;
      case 1: drawEnemyBig(this.x, this.y, time, flash); break;
      case 2: drawEnemyTank(this.x, this.y, time, flash); break;
      case 3: drawEnemyHeli(this.x, this.y, time, flash); break;
    }
    if (this.maxHp > 1) {
      const bw = this.w + 8, bx = this.x - bw/2, by = this.y - this.h/2 - 10;
      drawRoundRect(bx, by, bw, 5, 2, 'rgba(0,0,0,0.2)');
      const fillW = Math.max(2, bw * (this.hp/this.maxHp));
      drawRoundRect(bx, by, fillW, 5, 2, this.hp/this.maxHp > 0.3 ? '#81C784' : '#FF8A65');
    }
  }
}

// ============ BOSS ============
class Boss {
  constructor(type, cfg) {
    this.type = type; this.x = W / 2; this.y = -80; this.targetY = 90;
    this.w = 80; this.h = 60;
    this.maxHp = cfg.bossHp; this.hp = this.maxHp;
    this.score = 500 + cfg.level * 100;
    this.phase = 1; this.attackTimer = 0; this.attackPattern = 0;
    this.moveDir = 1; this.moveSpeed = 0.5;
    this.entered = false; this.hitFlash = 0; this.summonTimer = 0;
    this.cfg = cfg; this.alive = true; this.deathTimer = 0;
    this.names = ['🐙 巨型章鱼', '🦀 机械螃蟹', '🐋 太空鲸鱼'];
  }
  get enraged() { return this.hp <= this.maxHp * 0.5; }
  update(enemyBullets, enemies, playerX, playerY) {
    if (!this.alive) return;
    if (this.hitFlash > 0) this.hitFlash--;
    if (!this.entered) { this.y += 0.8; if (this.y >= this.targetY) { this.y = this.targetY; this.entered = true; } return; }
    if (this.enraged && this.phase === 1) { this.phase = 2; this.moveSpeed = 0.8; if (game) { game.slowMo = 5; triggerScreenFlash(); } }
    const speed = this.enraged ? this.moveSpeed * 1.3 : this.moveSpeed;
    this.x += this.moveDir * speed;
    if (this.x < 60 || this.x > W - 60) this.moveDir *= -1;
    this.attackTimer++;
    const interval = this.enraged ? 45 : 70;
    if (this.attackTimer >= interval) { this.attackTimer = 0; this.attackPattern = (this.attackPattern + 1) % 3; this.doAttack(enemyBullets, playerX, playerY); }
    this.summonTimer++;
    if (this.summonTimer >= (this.enraged ? 250 : 400)) {
      this.summonTimer = 0;
      const t = Math.random() < 0.5 ? 0 : 3;
      enemies.push(new Enemy(t, this.cfg, this.x - 40, this.y + 20));
      enemies.push(new Enemy(t, this.cfg, this.x + 40, this.y + 20));
    }
  }
  doAttack(enemyBullets, px, py) {
    const bs = this.cfg.enemyBulletSpeed * 0.9;
    switch(this.attackPattern) {
      case 0:
        for (let i = -2; i <= 2; i++) {
          const a = Math.PI/2 + i * 0.25;
          enemyBullets.push({x:this.x, y:this.y+20, vx:Math.cos(a)*bs, vy:Math.sin(a)*bs, r:6, boss:true});
        }
        if (this.enraged) for (let i = -3; i <= 3; i++) { const a = Math.PI/2+i*0.18; enemyBullets.push({x:this.x, y:this.y+20, vx:Math.cos(a)*bs*0.7, vy:Math.sin(a)*bs*0.7, r:4, boss:true}); }
        break;
      case 1:
        { const dx=px-this.x, dy=py-this.y, len=Math.sqrt(dx*dx+dy*dy)||1;
          enemyBullets.push({x:this.x, y:this.y+20, vx:dx/len*bs, vy:dy/len*bs, r:6, boss:true});
          if (this.enraged) { enemyBullets.push({x:this.x-15, y:this.y+20, vx:dx/len*bs*0.85, vy:dy/len*bs*0.85, r:5, boss:true}); enemyBullets.push({x:this.x+15, y:this.y+20, vx:dx/len*bs*0.85, vy:dy/len*bs*0.85, r:5, boss:true}); }
        } break;
      case 2:
        { const count = this.enraged ? 10 : 7;
          for (let i = 0; i < count; i++) { const a = (Math.PI*2/count)*i+this.attackTimer*0.08; enemyBullets.push({x:this.x, y:this.y, vx:Math.cos(a)*bs*0.7, vy:Math.sin(a)*bs*0.7, r:4, boss:true}); }
        } break;
    }
  }
  draw(time) {
    if (!this.alive) return;
    const flash = this.hitFlash > 0 ? '#fff' : null;
    switch(this.type) {
      case 0: drawBoss0(this.x, this.y, time, this.enraged, flash); break;
      case 1: drawBoss1(this.x, this.y, time, this.enraged, flash); break;
      case 2: drawBoss2(this.x, this.y, time, this.enraged, flash); break;
    }
  }
  takeDamage(dmg) { this.hp -= dmg; this.hitFlash = 3; if (this.hp <= 0) { this.hp = 0; this.alive = false; return true; } return false; }
}

const FORMATIONS = {
  vShape(cx, count, cfg) { const enemies = [], type = getEnemyType(cfg); for (let i = 0; i < count; i++) { const side = i%2===0?-1:1, row = Math.floor(i/2); enemies.push(new Enemy(type, cfg, cx+side*(row+1)*35, -40-row*30)); } return enemies; },
  line(cx, count, cfg) { const enemies = [], type = getEnemyType(cfg), startX = cx-(count-1)*25; for (let i = 0; i < count; i++) enemies.push(new Enemy(type, cfg, startX+i*50, -40)); return enemies; },
  circle(cx, count, cfg) { const enemies = [], type = getEnemyType(cfg), radius = 55; for (let i = 0; i < count; i++) { const a = (Math.PI*2/count)*i-Math.PI/2; enemies.push(new Enemy(type, cfg, cx+Math.cos(a)*radius, -60+Math.sin(a)*radius)); } return enemies; }
};
function getEnemyType(cfg) {
  const r = Math.random();
  if (cfg.level < cfg.heliMinLevel && cfg.level < cfg.bigPlaneMinLevel) return 0;
  if (cfg.level < cfg.tankMinLevel) return r < 0.5 ? 0 : r < 0.75 ? 1 : 3;
  return r < 0.3 ? 0 : r < 0.5 ? 1 : r < 0.7 ? 2 : 3;
}

  update() { if (this.timer > 0) { this.timer--; if (this.timer <= 0 && this.count >= 3) this.breakTimer = 60; if (this.timer <= 0) this.count = 0; } if (this.breakTimer > 0) this.breakTimer--; }
  getMultiplier() { return this.count >= 2 ? this.count : 1; }

// ============ MISSILE ============
class Missile {
  constructor(x, y) {
    this.x = x; this.y = y; this.w = 12; this.h = 20;
    this.speed = 3; this.maxSpeed = 6; this.vx = 0; this.vy = -3;
    this.turnRate = 0.15; this.life = 240; this.damage = 3; this.trail = [];
  }
  findTarget(enemies, boss) {
    let closest = null, minDist = Infinity;
    const targets = boss && boss.alive ? [...enemies, boss] : enemies;
    for (const e of targets) { const dx = e.x-this.x, dy = e.y-this.y, dist = dx*dx+dy*dy; if (dist < minDist) { minDist = dist; closest = e; } }
    return closest;
  }
  update(enemies, boss) {
    this.life--;
    this.trail.push({x:this.x, y:this.y, life:10});
    this.trail = this.trail.filter(t => { t.life--; return t.life > 0; });
    const target = this.findTarget(enemies, boss);
    if (target) { const dx=target.x-this.x, dy=target.y-this.y, dist=Math.sqrt(dx*dx+dy*dy); this.vx+=(dx/dist*this.maxSpeed-this.vx)*this.turnRate; this.vy+=(dy/dist*this.maxSpeed-this.vy)*this.turnRate; }
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if (spd > this.maxSpeed) { this.vx=this.vx/spd*this.maxSpeed; this.vy=this.vy/spd*this.maxSpeed; }
    if (spd < this.speed && spd > 0) { this.vx=this.vx/spd*this.speed; this.vy=this.vy/spd*this.speed; }
    this.x += this.vx; this.y += this.vy;
  }
  draw() {
    this.trail.forEach(t => {
      const a = t.life / 10;
      drawCircle(t.x, t.y, 3 * a, `rgba(255,183,77,${a * 0.5})`);
    });
    const angle = Math.atan2(this.vy, this.vx);
    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(angle + Math.PI/2);
    drawRoundRect(-4, -10, 8, 20, 4, '#fff');
    drawCircle(0, -10, 5, '#FF7043');
    ctx.beginPath(); ctx.moveTo(-4, 10); ctx.quadraticCurveTo(0, 20 + Math.random()*6, 4, 10);
    ctx.fillStyle = '#FFE082'; ctx.fill();
    ctx.restore();
  }
}

// ============ BOUNCE BALL ============
class BounceBall {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.r = 10; this.life = 600; // 10 seconds
    this.damage = 2;
    const angle = Math.random() * Math.PI * 2;
    this.speed = 7;
    this.vx = Math.cos(angle) * this.speed;
    this.vy = Math.sin(angle) * this.speed;
    this.trail = [];
  }
  update(enemies, boss, smf) {
    this.x += this.vx * smf; this.y += this.vy * smf;
    this.life--;
    // Bounce off walls
    if (this.x - this.r < 0) { this.x = this.r; this.vx = Math.abs(this.vx); }
    if (this.x + this.r > W) { this.x = W - this.r; this.vx = -Math.abs(this.vx); }
    if (this.y - this.r < 0) { this.y = this.r; this.vy = Math.abs(this.vy); }
    if (this.y + this.r > H) { this.y = H - this.r; this.vy = -Math.abs(this.vy); }
    // Trail
    this.trail.push({x:this.x, y:this.y});
    if (this.trail.length > 12) this.trail.shift();
    // Hit enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const dx = this.x - e.x, dy = this.y - e.y;
      if (Math.sqrt(dx*dx+dy*dy) < this.r + (e.w||20)/2) {
        e.hp -= this.damage;
        if (e.hp <= 0) return {killed: i};
      }
    }
    // Hit boss
    if (boss && boss.alive && boss.entered) {
      const dx = this.x - boss.x, dy = this.y - boss.y;
      if (Math.sqrt(dx*dx+dy*dy) < this.r + 40) {
        boss.hp -= this.damage * 0.5;
        boss.hitFlash = 2;
        if (boss.hp <= 0) { boss.hp = 0; boss.alive = false; return 'boss_dead'; }
      }
    }
    return null;
  }
  draw(time) {
    // Trail
    this.trail.forEach((p, i) => {
      const a = i / this.trail.length * 0.4;
      ctx.globalAlpha = a;
      drawCircle(p.x, p.y, this.r * (i/this.trail.length), '#FF5252');
      ctx.globalAlpha = 1;
    });
    // Ball
    const grd = ctx.createRadialGradient(this.x-3, this.y-3, 2, this.x, this.y, this.r);
    grd.addColorStop(0, '#FF8A80'); grd.addColorStop(0.6, '#FF1744'); grd.addColorStop(1, '#B71C1C');
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();
    // Shine
    ctx.beginPath(); ctx.arc(this.x-3, this.y-3, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fill();
    // Timer ring
    const pct = this.life / 600;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r+3, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
    ctx.strokeStyle = `rgba(255,100,100,${0.5+pct*0.5})`; ctx.lineWidth = 2; ctx.stroke();
  }
  get done() { return this.life <= 0; }
}

class BlackHole {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.radius = 50; this.life = 9999; this.maxLife = 9999;
    this.angle = 0; this.speed = 2;
  }
  update(enemies, boss, game) {
    const sm = game.slowMotion ? 0.2 : 1;
    this.y -= this.speed * sm;
    this.angle += 0.08 * sm;
    if (this.y < -60) return 'expired';
    // Absorb enemy bullets within 100px
    if (game.enemyBullets) {
      for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
        const b = game.enemyBullets[i];
        const dx = this.x - b.x, dy = this.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          const pull = 5 * sm;
          b.x += (dx / dist) * pull;
          b.y += (dy / dist) * pull;
          if (dist < 20) game.enemyBullets.splice(i, 1);
        }
      }
    }
    // Attract & kill normal enemies within 100px
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const dx = this.x - e.x, dy = this.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        const pull = 4 * sm;
        e.x += (dx / dist) * pull;
        e.y += (dy / dist) * pull;
        if (dist < 15) {
          // Kill enemy
          game.combo.registerKill();
          game.score += e.score * game.combo.getMultiplier();
          game.killCount++;
          game.explosions.push(new Explosion(e.x, e.y, '#CE93D8', e.type >= 1));
          sfxExplosion(e.type >= 1);
          const starCounts = { 0: 1, 1: 3, 2: 3, 3: 2 };
          spawnStars(e.x, e.y, starCounts[e.type] || 1);
          enemies.splice(i, 1);
        }
      }
    }
    // Damage boss
    if (boss && boss.alive && boss.entered) {
      const dx = this.x - boss.x, dy = this.y - boss.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        boss.hp -= 0.5 * sm;
        boss.hitFlash = 2;
        if (boss.hp <= 0) { boss.hp = 0; boss.alive = false; return 'boss_dead'; }
      }
    }
    return null;
  }
  draw(time) {
    const scale = 1;
    const r = this.radius * scale;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    // Outer glow
    const glow = ctx.createRadialGradient(0, 0, r * 0.1, 0, 0, r * 1.2);
    glow.addColorStop(0, 'rgba(80,0,120,0.7)');
    glow.addColorStop(0.5, 'rgba(120,40,180,0.3)');
    glow.addColorStop(1, 'rgba(80,0,120,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.2, 0, Math.PI * 2); ctx.fill();
    // Spiral arms
    for (let arm = 0; arm < 4; arm++) {
      ctx.beginPath();
      const armOff = (Math.PI * 2 / 4) * arm;
      for (let t = 0; t < 3; t += 0.05) {
        const sr = t * r * 0.33;
        const sa = t * 2.5 + armOff;
        const px = Math.cos(sa) * sr, py = Math.sin(sa) * sr;
        t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.strokeStyle = `rgba(180,100,255,${0.6 * scale})`;
      ctx.lineWidth = 3 * scale; ctx.stroke();
    }
    // Center dark core
    const core = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.35);
    core.addColorStop(0, 'rgba(0,0,0,0.9)');
    core.addColorStop(1, 'rgba(60,0,80,0.3)');
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2); ctx.fill();
    // Outer ring distortion
    ctx.beginPath(); ctx.arc(0, 0, r * 0.85, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(200,150,255,${0.4 * scale})`; ctx.lineWidth = 2 * scale; ctx.stroke();
    ctx.restore();
  }
  get done() { return this.y < -60; }
}

// ============ POWERUP ============
class PowerUp {
  constructor(x, y) {
    const r = Math.random();
    if (r < 0.25) this.type = 0;
    else if (r < 0.4) this.type = 1;
    else if (r < 0.55) this.type = 2;
    else if (r < 0.7) this.type = 3;

    else this.type = 5;
    this.x = x; this.y = y; this.w = 24; this.h = 24;
    this.speed = 1; this.age = 0;
    this.labels = ['W+','T+','🛡️','❤️','⚡','🚀'];
    this.colors = ['#FFD700','#FF9800','#64FFDA','#FF80AB','#69F0AE','#FF7043'];
  }
  update() { this.y += this.speed; this.age++; }
  draw() {
    const bounce = Math.sin(this.age * 0.1) * 3;
    const y = this.y + bounce;
    ctx.beginPath(); ctx.arc(this.x, y, 16, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,0.3)`; ctx.fill();
    const c = this.colors[this.type];
    switch(this.type) {
      case 0: case 1:
        drawStar(this.x, y, 12, 6, c, this.age * 0.05);
        drawStar(this.x, y, 6, 6, '#fff', this.age * 0.05);
        break;
      case 2:
        ctx.save(); ctx.translate(this.x, y); ctx.rotate(Math.PI/4);
        drawRoundRect(-8, -8, 16, 16, 3, c);
        drawRoundRect(-4, -4, 8, 8, 2, '#fff');
        ctx.restore(); break;
      case 3:
        drawHeart(this.x, y - 4, 14, c);
        break;
      case 4:
        ctx.beginPath(); ctx.moveTo(this.x-2, y-12); ctx.lineTo(this.x-6, y); ctx.lineTo(this.x, y-2);
        ctx.lineTo(this.x+2, y+12); ctx.lineTo(this.x+6, y); ctx.lineTo(this.x, y+2); ctx.closePath();
        ctx.fillStyle = c; ctx.fill(); break;
      case 5:
        drawRoundRect(this.x-4, y-10, 8, 20, 4, c);
        drawCircle(this.x, y-10, 4, '#FFD54F');
        break;
    }
  }
  apply(player) {
    sfxPickup();
    switch(this.type) {
      case 0: player.bulletLevel = Math.max(player.bulletLevel, 2); break;
      case 1: player.bulletLevel = 3; break;
      case 2: player.shield = 300; break;
      case 3: return 'life';
      case 4: player.speedBoost = 360; break;
      case 5: player.hasMissile = true; player.missileLevel = Math.min(player.missileLevel+1, 2); break;
    }
    return this.labels[this.type];
  }
}

// ============ EXPLOSION ============
class Explosion {
  constructor(x, y, color, big) {
    this.particles = [];
    const count = big ? 20 : 12;
    const colors = ['#FFE082','#FFB74D','#FF7043','#64FFDA','#CE93D8','#81C784','#64D2FF','#FF80AB','#FFD54F'];
    for (let i = 0; i < count; i++) {
      const angle = Math.random()*Math.PI*2, speed = (big?2:1)+Math.random()*(big?4:3);
      const type = Math.random() < 0.3 ? 'star' : Math.random() < 0.5 ? 'heart' : 'circle';
      this.particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:20+Math.random()*15,
        color:colors[Math.floor(Math.random()*colors.length)], size: 3+Math.random()*4, type, rot: Math.random()*Math.PI*2, rotSpd: (Math.random()-0.5)*0.2});
    }
  }
  update() { this.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;p.vx*=0.97;p.rot+=p.rotSpd;}); this.particles=this.particles.filter(p=>p.life>0); }
  draw() {
    this.particles.forEach(p => {
      const alpha = Math.min(1, p.life / 10);
      ctx.globalAlpha = alpha;
      if (p.type === 'star') drawStar(p.x, p.y, p.size, 5, p.life > 15 ? '#fff' : p.color, p.rot);
      else if (p.type === 'heart') drawHeart(p.x, p.y, p.size, p.life > 15 ? '#fff' : p.color);
      else drawCircle(p.x, p.y, p.size * 0.6, p.life > 15 ? '#fff' : p.color);
      ctx.globalAlpha = 1;
    });
  }
  get done() { return this.particles.length === 0; }
}

class MegaExplosion {
  constructor(x, y) {
    this.particles = [];
    const colors = ['#fff','#FFE082','#FFB74D','#FF80AB','#CE93D8','#64FFDA','#81C784','#64D2FF','#FF6B6B','#FFD54F'];
    for (let layer = 0; layer < 5; layer++) {
      const count = 20 + layer * 8; const delay = layer * 5;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI*2/count)*i;
        const speed = (2 + layer * 1) + Math.random() * 2;
        const type = Math.random() < 0.4 ? 'star' : Math.random() < 0.5 ? 'heart' : 'circle';
        this.particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:25+Math.random()*15+delay,delay,
          color:colors[Math.floor(Math.random()*colors.length)],size:4+Math.random()*6, type, rot:Math.random()*Math.PI*2, rotSpd:(Math.random()-0.5)*0.15});
      }
    }
  }
  update() { this.particles.forEach(p=>{if(p.delay>0){p.delay--;return;}p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.life--;p.vx*=0.98;p.rot+=p.rotSpd;}); this.particles=this.particles.filter(p=>p.life>0||p.delay>0); }
  draw() {
    this.particles.forEach(p => {
      if (p.delay > 0) return;
      const alpha = Math.min(1, p.life / 10);
      ctx.globalAlpha = alpha;
      if (p.type === 'star') drawStar(p.x, p.y, p.size, 5, p.life > 18 ? '#fff' : p.color, p.rot);
      else if (p.type === 'heart') drawHeart(p.x, p.y, p.size, p.life > 18 ? '#fff' : p.color);
      else drawCircle(p.x, p.y, p.size * 0.6, p.life > 18 ? '#fff' : p.color);
      ctx.globalAlpha = 1;
    });
  }
  get done() { return this.particles.length === 0; }
}

function collides(a, b) { return Math.abs(a.x-b.x)<(a.w+b.w)/2 && Math.abs(a.y-b.y)<(a.h+b.h)/2; }

function drawText(text, x, y, color, size, outline) {
  ctx.font = `bold ${size||16}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (outline) { ctx.strokeStyle = outline; ctx.lineWidth = 4; ctx.lineJoin = 'round'; ctx.strokeText(text, x, y); }
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillText(text, x+2, y+2);
  ctx.fillStyle = color; ctx.fillText(text, x, y);
}

function drawGradientBg(theme) {
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, theme.bg1);
  grd.addColorStop(1, theme.bg2);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function hideAllScreens() {
  ['main-menu','start-screen','level-clear','gameover-screen','hangar-screen','shop-screen'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
}

function showMainMenu() {
  hideAllScreens(); stopBGM();
  if (game) game.running = false;
  document.getElementById('ui').classList.add('hidden');
  document.getElementById('boss-hp-bar').style.display = 'none';
  document.getElementById('boss-name').style.display = 'none';

  document.getElementById('combo-glow').style.opacity = 0;
  document.getElementById('menu-stars').textContent = `⭐ ${totalStars}`;
  document.getElementById('main-menu').classList.remove('hidden');
}

function showHangar() {
  hideAllScreens();
  document.getElementById('hangar-stars').textContent = `⭐ ${totalStars}`;
  const list = document.getElementById('hangar-list');
  list.innerHTML = '';
  for (const [id, p] of Object.entries(PLANES)) {
    const owned = ownedPlanes.includes(id);
    const selected = selectedPlane === id;
    const item = document.createElement('div');
    item.className = 'shop-item';
    item.innerHTML = `
      <div class="plane-dot" style="background:${p.color}"></div>
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-desc">${p.desc}</div>
      </div>
      ${owned
        ? `<button class="btn-small ${selected ? 'selected' : ''}" onclick="selectPlane('${id}')">${selected ? '✅ 已选' : '选择'}</button>`
        : `<button class="btn-small ${totalStars >= p.cost ? '' : 'disabled'}" onclick="buyPlane('${id}')">购买 ${p.cost}⭐</button>`
      }
    `;
    list.appendChild(item);
  }
  document.getElementById('hangar-screen').classList.remove('hidden');
}

function showShop() {
  hideAllScreens();
  document.getElementById('shop-stars').textContent = `⭐ ${totalStars}`;
  const list = document.getElementById('shop-list');
  list.innerHTML = '';
  for (const eq of EQUIPS) {
    const owned = ownedEquips.includes(eq.id);
    const item = document.createElement('div');
    item.className = 'shop-item';
    item.innerHTML = `
      <div class="item-info">
        <div class="item-name">${eq.name}</div>
        <div class="item-desc">${eq.desc}</div>
      </div>
      ${owned
        ? `<button class="btn-small selected">✅ 已购</button>`
        : `<button class="btn-small ${totalStars >= eq.cost ? '' : 'disabled'}" onclick="buyEquip('${eq.id}')">购买 ${eq.cost}⭐</button>`
      }
    `;
    list.appendChild(item);
  }
  document.getElementById('shop-screen').classList.remove('hidden');
}

function buyPlane(id) {
  const p = PLANES[id];
  if (!p || ownedPlanes.includes(id) || totalStars < p.cost) return;
  totalStars -= p.cost;
  ownedPlanes.push(id);
  selectedPlane = id;
  saveProgress();
  showHangar();
}

function selectPlane(id) {
  if (!ownedPlanes.includes(id)) return;
  selectedPlane = id;
  saveProgress();
  showHangar();
}

function buyEquip(id) {
  const eq = EQUIPS.find(e => e.id === id);
  if (!eq || ownedEquips.includes(id) || totalStars < eq.cost) return;
  totalStars -= eq.cost;
  ownedEquips.push(id);
  saveProgress();
  showShop();
}

// ============ LEVEL SELECT ============
function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    const cleared = clearedLevels.includes(i);
    const locked = i > maxUnlocked;
    btn.className = 'level-btn' + (locked ? ' locked' : '') + (cleared ? ' cleared' : '');
    btn.innerHTML = locked ? '🔒' : `${i}<span>${cleared ? '⭐' : '·'}</span>`;
    if (!locked) btn.onclick = () => playLevel(i);
    grid.appendChild(btn);
  }
  document.getElementById('level-hint').textContent = maxUnlocked > 10 ? '🎉 全部通关! 🎉' : `已解锁: ${maxUnlocked}/10`;
}

function showLevelSelect() {
  hideAllScreens(); stopBGM();
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('ui').classList.add('hidden');
  document.getElementById('boss-hp-bar').style.display = 'none';
  document.getElementById('boss-name').style.display = 'none';

    screenShake: 0, shakeX: 0, shakeY: 0,

function gameOver() {

function spawnEnemy() { game.enemies.push(new Enemy(getEnemyType(game.cfg), game.cfg)); }
function spawnFormation() {

  const count = 3 + Math.floor(cfg.level / 3);

// Star spawn helper
function spawnStars(x, y, count) {
  if (!game) return;
  for (let i = 0; i < count; i++) {
    game.stars.push(new StarCollectible(x, y));
  }
}

// ============ MAIN LOOP ============
function loop() {
  if (!game || !game.running) return;
  const g = game;

  if (g.slowMo > 0) { g.slowMoAccum += 0.3; g.slowMo--; if (g.slowMoAccum < 1) { requestAnimationFrame(loop); return; } g.slowMoAccum -= 1; }

  const theme = g.cfg.theme;
  const time = g.frame;

  if (g.screenShake > 0) { g.screenShake--; g.shakeX = (Math.random()-0.5)*6; g.shakeY = (Math.random()-0.5)*6; } else { g.shakeX = 0; g.shakeY = 0; }

  ctx.save();
  ctx.translate(g.shakeX, g.shakeY);

  drawGradientBg(theme);

  // Slow motion speed factor
  const smf = g.slowMotion ? 0.2 : 1;

  // Slow motion dark overlay
  if (g.slowMotion) {
    ctx.fillStyle = 'rgba(0,0,20,0.25)';
    ctx.fillRect(0, 0, W, H);
  }

  g.bgClouds.forEach(c => { const origSpeed = c.speed; c.speed *= smf; c.update(); c.speed = origSpeed; c.draw(); });
  g.rainbow.update(); g.rainbow.draw();

  if (g.levelAnnounce > 0) {
    g.levelAnnounce--;
    if (g.levelAnnounce > 30 || Math.floor(g.levelAnnounce/4)%2) {
      drawText(`STAGE ${g.cfg.level}`, W/2, H/2 - 20, 'rgba(255,255,255,0.6)', 20, 'rgba(0,0,0,0.15)');
      drawText(`消灭 ${g.cfg.killsToWin} 个 + BOSS`, W/2, H/2 + 8, 'rgba(255,255,255,0.5)', 13);
    }
  }

  // Player movement
  const baseMoveSpeed = g.player.speedBoost > 0 ? 0.2 : 0.15;
  const moveSpeed = baseMoveSpeed * g.player.speedMod;
  if (targetX !== null) { g.player.x += (targetX - g.player.x) * moveSpeed; g.player.y += (targetY - g.player.y) * moveSpeed; }
  g.player.x = Math.max(30, Math.min(W-30, g.player.x));
  g.player.y = Math.max(30, Math.min(H-30, g.player.y));

  g.player.shoot(g.bullets);
  g.player.launchMissile(g.missiles, g.enemies);

  // Update bullets
  g.bullets = g.bullets.filter(b => { b.x+=b.vx*smf; b.y+=b.vy*smf; return b.y>-10&&b.x>-10&&b.x<W+10; });
  g.enemyBullets = g.enemyBullets.filter(b => { b.x+=b.vx*smf; b.y+=b.vy*smf; return b.y<H+10&&b.y>-10&&b.x>-10&&b.x<W+10; });

  // EW plane: deflect enemy bullets & spawn decoys
  if (g.player.isEW) {
    g.enemyBullets.forEach(b => {
      const dx = b.x - g.player.x, dy = b.y - g.player.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 120) {
        // deflect: push bullet sideways away from player
        const nx = dx/dist, ny = dy/dist;
        b.vx += nx * 0.8; b.vy += ny * 0.3;
      }
    });
    // redirect some bullets toward decoys
    g.decoys.forEach(d => {
      g.enemyBullets.forEach(b => {
        const dx = d.x - b.x, dy = d.y - b.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 100 && dist > 10) {
          b.vx += (dx/dist) * 0.4; b.vy += (dy/dist) * 0.4;
        }
        // bullet hits decoy → destroy both
        if (dist < 15) { d.life = 0; b.y = -999; }
      });
    });
    g.player.decoyTimer++;
    if (g.player.decoyTimer >= g.player.decoyInterval) {
      g.player.decoyTimer = 0;
      g.decoys.push(new Decoy(g.player.x, g.player.y));
    }
  }
  g.decoys.forEach(d => d.update());
  g.decoys = g.decoys.filter(d => !d.done);

  // Spawn
  g.frame++;
  if (!g.bossSpawned) {
    g.spawnTimer++;
    if (g.spawnTimer >= g.cfg.spawnInterval) { g.spawnTimer = 0; spawnEnemy(); }
    if (g.frame % 150 === 0 && Math.random() < g.cfg.extraSpawnChance) spawnEnemy();
    g.formationTimer++;
    if (g.formationTimer >= Math.max(280, 500 - g.cfg.level * 20)) { g.formationTimer = 0; spawnFormation(); }
    if (g.killCount >= g.cfg.killsToWin) {
      g.bossSpawned = true;
      g.boss = new Boss(g.cfg.bossType, g.cfg);
      sfxBossAlarm();
      document.getElementById('boss-name').style.display = 'block';
      document.getElementById('boss-name').textContent = g.boss.names[g.boss.type];
      document.getElementById('boss-hp-bar').style.display = 'block';
    }
  }

  // Update enemies (with slow motion)
  g.enemies.forEach(e => { const origSpeed = e.speed; e.speed *= smf; e.update(g.enemyBullets, g.player.x); e.speed = origSpeed; });

  // Update boss
  if (g.boss && g.boss.alive) {
    g.boss.update(g.enemyBullets, g.enemies, g.player.x, g.player.y);
    const fill = document.getElementById('boss-hp-fill');
    fill.style.width = (g.boss.hp/g.boss.maxHp*100)+'%';
    fill.style.background = g.boss.enraged ? 'linear-gradient(90deg, #FF7043, #FF5722)' : 'linear-gradient(90deg, #FF7043, #FFAB91)';
  }

  // Update missiles
  const bulletDamage = g.player.bulletDamage;
  g.missiles = g.missiles.filter(m => {
    m.update(g.enemies, g.boss);
    if (m.life<=0||m.x<-30||m.x>W+30||m.y<-30||m.y>H+30) return false;
    if (g.boss && g.boss.alive && g.boss.entered && Math.abs(m.x-g.boss.x)<(g.boss.w+m.w)/2 && Math.abs(m.y-g.boss.y)<(g.boss.h+m.h)/2) {
      g.explosions.push(new Explosion(m.x, m.y, '#FFB74D', true)); g.screenShake = 4;
      if (g.boss.takeDamage(m.damage)) handleBossDeath(); return false;
    }
    for (let i = g.enemies.length-1; i >= 0; i--) {
      const e = g.enemies[i];
      if (Math.abs(m.x-e.x)<(e.w+m.w)/2 && Math.abs(m.y-e.y)<(e.h+m.h)/2) {
        e.hp -= m.damage; e.hitFlash = 3;
        g.explosions.push(new Explosion(m.x, m.y, '#FFB74D', true)); g.screenShake = 4;
        if (e.hp <= 0) handleEnemyKill(e, i);
        return false;
      }
    }
    return true;
  });

  // Player bullets vs enemies & boss
  g.bullets = g.bullets.filter(b => {
    if (g.boss && g.boss.alive && g.boss.entered && Math.abs(b.x-g.boss.x)<(g.boss.w+b.r*2)/2 && Math.abs(b.y-g.boss.y)<(g.boss.h+b.r*2)/2) {
      if (g.boss.takeDamage(bulletDamage)) handleBossDeath(); else g.explosions.push(new Explosion(b.x, b.y, '#FFE082'));
      return false;
    }
    for (let i = g.enemies.length-1; i >= 0; i--) {
      const e = g.enemies[i];
      if (Math.abs(b.x-e.x)<(e.w+b.r*2)/2 && Math.abs(b.y-e.y)<(e.h+b.r*2)/2) {
        e.hp -= bulletDamage; e.hitFlash = 3;
        if (e.hp <= 0) handleEnemyKill(e, i); else g.explosions.push(new Explosion(b.x, b.y, '#FFE082'));
        return false;
      }
    }
    return true;
  });

  g.combo.update(); g.combo.draw();

  // Enemy bullets hit player
  if (g.player.invincible <= 0) {
    g.enemyBullets = g.enemyBullets.filter(b => {
      if (Math.abs(b.x-g.player.x)<(g.player.w+b.r*2)/2 && Math.abs(b.y-g.player.y)<(g.player.h+b.r*2)/2) {
        if (g.player.shield > 0) { g.player.shield = Math.max(0, g.player.shield-60); g.explosions.push(new Explosion(b.x, b.y, '#64FFDA')); }
        else { g.lives--; updateHeartsDisplay(g.lives); g.player.invincible=90; g.explosions.push(new Explosion(g.player.x, g.player.y, '#64D2FF')); g.screenShake=5; if(g.lives<=0) gameOver(); }
        return false;
      }
      return true;
    });
  }

  // Player collision with enemies
  if (g.player.invincible <= 0) {
    g.enemies = g.enemies.filter(e => {
      if (e.y > H+40) return false;
      if (collides(g.player, e)) {
        if (g.player.shield > 0) { g.player.shield=0; e.hp-=2; g.explosions.push(new Explosion(e.x,e.y,'#64FFDA'));
          if(e.hp<=0){ handleEnemyKill(e,-1); return false;} return true; }
        g.lives--; updateHeartsDisplay(g.lives); g.player.invincible=90; g.explosions.push(new Explosion(e.x,e.y,'#FF80AB',true)); g.screenShake=6;
        if(g.lives<=0) gameOver(); return false;
      }
      return true;
    });
  } else { g.enemies = g.enemies.filter(e => e.y <= H+40); }

  // Powerups
  g.powerups.forEach(p => p.update());
  g.powerups = g.powerups.filter(p => {
    if (p.y > H+20) return false;
    if (collides(g.player, p)) {
      const result = p.apply(g.player);
      if (result === 'life') { g.lives = Math.min(g.lives+1, g.player.maxPlayerHp + 2); updateHeartsDisplay(g.lives); }
      g.powerupMsg = typeof result==='string' && result!=='life' ? result : '❤️+1';
      g.powerupMsgTimer = 60; return false;
    }
    return true;
  });

  // Update stars
  g.stars.forEach(s => { const origSpeed = s.speed; s.speed *= smf; s.update(g.player.x, g.player.y); s.speed = origSpeed; });
  g.stars = g.stars.filter(s => {
    if (s.y > H + 30) return false;
    if (s.collected) {
      totalStars++;
      g.starsCollected++;
      sfxStarPickup();
      saveProgress();
      return false;
    }
    return true;
  });

  // Blackhole cooldown
  if (!g.blackholeReady && !g.blackhole) {
    g.blackholeCooldown++;
    if (g.blackholeCooldown >= 1800) { g.blackholeReady = true; g.blackholeCooldown = 0; }
  }

  // Bounce ball cooldown
  if (!g.bounceBallReady && !g.bounceBall) {
    g.bounceBallCooldown++;
    if (g.bounceBallCooldown >= 1800) { g.bounceBallReady = true; g.bounceBallCooldown = 0; }
  }

  // Update blackhole
  if (g.blackhole) {
    const bhResult = g.blackhole.update(g.enemies, g.boss, g);
    if (bhResult === 'boss_dead') handleBossDeath();
    if (g.blackhole.done) g.blackhole = null;
  }

  // Update bounce ball
  if (g.bounceBall) {
    const bbResult = g.bounceBall.update(g.enemies, g.boss, smf);
    if (bbResult && typeof bbResult === 'object' && 'killed' in bbResult) {
      const e = g.enemies[bbResult.killed];
      if (e) {
        g.combo.registerKill();
        g.score += e.score * g.combo.getMultiplier();
        g.killCount++;
        g.explosions.push(new Explosion(e.x, e.y, '#FF5252', e.type >= 1));
        sfxExplosion(e.type >= 1);
        const starCounts = {0:1,1:3,2:3,3:2};
        spawnStars(e.x, e.y, starCounts[e.type]||1);
        g.enemies.splice(bbResult.killed, 1);
      }
    }
    if (bbResult === 'boss_dead') handleBossDeath();
    if (g.bounceBall.done) g.bounceBall = null;
  }

  // ====== DRAW ALL ======
  g.enemyBullets.forEach(b => drawEnemyBullet(b.x, b.y, b.r || 4, b.boss));
  g.bullets.forEach(b => drawPlayerBullet(b.x, b.y, time));
  g.enemies.forEach(e => e.draw(time));
  if (g.boss) g.boss.draw(time);
  g.missiles.forEach(m => m.draw());
  g.powerups.forEach(p => p.draw());
  g.stars.forEach(s => s.draw(time));
  g.decoys.forEach(d => d.draw(time));
  g.player.draw(time);

  // Draw blackhole
  if (g.blackhole) g.blackhole.draw(time);

  // Draw bounce ball
  if (g.bounceBall) g.bounceBall.draw(time);

  // Draw blackhole button
  if (g.showBlackholeBtn && g.blackholeReady && !g.blackhole) {
    const btnX = g.player.x + 60, btnY = g.player.y - 40;
    g.blackholeBtnX = btnX; g.blackholeBtnY = btnY;
    const pulse = 1 + Math.sin(time * 0.15) * 0.12;
    ctx.save();
    ctx.translate(btnX, btnY);
    ctx.scale(pulse, pulse);
    // Button bg
    ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(60,0,80,0.8)'; ctx.fill();
    ctx.strokeStyle = 'rgba(180,100,255,0.8)'; ctx.lineWidth = 3; ctx.stroke();
    // Mini vortex
    for (let arm = 0; arm < 3; arm++) {
      ctx.beginPath();
      const armOff = (Math.PI * 2 / 3) * arm + time * 0.1;
      for (let t = 0; t < 2.5; t += 0.1) {
        const sr = t * 8, sa = t * 2 + armOff;
        const px = Math.cos(sa) * sr, py = Math.sin(sa) * sr;
        t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.strokeStyle = 'rgba(200,140,255,0.7)'; ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#000'; ctx.fill();
    ctx.restore();
  }

  // Draw bounce ball button (left side of player)
  if (g.showBlackholeBtn && g.bounceBallReady && !g.bounceBall) {
    const bbX = g.player.x - 60, bbY = g.player.y - 40;
    g.bounceBallBtnX = bbX; g.bounceBallBtnY = bbY;
    const pulse = 1 + Math.sin(time * 0.18) * 0.1;
    ctx.save();
    ctx.translate(bbX, bbY);
    ctx.scale(pulse, pulse);
    ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(120,0,0,0.8)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,100,100,0.8)'; ctx.lineWidth = 3; ctx.stroke();
    // Red ball icon
    const grd = ctx.createRadialGradient(-3, -3, 2, 0, 0, 12);
    grd.addColorStop(0, '#FF8A80'); grd.addColorStop(0.6, '#FF1744'); grd.addColorStop(1, '#B71C1C');
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();
    ctx.beginPath(); ctx.arc(-3, -3, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
    ctx.restore();
  }

  // Boss pull visual effect from blackhole
  if (g.blackhole && g.boss && g.boss.alive && g.boss.entered) {
    const dx = g.blackhole.x - g.boss.x, dy = g.blackhole.y - g.boss.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120) {
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = '#B060FF';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      for (let i = 0; i < 3; i++) {
        const off = (time * 3 + i * 40) % 120;
        const t = off / 120;
        const lx = g.boss.x + dx * t, ly = g.boss.y + dy * t;
        ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  g.explosions.forEach(e => { e.update(); e.draw(); });
  g.explosions = g.explosions.filter(e => !e.done);

  // Powerup message
  if (g.powerupMsgTimer > 0) {
    g.powerupMsgTimer--;
    const msgY = H/2 - 30 - (60 - g.powerupMsgTimer) * 0.5;
    const alpha = Math.min(1, g.powerupMsgTimer / 20);
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    const tw = ctx.measureText(g.powerupMsg).width + 20;
    ctx.roundRect(W/2 - tw/2, msgY - 10, tw, 22, 11);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
    drawText(g.powerupMsg, W/2, msgY, '#FF9800', 14);
    ctx.globalAlpha = 1;
  }

  // Progress bar
  if (!g.bossSpawned) {
    const progress = g.killCount / g.cfg.killsToWin;
    const barW = 100, barX = W/2 - barW/2, barY = 68;
    drawRoundRect(barX, barY, barW, 8, 4, 'rgba(0,0,0,0.15)');
    drawRoundRect(barX, barY, Math.max(4, barW * Math.min(1, progress)), 8, 4, '#81C784');
  }

  // BOSS WARNING
  if (g.bossSpawned && g.boss && !g.boss.entered) {
    if (Math.floor(g.frame/10) % 2)
      drawText('⚠️ WARNING ⚠️', W/2, H/2, '#FF7043', 28, '#fff');
  }

  // UI
  document.getElementById('score').textContent = g.score;
  document.getElementById('ui-stars').textContent = `⭐${totalStars}`;
  const pd = document.getElementById('ui-center');
  const parts = [`LV${g.cfg.level}`];
  if (g.player.bulletLevel>=2) parts.push('W');
  if (g.player.bulletLevel>=3) parts.push('T');
  if (g.player.shield>0) parts.push('🛡️');
  if (g.player.speedBoost>0) parts.push('⚡');
  if (g.player.hasMissile) parts.push('🚀');
  pd.textContent = parts.join(' ');

  // Blackhole UI indicator
  const bhUIx = 50, bhUIy = H - 40;
  if (g.blackholeReady) {
    drawText('🕳️', bhUIx, bhUIy, '#fff', 24);
  } else if (!g.blackhole) {
    // Cooldown circle
    ctx.beginPath(); ctx.arc(bhUIx, bhUIy, 14, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,100,100,0.4)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(bhUIx, bhUIy);
    ctx.arc(bhUIx, bhUIy, 14, -Math.PI / 2, -Math.PI / 2 + (g.blackholeCooldown / 1800) * Math.PI * 2);
    ctx.closePath();
    ctx.fillStyle = 'rgba(180,100,255,0.6)'; ctx.fill();
    const secs = Math.ceil((1800 - g.blackholeCooldown) / 60);
    drawText(`${secs}`, bhUIx, bhUIy, '#fff', 11);
  }

  // Bounce ball UI indicator
  const bbUIx = 100, bbUIy = H - 40;
  if (g.bounceBallReady) {
    drawCircle(bbUIx, bbUIy, 10, '#FF1744');
    drawCircle(bbUIx-2, bbUIy-2, 3, 'rgba(255,255,255,0.5)');
  } else if (!g.bounceBall) {
    ctx.beginPath(); ctx.arc(bbUIx, bbUIy, 14, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,100,100,0.4)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(bbUIx, bbUIy);
    ctx.arc(bbUIx, bbUIy, 14, -Math.PI / 2, -Math.PI / 2 + (g.bounceBallCooldown / 1800) * Math.PI * 2);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,50,50,0.6)'; ctx.fill();
    const secs = Math.ceil((1800 - g.bounceBallCooldown) / 60);
    drawText(`${secs}`, bbUIx, bbUIy, '#fff', 11);
  }

  ctx.restore();

  requestAnimationFrame(loop);
}

// ============ KILL HANDLERS ============
function handleEnemyKill(e, idx) {
  const g = game;
  g.combo.registerKill();
  g.score += e.score * g.combo.getMultiplier();
  g.killCount++;
  const isBig = e.type >= 1;
  g.explosions.push(new Explosion(e.x, e.y, '#FFB74D', isBig));
  sfxExplosion(isBig);
  g.screenShake = isBig ? 4 : 1;
  if (isBig) g.slowMo = 3;

  // Drop rate with lucky equip
  const dropMult = hasEquip('lucky') ? 2 : 1;
  if (Math.random() < (isBig ? 0.25 : 0.12) * dropMult) g.powerups.push(new PowerUp(e.x, e.y));

  // Spawn stars based on enemy type
  const starCounts = { 0: 1, 1: 3, 2: 3, 3: 2 };
  spawnStars(e.x, e.y, starCounts[e.type] || 1);

  if (idx >= 0) g.enemies.splice(idx, 1);
}

function handleBossDeath() {
  const g = game;
  g.combo.registerKill();
  g.score += g.boss.score * g.combo.getMultiplier();
  g.boss.alive = false; g.bossDefeated = true;
  g.explosions.push(new MegaExplosion(g.boss.x, g.boss.y));
  g.screenShake = 15; g.slowMo = 8;
  triggerScreenFlash(); sfxBossDeath();
  g.enemyBullets = [];
  // Boss drops 10 stars
  spawnStars(g.boss.x, g.boss.y, 10);
  setTimeout(() => { if (game === g) levelCleared(); }, 1500);
}

// Show main menu on load
showMainMenu();
</script>
</body>
