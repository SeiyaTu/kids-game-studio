<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🐰 小兔守城记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2d1b0e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
canvas{display:block;cursor:pointer;image-rendering:auto}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
const C=document.getElementById('game');
const ctx=C.getContext('2d');

// ===== RESPONSIVE =====
let W=960,H=720,scale=1,offX=0,offY=0;
function resize(){
  const r=W/H,wr=innerWidth/innerHeight;
  if(wr>r){scale=innerHeight/H;offX=(innerWidth-W*scale)/2;offY=0}
  else{scale=innerWidth/W;offX=0;offY=(innerHeight-H*scale)/2}
  C.width=innerWidth;C.height=innerHeight;
}
addEventListener('resize',resize);resize();

function toGame(x,y){return[(x-offX)/scale,(y-offY)/scale]}

// ===== COLORS =====
const COL={
  outerWall:'#4a2c17',innerWall:'#f5d98e',floor:'#6b3a1f',
  floorLight:'#8b5e3c',pink:'#ffb6c1',cream:'#fff8e7',
  red:'rgba(255,80,80,0.4)',blue:'rgba(80,120,255,0.4)',
  gold:'#ffd700',hud:'#3d2010',hudText:'#fff8e7'
};

// ===== CASTLE LAYOUT =====
// Castle spans roughly x:80-880, y:60-660
// 4 floors: floor0(bottom) y:540-660, floor1 y:400-540, floor2 y:240-400, floor3(top/attic) y:100-240
// Roof y:60-100
const floors=[
  {y:540,h:120},{y:400,h:140},{y:240,h:160},{y:100,h:140}
];
const castleL=80,castleR=880,castleTop=60;

// ===== PATH DEFINITIONS =====
// Red path: left bottom entrance → snake up → left attic carrot
const redPath=[
  {x:80,y:620},{x:160,y:620},{x:160,y:580},// enter floor0
  {x:300,y:580},{x:300,y:540},// portal1 entrance
  // teleport to floor1
  {x:300,y:480},{x:200,y:480},{x:200,y:440},{x:400,y:440},{x:400,y:400},
  // portal2 entrance
  {x:400,y:340},{x:200,y:340},{x:200,y:300},{x:350,y:300},{x:350,y:240},
  // floor3 to left carrot
  {x:250,y:200},{x:200,y:170}
];

// Blue path: right bottom entrance → snake up → right attic carrot
const bluePath=[
  {x:880,y:620},{x:800,y:620},{x:800,y:580},
  {x:660,y:580},{x:660,y:540},
  // teleport to floor1
  {x:660,y:480},{x:760,y:480},{x:760,y:440},{x:560,y:440},{x:560,y:400},
  // portal2 entrance
  {x:560,y:340},{x:760,y:340},{x:760,y:300},{x:610,y:300},{x:610,y:240},
  // floor3 to right carrot
  {x:710,y:200},{x:760,y:170}
];

// Portal pairs: [entrance index, exit index] in path
const redPortals=[{ein:4,eout:5},{ein:10,eout:11}];
const bluePortals=[{ein:4,eout:5},{ein:10,eout:11}];

// ===== TOWER SLOTS =====
// Each slot: {x,y,path:'red'|'blue'|'both',tower:null}
const slots=[
  // Red path slots
  {x:230,y:580,path:'red',tower:null},
  {x:250,y:470,path:'red',tower:null},
  {x:330,y:440,path:'red',tower:null},
  {x:280,y:330,path:'red',tower:null},
  {x:280,y:290,path:'red',tower:null},
  {x:220,y:220,path:'red',tower:null},
  // Blue path slots
  {x:730,y:580,path:'blue',tower:null},
  {x:710,y:470,path:'blue',tower:null},
  {x:630,y:440,path:'blue',tower:null},
  {x:680,y:330,path:'blue',tower:null},
  {x:680,y:290,path:'blue',tower:null},
  {x:740,y:220,path:'blue',tower:null},
];

// ===== WEAPON DEFS =====
const WEAPONS=[
  {id:'sling',name:'🪨 石头弹弓',cost:10,range:100,dmg:15,rate:1.2,type:'projectile',color:'#888'},
  {id:'ice',name:'🧊 冰冻陷阱',cost:15,range:60,dmg:5,rate:2,type:'slow',color:'#a0e8ff',slowDur:3},
  {id:'carrot',name:'🥕 胡萝卜炮',cost:25,range:90,dmg:25,rate:2,type:'aoe',color:'#ff8c00',aoeR:50},
  {id:'choco',name:'🍫 巧克力粘液',cost:20,range:70,dmg:3,rate:1.5,type:'slow',color:'#5c3317',slowDur:4},
  {id:'spring',name:'⚡ 弹簧踏板',cost:30,range:50,dmg:10,rate:3,type:'pushback',color:'#ffee00'},
  {id:'flower',name:'🌸 花朵迷雾',cost:35,range:80,dmg:5,rate:4,type:'confuse',color:'#ff69b4',confDur:3},
];

// ===== ENEMY DEFS =====
const ENEMY_TYPES={
  caterpillar:{emoji:'🐛',hp:40,speed:0.8,reward:3},
  fox:{emoji:'🦊',hp:70,speed:1.5,reward:5},
  bear:{emoji:'🐻',hp:200,speed:0.5,reward:10},
  eagle:{emoji:'🦅',hp:60,speed:1.0,reward:7,flying:true},
  wolf:{emoji:'🐺',hp:180,speed:0.9,reward:15,boss:true},
};

// ===== WAVES =====
const WAVES=[
  {red:[{type:'caterpillar',count:5}],blue:[],prepTime:30},
  {red:[],blue:[{type:'caterpillar',count:5}],prepTime:20},
  {red:[{type:'caterpillar',count:3}],blue:[{type:'caterpillar',count:3}],prepTime:20},
  {red:[{type:'fox',count:2}],blue:[{type:'caterpillar',count:3}],prepTime:15},
  {red:[{type:'caterpillar',count:3}],blue:[{type:'fox',count:2}],prepTime:15},
  {red:[{type:'bear',count:1},{type:'caterpillar',count:3}],blue:[{type:'bear',count:1},{type:'caterpillar',count:3}],prepTime:10},
];

// ===== GAME STATE =====
let state='menu'; // menu, playing, win, lose
let gold=30,wave=0,waveTimer=0,spawnQueue=[],enemies=[],projectiles=[],effects=[];
let carrotLeft=true,carrotRight=true;
let coinTimer=0;
let selectedSlot=null;
let menuAnim=0;
let lastTime=0;
let totalEnemiesThisWave=0,killedThisWave=0;
let waveActive=false,waveStarted=false;
let portalAngle=0;

function resetGame(){
  gold=30;wave=0;waveTimer=WAVES[0].prepTime;spawnQueue=[];enemies=[];projectiles=[];effects=[];
  carrotLeft=true;carrotRight=true;coinTimer=0;selectedSlot=null;
  waveActive=false;waveStarted=false;totalEnemiesThisWave=0;killedThisWave=0;
  slots.forEach(s=>s.tower=null);
}

// ===== HELPERS =====
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function lerp(a,b,t){return a+(b-a)*t}
function lerpPt(a,b,t){return{x:lerp(a.x,b.x,t),y:lerp(a.y,b.y,t)}}

function pathLength(path){
  let len=0;
  for(let i=1;i<path.length;i++)len+=dist(path[i-1],path[i]);
  return len;
}

function posOnPath(path,progress){
  let totalLen=pathLength(path);
  let target=progress*totalLen;
  let accum=0;
  for(let i=1;i<path.length;i++){
    let segLen=dist(path[i-1],path[i]);
    if(accum+segLen>=target){
      let t=(target-accum)/segLen;
      return lerpPt(path[i-1],path[i],t);
    }
    accum+=segLen;
  }
  return{...path[path.length-1]};
}

// ===== SPAWNING =====
function startWave(w){
  if(w>=WAVES.length){checkWin();return}
  let def=WAVES[w];
  spawnQueue=[];
  totalEnemiesThisWave=0;killedThisWave=0;
  for(let g of def.red)for(let i=0;i<g.count;i++){spawnQueue.push({type:g.type,lane:'red',delay:i*1.2});totalEnemiesThisWave++}
  for(let g of def.blue)for(let i=0;i<g.count;i++){spawnQueue.push({type:g.type,lane:'blue',delay:i*1.2});totalEnemiesThisWave++}
  waveActive=true;waveStarted=true;
  waveTimer=0;
}

function spawnEnemy(type,lane){
  let def=ENEMY_TYPES[type];
  enemies.push({
    type,lane,hp:def.hp,maxHp:def.hp,speed:def.speed,
    progress:0,emoji:def.emoji,reward:def.reward,
    flying:def.flying||false,boss:def.boss||false,
    slow:0,confused:0,pushback:0,alive:true
  });
}

// ===== UPDATE =====
function update(dt){
  if(state!=='playing')return;
  portalAngle+=dt*3;
  
  // Gold income
  coinTimer+=dt;
  if(coinTimer>=10){coinTimer-=10;gold+=5;addEffect('💰 +5',480,30,1.5)}
  
  // Wave timer
  if(!waveActive){
    waveTimer-=dt;
    if(waveTimer<=0)startWave(wave);
    return;// let player place towers during prep
  }
  
  // Spawn from queue
  for(let i=spawnQueue.length-1;i>=0;i--){
    spawnQueue[i].delay-=dt;
    if(spawnQueue[i].delay<=0){
      spawnEnemy(spawnQueue[i].type,spawnQueue[i].lane);
      spawnQueue.splice(i,1);
    }
  }
  
  // Update enemies
  for(let e of enemies){
    if(!e.alive)continue;
    let path=e.lane==='red'?redPath:bluePath;
    let spd=e.speed;
    if(e.slow>0){spd*=0.4;e.slow-=dt}
    if(e.confused>0){spd*=-0.5;e.confused-=dt}
    if(e.pushback>0){e.progress-=spd*dt*0.015;e.pushback-=dt;if(e.progress<0)e.progress=0}
    else{e.progress+=spd*dt/pathLength(path)}
    
    let pos=posOnPath(path,e.progress);
    e.x=pos.x;e.y=pos.y;
    
    // Reached end
    if(e.progress>=1){
      e.alive=false;
      if(e.lane==='red'){carrotLeft=false;addEffect('🥕💔',200,170,2)}
      else{carrotRight=false;addEffect('🥕💔',760,170,2)}
      if(!carrotLeft&&!carrotRight){state='lose'}
    }
  }
  
  // Update towers
  for(let s of slots){
    if(!s.tower)continue;
    let t=s.tower;
    t.cooldown-=dt;
    if(t.cooldown>0)continue;
    
    let w=WEAPONS.find(w=>w.id===t.id);
    // Find target
    let target=null,minD=w.range;
    for(let e of enemies){
      if(!e.alive)continue;
      if(w.type==='slow'&&e.flying)continue;// ground traps skip flyers
      if(s.path!=='both'&&s.path!==e.lane)continue;// wrong lane
      let d=dist(s,e);
      if(d<minD){minD=d;target=e}
    }
    if(!target)continue;
    t.cooldown=w.rate;
    
    // Apply effect
    if(w.type==='projectile'){
      projectiles.push({x:s.x,y:s.y,tx:target.x,ty:target.y,dmg:w.dmg,speed:300,color:w.color,target});
    }else if(w.type==='aoe'){
      // Damage all in range
      for(let e of enemies){
        if(!e.alive)continue;
        if(dist(s,e)<w.aoeR)e.hp-=w.dmg;
      }
      addEffect('💥',s.x,s.y-10,0.5);
      effects.push({type:'circle',x:s.x,y:s.y,r:w.aoeR,color:'rgba(255,140,0,0.3)',life:0.3,maxLife:0.3});
    }else if(w.type==='slow'){
      if(target){target.slow=w.slowDur;target.hp-=w.dmg;addEffect('❄️',target.x,target.y-15,0.8)}
    }else if(w.type==='pushback'){
      if(target){target.pushback=1;target.hp-=w.dmg;addEffect('⚡',target.x,target.y-15,0.6)}
    }else if(w.type==='confuse'){
      if(target){target.confused=w.confDur;target.hp-=w.dmg;addEffect('🌀',target.x,target.y-15,1)}
    }
  }
  
  // Update projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    let p=projectiles[i];
    let dx=p.tx-p.x,dy=p.ty-p.y,d=Math.hypot(dx,dy);
    if(d<5){
      if(p.target&&p.target.alive)p.target.hp-=p.dmg;
      projectiles.splice(i,1);continue;
    }
    let step=p.speed*dt;
    p.x+=dx/d*step;p.y+=dy/d*step;
  }
  
  // Kill dead enemies
  for(let e of enemies){
    if(e.alive&&e.hp<=0){
      e.alive=false;killedThisWave++;
      gold+=e.reward;
      addEffect('💀 +'+e.reward,e.x,e.y-20,1);
    }
  }
  enemies=enemies.filter(e=>e.alive);
  
  // Check wave complete
  if(waveActive&&spawnQueue.length===0&&enemies.length===0){
    waveActive=false;wave++;
    if(wave>=WAVES.length){checkWin()}
    else{waveTimer=WAVES[wave].prepTime}
  }
  
  // Update effects
  for(let i=effects.length-1;i>=0;i--){
    effects[i].life-=dt;
    if(effects[i].life<=0)effects.splice(i,1);
  }
}

function checkWin(){
  if(carrotLeft||carrotRight)state='win';
  else state='lose';
}

function addEffect(text,x,y,dur){
  effects.push({type:'text',text,x,y,life:dur,maxLife:dur});
}

// ===== DRAW =====
function draw(){
  ctx.save();
  ctx.clearRect(0,0,C.width,C.height);
  
  // BG
  ctx.fillStyle='#1a0f06';
  ctx.fillRect(0,0,C.width,C.height);
  
  ctx.translate(offX,offY);
  ctx.scale(scale,scale);
  
  if(state==='menu'){drawMenu();ctx.restore();return}
  if(state==='win'){drawEndScreen(true);ctx.restore();return}
  if(state==='lose'){drawEndScreen(false);ctx.restore();return}
  
  drawCastle();
  drawPaths();
  drawPortals();
  drawSlots();
  drawCarrots();
  drawBunny();
  drawEnemies();
  drawProjectiles();
  drawEffects();
  drawHUD();
  if(selectedSlot!==null)drawWeaponMenu();
  
  ctx.restore();
}

function drawCastle(){
  // Outer wall
  ctx.fillStyle=COL.outerWall;
  ctx.fillRect(castleL-10,castleTop-10,castleR-castleL+20,620);
  
  // Inner fill per floor
  for(let f of floors){
    ctx.fillStyle=COL.innerWall;
    ctx.fillRect(castleL,f.y,castleR-castleL,f.h);
    // Floor line
    ctx.fillStyle=COL.floor;
    ctx.fillRect(castleL,f.y+f.h-6,castleR-castleL,6);
  }
  
  // Roof
  ctx.fillStyle=COL.outerWall;
  ctx.beginPath();
  ctx.moveTo(castleL-20,100);ctx.lineTo(480,40);ctx.lineTo(castleR+20,100);
  ctx.fill();
  
  // Floor dividers
  ctx.strokeStyle=COL.outerWall;ctx.lineWidth=4;
  for(let f of floors){
    ctx.beginPath();ctx.moveTo(castleL,f.y);ctx.lineTo(castleR,f.y);ctx.stroke();
  }
  
  // Entrances
  ctx.fillStyle='#0d0805';
  ctx.fillRect(castleL-5,600,60,60);// left entrance
  ctx.fillRect(castleR-55,600,60,60);// right entrance
  
  // Decorations - stars & hearts on ceiling of top floor
  ctx.font='20px serif';
  ctx.textAlign='center';
  ctx.fillText('⭐',350,125);ctx.fillText('❤️',450,120);ctx.fillText('⭐',550,125);
  ctx.fillText('✨',300,130);ctx.fillText('✨',600,130);
}

function drawPaths(){
  function drawP(path,color){
    ctx.strokeStyle=color;ctx.lineWidth=28;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(path[0].x,path[0].y);
    for(let i=1;i<path.length;i++)ctx.lineTo(path[i].x,path[i].y);
    ctx.stroke();
  }
  drawP(redPath,COL.red);
  drawP(bluePath,COL.blue);
}

function drawPortals(){
  let portals=[
    // Red portal pairs
    {x:300,y:540,c:'#ff6688'},{x:300,y:480,c:'#ff6688'},
    // Blue portal pairs
    {x:660,y:540,c:'#6688ff'},{x:660,y:480,c:'#6688ff'},
    // Floor2 portals
    {x:400,y:400,c:'#ff6688'},{x:400,y:340,c:'#ff6688'},
    {x:560,y:400,c:'#6688ff'},{x:560,y:340,c:'#6688ff'},
  ];
  for(let p of portals){
    let glow=Math.sin(portalAngle)*0.3+0.7;
    ctx.save();
    ctx.shadowColor=p.c;ctx.shadowBlur=15*glow;
    ctx.beginPath();ctx.arc(p.x,p.y,12,0,Math.PI*2);
    ctx.fillStyle=p.c;ctx.globalAlpha=glow;ctx.fill();
    ctx.globalAlpha=1;
    ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🌀',p.x,p.y);
    ctx.restore();
  }
}

function drawSlots(){
  for(let i=0;i<slots.length;i++){
    let s=slots[i];
    if(s.tower){
      let w=WEAPONS.find(w=>w.id===s.tower.id);
      ctx.font='34px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(w.name.split(' ')[0],s.x,s.y);
      // Range circle on hover
    }else{
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(s.x-12,s.y-12);ctx.lineTo(s.x+12,s.y+12);
      ctx.moveTo(s.x+12,s.y-12);ctx.lineTo(s.x-12,s.y+12);
      ctx.stroke();
    }
  }
}

function drawCarrots(){
  ctx.font='28px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  if(carrotLeft)ctx.fillText('🥕',200,170);
  else{ctx.globalAlpha=0.3;ctx.fillText('🥕',200,170);ctx.globalAlpha=1}
  if(carrotRight)ctx.fillText('🥕',760,170);
  else{ctx.globalAlpha=0.3;ctx.fillText('🥕',760,170);ctx.globalAlpha=1}
}

function drawBunny(){
  ctx.font='32px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🐰',480,175);
  // Pink cheeks
  ctx.fillStyle=COL.pink;ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.arc(467,180,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(493,180,5,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
}

function drawEnemies(){
  ctx.font='32px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let e of enemies){
    // HP bar
    let bw=36,bh=5;
    ctx.fillStyle='#333';ctx.fillRect(e.x-bw/2,e.y-26,bw,bh);
    ctx.fillStyle=e.hp/e.maxHp>0.5?'#5f5':'#f55';
    ctx.fillRect(e.x-bw/2,e.y-26,bw*(e.hp/e.maxHp),bh);
    
    // Slow effect
    if(e.slow>0){ctx.fillStyle='rgba(100,200,255,0.3)';ctx.beginPath();ctx.arc(e.x,e.y,22,0,Math.PI*2);ctx.fill()}
    
    ctx.fillText(e.emoji,e.x,e.y);
  }
}

function drawProjectiles(){
  for(let p of projectiles){
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
  }
}

function drawEffects(){
  for(let e of effects){
    let alpha=e.life/e.maxLife;
    if(e.type==='text'){
      ctx.globalAlpha=alpha;ctx.font='bold 14px sans-serif';ctx.fillStyle='#fff';
      ctx.textAlign='center';ctx.fillText(e.text,e.x,e.y-(1-alpha)*20);
      ctx.globalAlpha=1;
    }else if(e.type==='circle'){
      ctx.globalAlpha=alpha;ctx.fillStyle=e.color;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

function drawHUD(){
  // Top bar
  ctx.fillStyle='rgba(61,32,16,0.85)';
  ctx.fillRect(0,0,W,50);
  ctx.font='bold 18px sans-serif';ctx.fillStyle=COL.hudText;ctx.textAlign='left';
  ctx.fillText('💰 '+gold,20,33);
  ctx.textAlign='center';
  let waveText=waveActive?'🌊 第'+(wave+1)+'波 / '+WAVES.length:
    (wave<WAVES.length?'⏱️ 准备中 '+Math.ceil(waveTimer)+'s':'✅ 全部波次完成');
  ctx.fillText(waveText,W/2,33);
  ctx.textAlign='right';
  ctx.fillText((carrotLeft?'🥕':'💔')+' '+(carrotRight?'🥕':'💔'),W-20,33);
}

function drawWeaponMenu(){
  let s=slots[selectedSlot];
  let mx=s.x,my=s.y-30;
  // Background
  let pw=320,ph=260;
  let px=Math.max(10,Math.min(mx-pw/2,W-pw-10));
  let py=Math.max(55,Math.min(my-ph,H-ph-10));
  
  ctx.fillStyle='rgba(40,20,10,0.95)';
  roundRect(ctx,px,py,pw,ph,10);ctx.fill();
  ctx.strokeStyle='#c8a060';ctx.lineWidth=2;roundRect(ctx,px,py,pw,ph,10);ctx.stroke();
  
  ctx.font='bold 17px sans-serif';ctx.fillStyle='#ffe0a0';ctx.textAlign='center';
  ctx.fillText('选择武器',px+pw/2,py+22);
  
  // Weapon buttons
  weaponBtns=[];
  for(let i=0;i<WEAPONS.length;i++){
    let w=WEAPONS[i];
    let bx=px+10,by=py+35+i*36,bw=pw-20,bh=32;
    let canAfford=gold>=w.cost;
    ctx.fillStyle=canAfford?'rgba(255,220,150,0.2)':'rgba(100,60,30,0.3)';
    roundRect(ctx,bx,by,bw,bh,5);ctx.fill();
    ctx.font='16px sans-serif';
    ctx.fillStyle=canAfford?'#ffe8c0':'#886644';
    ctx.textAlign='left';
    ctx.fillText(w.name,bx+8,by+21);
    ctx.textAlign='right';
    ctx.fillText(w.cost+'💰',bx+bw-8,by+21);
    weaponBtns.push({x:bx,y:by,w:bw,h:bh,idx:i,canAfford});
  }
  // Close btn
  ctx.font='16px sans-serif';ctx.fillStyle='#ff8888';ctx.textAlign='center';
  ctx.fillText('✕ 关闭',px+pw/2,py+ph-10);
  closeBtnRect={x:px+pw/2-40,y:py+ph-25,w:80,h:20};
}

let weaponBtns=[],closeBtnRect=null;

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ===== MENU / END SCREENS =====
function drawMenu(){
  // BG
  ctx.fillStyle=COL.innerWall;ctx.fillRect(0,0,W,H);
  
  // Castle silhouette
  ctx.fillStyle=COL.outerWall;
  ctx.beginPath();ctx.moveTo(200,500);ctx.lineTo(200,250);ctx.lineTo(480,150);
  ctx.lineTo(760,250);ctx.lineTo(760,500);ctx.closePath();ctx.fill();
  
  ctx.font='bold 48px sans-serif';ctx.fillStyle=COL.outerWall;ctx.textAlign='center';
  ctx.fillText('🐰 小兔守城记 🥕',W/2,300);
  
  ctx.font='24px sans-serif';ctx.fillStyle='#6b3a1f';
  ctx.fillText('保护胡萝卜不被偷走！',W/2,360);
  
  // Start button
  let pulse=Math.sin(menuAnim*3)*4;
  ctx.fillStyle='#ff8866';
  roundRect(ctx,W/2-100,420+pulse,200,50,25);ctx.fill();
  ctx.font='bold 22px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('开始游戏',W/2,450+pulse);
  
  ctx.font='14px sans-serif';ctx.fillStyle='#8b6b4f';
  ctx.fillText('点击 ✖️ 放置武器 · 消灭敌人 · 保卫胡萝卜',W/2,520);
  ctx.fillText('💰每10秒+5金币 · 6种武器 · 6波敌人',W/2,545);
}

function drawEndScreen(won){
  ctx.fillStyle=won?'rgba(255,248,230,0.95)':'rgba(50,20,10,0.95)';
  ctx.fillRect(0,0,W,H);
  
  ctx.font='bold 48px sans-serif';ctx.textAlign='center';
  if(won){
    let perfect=carrotLeft&&carrotRight;
    ctx.fillStyle='#ff8800';
    ctx.fillText(perfect?'⭐ 完美通关！⭐':'✅ 胜利！',W/2,300);
    ctx.font='24px sans-serif';ctx.fillStyle='#6b3a1f';
    ctx.fillText(perfect?'两根胡萝卜都保住了！':'至少保住了一根胡萝卜~',W/2,360);
  }else{
    ctx.fillStyle='#ff4444';
    ctx.fillText('❌ 胡萝卜被偷光了...',W/2,300);
    ctx.font='24px sans-serif';ctx.fillStyle='#ddd';
    ctx.fillText('下次会更好的！',W/2,360);
  }
  
  ctx.fillStyle='#ff8866';
  roundRect(ctx,W/2-80,420,160,45,22);ctx.fill();
  ctx.font='bold 20px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('再来一次',W/2,447);
}

// ===== INPUT =====
C.addEventListener('click',e=>{
  let[gx,gy]=toGame(e.clientX,e.clientY);
  
  if(state==='menu'){
    if(gx>W/2-100&&gx<W/2+100&&gy>415&&gy<475){
      state='playing';resetGame();
    }
    return;
  }
  if(state==='win'||state==='lose'){
    if(gx>W/2-80&&gx<W/2+80&&gy>420&&gy<465){
      state='playing';resetGame();
    }
    return;
  }
  
  // Weapon menu open?
  if(selectedSlot!==null){
    // Check weapon buttons
    for(let b of weaponBtns){
      if(gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h){
        if(b.canAfford){
          let w=WEAPONS[b.idx];
          gold-=w.cost;
          slots[selectedSlot].tower={id:w.id,cooldown:0};
          selectedSlot=null;
        }
        return;
      }
    }
    // Close button
    if(closeBtnRect&&gx>=closeBtnRect.x&&gx<=closeBtnRect.x+closeBtnRect.w&&gy>=closeBtnRect.y&&gy<=closeBtnRect.y+closeBtnRect.h){
      selectedSlot=null;return;
    }
    selectedSlot=null;return;
  }
  
  // Check tower slots
  for(let i=0;i<slots.length;i++){
    if(!slots[i].tower&&dist({x:gx,y:gy},slots[i])<20){
      selectedSlot=i;return;
    }
  }
});

// ===== GAME LOOP =====
function gameLoop(ts){
  let dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts;menuAnim+=dt;
  update(dt);draw();
  requestAnimationFrame(gameLoop);
}
lastTime=performance.now();
requestAnimationFrame(gameLoop);
</script>
