<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐰 兔兔守城记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'Segoe UI',Arial,sans-serif;touch-action:none}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
.menu-overlay{pointer-events:auto;position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:flex-start;z-index:20;color:#fff;text-align:center;overflow-y:auto;padding:10px}
.menu-overlay.active{display:flex}
.menu-overlay h1{font-size:24px;margin:10px 0 8px}
.menu-overlay p{font-size:14px;color:rgba(255,255,255,0.8);margin-bottom:10px}
.menu-btn{background:linear-gradient(135deg,#ff9a9e,#fad0c4);color:#6b3a5d;border:none;border-radius:20px;padding:14px 32px;font-size:18px;font-weight:bold;cursor:pointer;margin:6px;box-shadow:0 4px 15px rgba(0,0,0,0.2);transition:transform 0.15s}
.menu-btn:active{transform:scale(0.95)}
.menu-btn.green{background:linear-gradient(135deg,#a8e6cf,#dcedc1);color:#2d5a3d}
.menu-btn.blue{background:linear-gradient(135deg,#a1c4fd,#c2e9fb);color:#2d3a5a}
.menu-btn.purple{background:linear-gradient(135deg,#c3a6e0,#e8d5f5);color:#4a2d6b}
.menu-btn.red{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff}
.menu-btn.small{padding:8px 18px;font-size:14px;border-radius:14px}
.menu-btn:disabled{opacity:0.4;pointer-events:none}
#mainMenu{background:linear-gradient(180deg,#fce4ec 0%,#f8bbd0 50%,#f48fb1 100%)}
#battleUI{pointer-events:none;display:none}
#battleUI.active{display:block}
#topbar{pointer-events:auto;position:absolute;top:0;left:0;right:0;height:40px;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:space-between;padding:0 10px;color:#fff;font-size:14px;font-weight:bold;z-index:10}
#topbar>div{display:flex;align-items:center;gap:5px}
#speedBtn{background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);color:#fff;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:bold;cursor:pointer}
#speedBtn.active{background:rgba(255,200,0,0.4);border-color:#ffc800}
#bottomPanel{pointer-events:auto;position:absolute;bottom:0;left:0;right:0;height:72px;background:rgba(0,0,0,0.6);display:flex;align-items:center;gap:6px;padding:0 6px;overflow-x:auto;z-index:10}
.trap-card{flex-shrink:0;width:58px;height:62px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:10px;transition:all 0.15s}
.trap-card .icon{font-size:22px;line-height:1.1}
.trap-card.selected{background:rgba(255,200,0,0.3);border-color:#ffc800;transform:scale(1.05)}
.trap-card.disabled{opacity:0.35;pointer-events:none}
.trap-card.locked{opacity:0.2;pointer-events:none;position:relative}
#waveBtn{pointer-events:auto;position:absolute;bottom:82px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;border:none;border-radius:14px;padding:10px 24px;font-size:16px;font-weight:bold;cursor:pointer;z-index:10;box-shadow:0 4px 15px rgba(0,0,0,0.3);display:none}
#waveBtn:active{transform:translateX(-50%) scale(0.95)}
#autoTimer{pointer-events:auto;position:absolute;bottom:120px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:12px;z-index:10;display:none}
#backBtn{pointer-events:auto;position:absolute;top:44px;left:8px;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:bold;cursor:pointer;z-index:10}
.shop-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:400px;margin:0 auto}
.shop-item{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.2);border-radius:14px;padding:10px;width:110px;text-align:center;cursor:pointer;transition:all 0.15s}
.shop-item:hover{border-color:#ffd700;transform:scale(1.03)}
.shop-item.cant-afford{opacity:0.4}
.shop-item .emoji{font-size:28px}
.shop-item .name{font-size:12px;margin:4px 0}
.shop-item .cost{font-size:11px;color:#ffd700}
.inv-display{background:rgba(0,0,0,0.2);border-radius:12px;padding:8px 14px;margin:8px auto;font-size:13px;max-width:350px}
.happiness-bar{display:inline-block;font-size:16px;letter-spacing:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<!-- Main Menu -->
<div id="mainMenu" class="menu-overlay active">
  <div id="mainMenuContent"></div>
</div>
<!-- Home Screen -->
<div id="homeScreen" class="menu-overlay"></div>
<!-- Shop Screen -->
<div id="shopScreen" class="menu-overlay" style="background:linear-gradient(180deg,#e8d5f5 0%,#c3a6e0 100%)"></div>
<!-- Feed Screen -->
<div id="feedScreen" class="menu-overlay" style="background:linear-gradient(180deg,#fce4ec 0%,#f8bbd0 100%)"></div>
<!-- Adoption Screen -->
<div id="adoptScreen" class="menu-overlay" style="background:linear-gradient(180deg,#fce4ec 0%,#e1bee7 100%)"></div>
<!-- Level Select -->
<div id="levelSelect" class="menu-overlay" style="background:linear-gradient(180deg,#1a1a2e 0%,#2d1b4e 100%)"></div>
<!-- Battle UI -->
<div id="battleUI">
  <div id="topbar">
    <div><span>🪙</span><span id="coins">50</span></div>
    <div><span id="waveInfo">第 1/10 波</span></div>
    <div><span>Lv<span id="levelDisp">1</span></span><button id="speedBtn" onclick="toggleSpeed()">1x</button></div>
  </div>
  <button id="backBtn" onclick="exitBattle()">← 返回</button>
  <div id="bottomPanel"></div>
  <button id="waveBtn" onclick="startWave()">下一波 🐺</button>
  <div id="autoTimer"></div>
</div>
<!-- Generic Overlay (win/lose) -->
<div id="overlay" class="menu-overlay" style="background:rgba(0,0,0,0.75);justify-content:center">
  <h1 id="overlayTitle"></h1>
  <p id="overlayText"></p>
  <div id="overlayBtns"></div>
</div>
</div>
<script>
// ===== CANVAS SETUP =====
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// ===== GAME STATE =====
let gameSpeed=1, gamePhase='menu'; // menu|home|shop|feed|adoption|lambAdoption|levelSelect|battle
let coins=50, currentLevel=1, currentWave=0, waveActive=false, gameOver=false, gameWon=false;
let enemies=[], traps=[], projectiles=[], particles=[], coinPopups=[];
let selectedTrap=null, showRangeTrap=null;
let autoTimerId=null, autoCountdown=0;
let spawnQueue=[], spawnTimer=0;

// ===== PET SYSTEM =====
let petData=JSON.parse(localStorage.getItem('bunnyCastlePet')||'null');
let lambData=JSON.parse(localStorage.getItem('bunnyCastleLamb')||'null');
let xp=parseInt(localStorage.getItem('bunnyCastleXP')||'0');
let inventory=JSON.parse(localStorage.getItem('bunnyCastleInventory')||'{}');
let petHappiness=parseInt(localStorage.getItem('bunnyCastleHappiness')||'3');
let lambHappiness=parseInt(localStorage.getItem('bunnyCastleLambHappiness')||'3');
let maxLevelCleared=parseInt(localStorage.getItem('bunnyCastleProgress')||'0');
let unlockedTraps=JSON.parse(localStorage.getItem('bunnyCastleUnlockedTraps')||'["debris","spikes","sword"]');
let petLevel=parseInt(localStorage.getItem('bunnyCastlePetLevel')||'1');
let lambLevel=parseInt(localStorage.getItem('bunnyCastleLambLevel')||'0');
let petAnimState={bobT:0,happy:false,angry:false,feedAnim:0};
let lambAnimState={bobT:0,happy:false,angry:false,feedAnim:0};
let heartParticles=[];

// ===== VARIANTS =====
const BUNNY_VARIANTS=[
  {name:'纯白兔兔',body:'#fff',outline:'#f4a0b0',earInner:'#ffb6c1'},
  {name:'纯黑兔兔',body:'#444',outline:'#888',earInner:'#ff69b4'},
  {name:'粉花兔兔',body:'#fff',outline:'#f4a0b0',earInner:'#ffb6c1',spots:true},
  {name:'蓝耳兔兔',body:'#e8f4fd',outline:'#87ceeb',earInner:'#b0d4f1'},
  {name:'彩虹兔兔',body:'rainbow',outline:'#ff6b6b',earInner:'#ffd93d',cost:100},
];
const LAMB_VARIANTS=[
  {name:'白绵咩咩',body:'#fff',face:'#ffe4c4'},
  {name:'灰咩咩',body:'#bbb',face:'#ddd'},
  {name:'粉咩咩',body:'#ffcdd2',face:'#fff0f5'},
];

// ===== SHOP ITEMS =====
const FOOD_ITEMS=[
  {id:'carrot',name:'🥕 胡萝卜',cost:5,happyBoost:1,forPet:'bunny'},
  {id:'apple',name:'🍎 苹果',cost:10,happyBoost:2,forPet:'bunny'},
  {id:'cake',name:'🧁 蛋糕',cost:20,happyBoost:3,forPet:'bunny'},
  {id:'hay',name:'🌾 干草',cost:5,happyBoost:1,forPet:'lamb',minLevel:10},
  {id:'deluxeCake',name:'🍰 豪华蛋糕',cost:50,happyBoost:5,forPet:'both'},
];
const TRAP_SHOP=[
  {id:'arrow',name:'🏹 弓箭塔',cost:30},
  {id:'ice',name:'🧊 冰冻',cost:40},
  {id:'bomb',name:'💣 炸弹',cost:50},
  {id:'sling',name:'🪃 弹弓',cost:80},
];

// ===== TRAP DEFINITIONS =====
const TRAP_DEFS=[
  {id:'debris',name:'渣渣',icon:'🪨',cost:5,damage:15,range:1,rate:1500,hp:30,area:false,slow:0.2,slowDur:1000},
  {id:'spikes',name:'刺',icon:'📌',cost:8,damage:30,range:0.5,rate:1000,hp:20,area:false,floor:true,slow:0,slowDur:0},
  {id:'sword',name:'普通小剑',icon:'🗡️',cost:10,damage:20,range:1.5,rate:800,hp:40,area:false,slow:0,slowDur:0},
  {id:'arrow',name:'弓箭塔',icon:'🏹',cost:20,damage:12,range:2.5,rate:700,hp:50,area:false,slow:0,slowDur:0},
  {id:'bomb',name:'炸弹',icon:'💣',cost:35,damage:50,range:1.5,rate:2500,hp:25,area:true,areaR:1.0,slow:0,slowDur:0},
  {id:'ice',name:'冰冻',icon:'🧊',cost:25,damage:0,range:1.8,rate:3000,hp:35,area:true,areaR:1.2,slow:0,slowDur:0,freeze:3000},
  {id:'sling',name:'弹弓',icon:'🪃',cost:50,damage:45,range:3.5,rate:2200,hp:60,area:false,slow:0,slowDur:0},
];
function getTrapDef(id){return TRAP_DEFS.find(t=>t.id===id);}

// ===== ENEMY DEFINITIONS =====
const ENEMY_DEFS={
  wolf:{name:'恶狼',color:'#666',hp:60,speed:1.2,atk:10,reward:8,xpReward:3,size:0.35},
  fox:{name:'臭狐狸',color:'#e67e22',hp:35,speed:2.0,atk:5,reward:5,xpReward:2,size:0.3},
  bear:{name:'暴熊',color:'#5d3a1a',hp:150,speed:0.7,atk:25,reward:15,xpReward:5,size:0.45},
  slime:{name:'淤泥怪',color:'#4a6741',hp:100,speed:0.5,atk:15,reward:12,xpReward:4,size:0.4},
  splitter:{name:'逼扒怪',color:'#8b45a6',hp:80,speed:0.8,atk:8,reward:10,xpReward:4,size:0.4,splits:true},
  boss:{name:'Boss',color:'#8b0000',hp:300,speed:0.5,atk:30,reward:25,xpReward:10,size:0.55},
};

// ===== CASTLE MAP (3-floor cross section) =====
// Floor layout: each floor has cells. Path winds up the castle.
// We define floors and the path through them.
const FLOOR_CELLS=6; // cells per floor corridor
const FLOORS=3;
let CELL, castleX, castleY, castleW, castleH, floorH, cellW;

// Path: bottom floor L→R, stairs R, mid floor R→L, stairs L, top floor L→R → carrot
// Path stored as pixel waypoints, computed on resize
let pathWaypoints=[];
let pathCells=[]; // {floor, cellIdx, x, y} for buildable cells
let buildableCells=[]; // cells adjacent to path where traps can go

function computeCastleLayout(){
  let margin=10;
  let topBarH=40, bottomH=72;
  let availW=W-margin*2, availH=H-topBarH-bottomH-margin*2;
  castleW=Math.min(availW, 500);
  castleH=Math.min(availH, 600);
  castleX=(W-castleW)/2;
  castleY=topBarH+margin+(availH-castleH)/2;
  floorH=castleH/4; // 3 floors + basement area
  cellW=castleW/(FLOOR_CELLS+2); // +2 for walls
  CELL=Math.min(cellW, floorH*0.6);

  // Compute path waypoints
  pathWaypoints=[];
  // Gate entry at bottom center
  let gateX=castleX+castleW/2;
  let gateY=castleY+castleH;
  pathWaypoints.push({x:gateX, y:gateY+20}); // start off screen
  pathWaypoints.push({x:gateX, y:gateY-10}); // enter gate

  // Bottom floor (floor 0): left to right
  let f0y=castleY+castleH-floorH*0.5;
  let floorLeft=castleX+cellW;
  let floorRight=castleX+castleW-cellW;
  pathWaypoints.push({x:floorLeft, y:f0y});
  for(let i=0;i<FLOOR_CELLS;i++){
    pathWaypoints.push({x:floorLeft+cellW*i+cellW/2, y:f0y});
  }
  pathWaypoints.push({x:floorRight, y:f0y});

  // Stairs right side up to floor 1
  let f1y=castleY+castleH-floorH*1.7;
  pathWaypoints.push({x:floorRight, y:f1y});

  // Middle floor (floor 1): right to left
  for(let i=FLOOR_CELLS-1;i>=0;i--){
    pathWaypoints.push({x:floorLeft+cellW*i+cellW/2, y:f1y});
  }
  pathWaypoints.push({x:floorLeft, y:f1y});

  // Stairs left side up to floor 2
  let f2y=castleY+castleH-floorH*2.9;
  pathWaypoints.push({x:floorLeft, y:f2y});

  // Top floor (floor 2): left to right
  for(let i=0;i<FLOOR_CELLS;i++){
    pathWaypoints.push({x:floorLeft+cellW*i+cellW/2, y:f2y});
  }
  pathWaypoints.push({x:floorRight, y:f2y});
  // Carrot at end
  pathWaypoints.push({x:floorRight+cellW*0.3, y:f2y});

  // Build cell grid for trap placement
  buildableCells=[];
  let floors=[f0y, f1y, f2y];
  for(let f=0;f<3;f++){
    for(let i=0;i<FLOOR_CELLS;i++){
      let cx=floorLeft+cellW*i+cellW/2;
      let cy=floors[f];
      // Above path
      buildableCells.push({floor:f,idx:i,x:cx,y:cy-CELL*0.9,pos:'above'});
      // Below path (if not bottom floor ground)
      if(f>0) buildableCells.push({floor:f,idx:i,x:cx,y:cy+CELL*0.9,pos:'below'});
    }
  }
}

function getFloorY(f){
  let floors=[castleY+castleH-floorH*0.5, castleY+castleH-floorH*1.7, castleY+castleH-floorH*2.9];
  return floors[f]||floors[0];
}

// ===== DRAWING FUNCTIONS =====

function drawCuteBunny(x,y,size,variant,happy,angry,animT,_ctx){
  let c=_ctx||ctx;
  let v=BUNNY_VARIANTS[variant]||BUNNY_VARIANTS[0];
  let s=size;
  let bob=Math.sin((animT||0)*3)*s*0.04;
  let earWiggle=Math.sin((animT||0)*4)*0.12;
  y+=bob;

  // Soft outline
  c.lineWidth=s*0.04;
  c.strokeStyle=v.outline;

  // Body — very round chubby circle
  if(v.body==='rainbow'){
    let grad=c.createLinearGradient(x-s,y-s,x+s,y+s);
    grad.addColorStop(0,'#ff6b6b');grad.addColorStop(0.2,'#ffd93d');grad.addColorStop(0.4,'#6bff6b');
    grad.addColorStop(0.6,'#6bd4ff');grad.addColorStop(0.8,'#b06bff');grad.addColorStop(1,'#ff6bb0');
    c.fillStyle=grad;
  } else c.fillStyle=v.body;
  c.beginPath();c.arc(x,y,s,0,Math.PI*2);c.fill();c.stroke();

  // Spots
  if(v.spots){
    c.fillStyle='#ffb6c1';
    c.beginPath();c.arc(x-s*0.3,y-s*0.15,s*0.13,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+s*0.25,y+s*0.2,s*0.1,0,Math.PI*2);c.fill();
  }

  // Ears
  c.save();
  c.translate(x-s*0.3,y-s*0.85);c.rotate(-0.15+earWiggle);
  c.fillStyle=v.body==='rainbow'?'#ffb6c1':v.body;
  c.beginPath();c.ellipse(0,-s*0.55,s*0.2,s*0.55,0,0,Math.PI*2);c.fill();
  c.strokeStyle=v.outline;c.stroke();
  c.fillStyle=v.earInner;
  c.beginPath();c.ellipse(0,-s*0.55,s*0.1,s*0.35,0,0,Math.PI*2);c.fill();
  c.restore();
  c.save();
  c.translate(x+s*0.3,y-s*0.85);c.rotate(0.15-earWiggle);
  c.fillStyle=v.body==='rainbow'?'#ffb6c1':v.body;
  c.beginPath();c.ellipse(0,-s*0.55,s*0.2,s*0.55,0,0,Math.PI*2);c.fill();
  c.strokeStyle=v.outline;c.stroke();
  c.fillStyle=v.earInner;
  c.beginPath();c.ellipse(0,-s*0.55,s*0.1,s*0.35,0,0,Math.PI*2);c.fill();
  c.restore();

  // Stub arms
  c.fillStyle=v.body==='rainbow'?'#ffb6c1':v.body;
  c.beginPath();c.ellipse(x-s*0.85,y+s*0.1,s*0.15,s*0.2,0.3,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(x+s*0.85,y+s*0.1,s*0.15,s*0.2,-0.3,0,Math.PI*2);c.fill();

  // Eyes
  if(happy){
    c.strokeStyle='#333';c.lineWidth=s*0.06;c.lineCap='round';
    c.beginPath();c.arc(x-s*0.22,y-s*0.1,s*0.1,Math.PI*0.15,Math.PI*0.85);c.stroke();
    c.beginPath();c.arc(x+s*0.22,y-s*0.1,s*0.1,Math.PI*0.15,Math.PI*0.85);c.stroke();
  } else if(angry){
    c.fillStyle='#333';
    c.beginPath();c.arc(x-s*0.22,y-s*0.05,s*0.07,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+s*0.22,y-s*0.05,s*0.07,0,Math.PI*2);c.fill();
    // Angry brows
    c.strokeStyle='#333';c.lineWidth=s*0.06;
    c.beginPath();c.moveTo(x-s*0.38,y-s*0.25);c.lineTo(x-s*0.12,y-s*0.15);c.stroke();
    c.beginPath();c.moveTo(x+s*0.38,y-s*0.25);c.lineTo(x+s*0.12,y-s*0.15);c.stroke();
  } else {
    c.fillStyle='#333';
    c.beginPath();c.arc(x-s*0.22,y-s*0.08,s*0.08,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+s*0.22,y-s*0.08,s*0.08,0,Math.PI*2);c.fill();
    // Sparkle
    c.fillStyle='#fff';
    c.beginPath();c.arc(x-s*0.19,y-s*0.12,s*0.03,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+s*0.25,y-s*0.12,s*0.03,0,Math.PI*2);c.fill();
  }

  // Kawaii ω mouth
  c.strokeStyle='#d4878f';c.lineWidth=s*0.04;c.lineCap='round';
  c.beginPath();
  if(angry){
    c.arc(x,y+s*0.3,s*0.1,Math.PI*1.2,Math.PI*1.8);
  } else {
    // ω shape
    c.moveTo(x-s*0.12,y+s*0.15);
    c.quadraticCurveTo(x-s*0.06,y+s*0.28,x,y+s*0.18);
    c.quadraticCurveTo(x+s*0.06,y+s*0.28,x+s*0.12,y+s*0.15);
  }
  c.stroke();

  // Big rosy cheeks
  c.fillStyle='rgba(255,150,180,0.5)';
  c.beginPath();c.arc(x-s*0.45,y+s*0.05,s*0.18,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*0.45,y+s*0.05,s*0.18,0,Math.PI*2);c.fill();
}

function drawCuteLamb(x,y,size,variant,happy,angry,animT,_ctx){
  let c=_ctx||ctx;
  let v=LAMB_VARIANTS[variant]||LAMB_VARIANTS[0];
  let s=size;
  let bob=Math.sin((animT||0)*2.5)*s*0.03;
  y+=bob;

  // Stub legs
  c.fillStyle='#8b7355';
  c.fillRect(x-s*0.4,y+s*0.55,s*0.18,s*0.3);
  c.fillRect(x+s*0.22,y+s*0.55,s*0.18,s*0.3);

  // Cloud body (overlapping circles)
  c.fillStyle=v.body;
  let bumps=[[0,-0.1,0.6],[0.45,0,0.35],[-0.45,0,0.35],[0.3,-0.3,0.3],[-0.3,-0.3,0.3],[0,0.25,0.4],[0.35,0.2,0.3],[-0.35,0.2,0.3]];
  for(let b of bumps){c.beginPath();c.arc(x+b[0]*s,y+b[1]*s,b[2]*s,0,Math.PI*2);c.fill();}

  // Face
  c.fillStyle=v.face;
  c.beginPath();c.arc(x,y-s*0.05,s*0.32,0,Math.PI*2);c.fill();

  // Curly horns
  c.strokeStyle='#c8a96e';c.lineWidth=s*0.07;c.lineCap='round';
  c.beginPath();c.arc(x-s*0.22,y-s*0.45,s*0.1,Math.PI*0.5,Math.PI*2);c.stroke();
  c.beginPath();c.arc(x+s*0.22,y-s*0.45,s*0.1,Math.PI,Math.PI*2.5);c.stroke();

  // Eyes
  if(happy){
    c.strokeStyle='#333';c.lineWidth=s*0.05;c.lineCap='round';
    c.beginPath();c.arc(x-s*0.13,y-s*0.08,s*0.07,Math.PI*0.2,Math.PI*0.8);c.stroke();
    c.beginPath();c.arc(x+s*0.13,y-s*0.08,s*0.07,Math.PI*0.2,Math.PI*0.8);c.stroke();
  } else {
    c.fillStyle='#333';
    c.beginPath();c.arc(x-s*0.13,y-s*0.08,s*0.06,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+s*0.13,y-s*0.08,s*0.06,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';
    c.beginPath();c.arc(x-s*0.11,y-s*0.1,s*0.025,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+s*0.15,y-s*0.1,s*0.025,0,Math.PI*2);c.fill();
  }

  // Cheeks
  c.fillStyle='rgba(255,150,180,0.4)';
  c.beginPath();c.arc(x-s*0.25,y+s*0.02,s*0.08,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*0.25,y+s*0.02,s*0.08,0,Math.PI*2);c.fill();

  // Mouth
  c.strokeStyle='#d4878f';c.lineWidth=s*0.04;c.lineCap='round';
  c.beginPath();
  c.moveTo(x-s*0.08,y+s*0.1);
  c.quadraticCurveTo(x-s*0.04,y+s*0.18,x,y+s*0.12);
  c.quadraticCurveTo(x+s*0.04,y+s*0.18,x+s*0.08,y+s*0.1);
  c.stroke();
}

// ===== FIERCE ENEMY DRAWING =====

function drawWolf(c,x,y,sz,animT){
  let s=sz/2;
  // Body
  c.fillStyle='#555';
  c.beginPath();c.ellipse(x,y,s,s*0.8,0,0,Math.PI*2);c.fill();
  // Spiky fur on top
  c.fillStyle='#666';
  for(let i=-3;i<=3;i++){
    let bx=x+i*s*0.2, by=y-s*0.7;
    c.beginPath();c.moveTo(bx-s*0.08,by+s*0.15);c.lineTo(bx,by-s*0.15);c.lineTo(bx+s*0.08,by+s*0.15);c.fill();
  }
  // Ears
  c.fillStyle='#555';
  c.beginPath();c.moveTo(x-s*0.6,y-s*0.5);c.lineTo(x-s*0.4,y-s*1.1);c.lineTo(x-s*0.15,y-s*0.5);c.fill();
  c.beginPath();c.moveTo(x+s*0.15,y-s*0.5);c.lineTo(x+s*0.4,y-s*1.1);c.lineTo(x+s*0.6,y-s*0.5);c.fill();
  // Red glowing eyes
  c.fillStyle='#ff2222';
  c.shadowColor='#ff0000';c.shadowBlur=s*0.3;
  c.beginPath();c.ellipse(x-s*0.25,y-s*0.15,s*0.12,s*0.08,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(x+s*0.25,y-s*0.15,s*0.12,s*0.08,0,0,Math.PI*2);c.fill();
  c.shadowBlur=0;
  // Pupil slits
  c.fillStyle='#000';
  c.fillRect(x-s*0.27,y-s*0.2,s*0.04,s*0.12);
  c.fillRect(x+s*0.23,y-s*0.2,s*0.04,s*0.12);
  // Bared teeth - zigzag
  c.fillStyle='#fff';
  c.beginPath();c.moveTo(x-s*0.3,y+s*0.15);
  for(let i=0;i<6;i++){
    let tx=x-s*0.3+i*s*0.12;
    c.lineTo(tx+s*0.06,y+s*0.3);c.lineTo(tx+s*0.12,y+s*0.15);
  }
  c.closePath();c.fill();
}

function drawFox(c,x,y,sz,animT){
  let s=sz/2;
  // Body
  c.fillStyle='#d4691a';
  c.beginPath();c.ellipse(x,y,s,s*0.75,0,0,Math.PI*2);c.fill();
  // Bushy tail
  c.fillStyle='#d4691a';c.strokeStyle='#fff';c.lineWidth=1;
  c.beginPath();
  c.moveTo(x+s*0.6,y);
  c.quadraticCurveTo(x+s*1.5,y-s*0.8+Math.sin(animT*5)*s*0.15,x+s*1.2,y-s*0.3);
  c.quadraticCurveTo(x+s*1.0,y+s*0.2,x+s*0.6,y+s*0.1);
  c.fill();
  // White tail tip
  c.fillStyle='#fff';
  c.beginPath();c.arc(x+s*1.15,y-s*0.25,s*0.15,0,Math.PI*2);c.fill();
  // Ears
  c.fillStyle='#d4691a';
  c.beginPath();c.moveTo(x-s*0.5,y-s*0.5);c.lineTo(x-s*0.35,y-s*1.1);c.lineTo(x-s*0.1,y-s*0.5);c.fill();
  c.beginPath();c.moveTo(x+s*0.1,y-s*0.5);c.lineTo(x+s*0.35,y-s*1.1);c.lineTo(x+s*0.5,y-s*0.5);c.fill();
  // Evil slit eyes
  c.fillStyle='#ffff00';c.shadowColor='#ffff00';c.shadowBlur=s*0.2;
  c.beginPath();
  c.moveTo(x-s*0.35,y-s*0.12);c.lineTo(x-s*0.2,y-s*0.2);c.lineTo(x-s*0.1,y-s*0.12);c.lineTo(x-s*0.2,y-s*0.05);c.closePath();c.fill();
  c.beginPath();
  c.moveTo(x+s*0.1,y-s*0.12);c.lineTo(x+s*0.2,y-s*0.2);c.lineTo(x+s*0.35,y-s*0.12);c.lineTo(x+s*0.2,y-s*0.05);c.closePath();c.fill();
  c.shadowBlur=0;
  // Slit pupils
  c.fillStyle='#000';
  c.fillRect(x-s*0.22,y-s*0.17,s*0.03,s*0.1);
  c.fillRect(x+s*0.19,y-s*0.17,s*0.03,s*0.1);
  // Sharp teeth
  c.fillStyle='#fff';
  c.beginPath();c.moveTo(x-s*0.15,y+s*0.18);c.lineTo(x-s*0.1,y+s*0.35);c.lineTo(x-s*0.05,y+s*0.18);c.fill();
  c.beginPath();c.moveTo(x+s*0.05,y+s*0.18);c.lineTo(x+s*0.1,y+s*0.35);c.lineTo(x+s*0.15,y+s*0.18);c.fill();
}

function drawBear(c,x,y,sz,animT){
  let s=sz/2;
  // Body massive
  c.fillStyle='#5d3a1a';
  c.beginPath();c.ellipse(x,y,s*1.1,s,0,0,Math.PI*2);c.fill();
  // Round ears
  c.beginPath();c.arc(x-s*0.6,y-s*0.7,s*0.3,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*0.6,y-s*0.7,s*0.3,0,Math.PI*2);c.fill();
  c.fillStyle='#8b5e3c';
  c.beginPath();c.arc(x-s*0.6,y-s*0.7,s*0.15,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*0.6,y-s*0.7,s*0.15,0,Math.PI*2);c.fill();
  // Angry red eyes
  c.fillStyle='#ff0000';c.shadowColor='#ff0000';c.shadowBlur=s*0.4;
  c.beginPath();c.arc(x-s*0.3,y-s*0.2,s*0.12,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*0.3,y-s*0.2,s*0.12,0,Math.PI*2);c.fill();
  c.shadowBlur=0;
  c.fillStyle='#000';
  c.beginPath();c.arc(x-s*0.3,y-s*0.2,s*0.05,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*0.3,y-s*0.2,s*0.05,0,Math.PI*2);c.fill();
  // Open roaring mouth
  c.fillStyle='#3a0a0a';
  c.beginPath();c.ellipse(x,y+s*0.25,s*0.35,s*0.25,0,0,Math.PI*2);c.fill();
  c.fillStyle='#ff3333';
  c.beginPath();c.ellipse(x,y+s*0.3,s*0.15,s*0.1,0,0,Math.PI*2);c.fill(); // tongue
  // Teeth
  c.fillStyle='#fff';
  for(let i=-2;i<=2;i++){
    c.beginPath();c.moveTo(x+i*s*0.12-s*0.05,y+s*0.08);c.lineTo(x+i*s*0.12,y+s*0.2);c.lineTo(x+i*s*0.12+s*0.05,y+s*0.08);c.fill();
  }
  // Claw marks
  c.strokeStyle='#ff4444';c.lineWidth=s*0.06;c.lineCap='round';
  for(let i=0;i<3;i++){
    let cx=x+s*0.3+i*s*0.12;
    c.beginPath();c.moveTo(cx,y-s*0.1);c.lineTo(cx+s*0.08,y+s*0.3);c.stroke();
  }
}

function drawSlime(c,x,y,sz,animT){
  let s=sz/2;
  let t=animT||0;
  // Bubbling dripping body
  c.fillStyle='#4a6741';
  c.beginPath();
  c.moveTo(x-s,y+s*0.4);
  for(let a=0;a<=Math.PI;a+=0.2){
    let bx=x-s+a/Math.PI*s*2;
    let by=y-s*0.6+Math.sin(a*3+t*4)*s*0.12;
    c.lineTo(bx,by);
  }
  c.lineTo(x+s,y+s*0.4);
  c.quadraticCurveTo(x,y+s*0.6,x-s,y+s*0.4);
  c.fill();
  // Dripping particles
  for(let i=0;i<3;i++){
    let dx=x+Math.sin(t*2+i*2.1)*s*0.6;
    let dy=y+s*0.4+((t*60+i*30)%40)*s*0.02;
    c.beginPath();c.ellipse(dx,dy,s*0.08,s*0.12,0,0,Math.PI*2);c.fill();
  }
  // Toxic green eyes
  c.fillStyle='#00ff44';c.shadowColor='#00ff44';c.shadowBlur=s*0.3;
  c.beginPath();c.arc(x-s*0.25,y-s*0.15,s*0.13,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*0.25,y-s*0.15,s*0.13,0,Math.PI*2);c.fill();
  c.shadowBlur=0;
  c.fillStyle='#000';
  c.beginPath();c.arc(x-s*0.25,y-s*0.15,s*0.05,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*0.25,y-s*0.15,s*0.05,0,Math.PI*2);c.fill();
  // Angry mouth in slime
  c.strokeStyle='#2a3a28';c.lineWidth=s*0.06;
  c.beginPath();c.arc(x,y+s*0.15,s*0.15,Math.PI*1.15,Math.PI*1.85);c.stroke();
}

function drawSplitter(c,x,y,sz,animT,isMini){
  let s=sz/2;
  let t=animT||0;
  let wobble=Math.sin(t*6)*s*0.04;

  // Blocky body — bottom wider block
  c.fillStyle='#6b3fa0';
  let bw=s*1.4+wobble, bh=s*0.8;
  let tw=s*1.0+wobble, th=s*0.7;
  // Bottom block
  c.fillRect(x-bw/2,y-bh*0.2,bw,bh);
  // Top block (head)
  c.fillRect(x-tw/2,y-bh*0.2-th,tw,th);
  // Small horn/bump on top
  c.fillStyle='#9b6fd0';
  c.beginPath();c.moveTo(x-s*0.1,y-bh*0.2-th);c.lineTo(x,y-bh*0.2-th-s*0.3);c.lineTo(x+s*0.1,y-bh*0.2-th);c.fill();

  // Triangle/chevron patterns
  c.fillStyle='#9b6fd0';
  let py=y+bh*0.2;
  if(!isMini){
    for(let i=-1;i<=1;i++){
      let tx=x+i*s*0.4;
      c.beginPath();c.moveTo(tx-s*0.12,py);c.lineTo(tx,py-s*0.2);c.lineTo(tx+s*0.12,py);c.fill();
    }
  } else {
    c.beginPath();c.moveTo(x-s*0.12,py);c.lineTo(x,py-s*0.15);c.lineTo(x+s*0.12,py);c.fill();
  }

  // Eyes on upper block
  c.fillStyle='#e0c0ff';
  let eyeY=y-bh*0.2-th*0.5;
  if(isMini){
    c.beginPath();c.arc(x,eyeY,s*0.12,0,Math.PI*2);c.fill();
    c.fillStyle='#000';c.beginPath();c.arc(x,eyeY,s*0.05,0,Math.PI*2);c.fill();
  } else {
    c.beginPath();c.arc(x-s*0.2,eyeY,s*0.1,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+s*0.2,eyeY,s*0.1,0,Math.PI*2);c.fill();
    c.fillStyle='#000';
    c.beginPath();c.arc(x-s*0.2,eyeY,s*0.04,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+s*0.2,eyeY,s*0.04,0,Math.PI*2);c.fill();
  }

  // Stubby feet
  c.fillStyle='#5a2d8a';
  c.fillRect(x-bw/2+s*0.05,y+bh*0.6,s*0.25,s*0.15);
  c.fillRect(x+bw/2-s*0.3,y+bh*0.6,s*0.25,s*0.15);
}

function drawBoss(c,x,y,sz,animT){
  // Boss is a giant bear variant
  drawBear(c,x,y,sz,animT);
  // Crown
  let s=sz/2;
  c.fillStyle='#ffd700';
  c.beginPath();
  c.moveTo(x-s*0.4,y-s*0.9);c.lineTo(x-s*0.5,y-s*1.3);c.lineTo(x-s*0.2,y-s*1.1);
  c.lineTo(x,y-s*1.35);c.lineTo(x+s*0.2,y-s*1.1);c.lineTo(x+s*0.5,y-s*1.3);
  c.lineTo(x+s*0.4,y-s*0.9);c.closePath();c.fill();
  // Gems
  c.fillStyle='#ff0000';
  c.beginPath();c.arc(x,y-s*1.05,s*0.06,0,Math.PI*2);c.fill();
}

function drawEnemy(e,animT){
  let sz=e.size*(CELL||30);
  let c=ctx;
  c.save();
  if(e.type==='wolf') drawWolf(c,e.x,e.y,sz,animT);
  else if(e.type==='fox') drawFox(c,e.x,e.y,sz,animT);
  else if(e.type==='bear') drawBear(c,e.x,e.y,sz,animT);
  else if(e.type==='slime') drawSlime(c,e.x,e.y,sz,animT);
  else if(e.type==='splitter') drawSplitter(c,e.x,e.y,sz,animT,e.isMini);
  else if(e.type==='boss') drawBoss(c,e.x,e.y,sz,animT);
  c.restore();
  // HP bar
  if(e.hp<e.maxHp){
    let bw=sz*1.2,bh=3;
    c.fillStyle='#333';c.fillRect(e.x-bw/2,e.y-sz/2-8,bw,bh);
    c.fillStyle=e.hp/e.maxHp>0.5?'#4f2':'#f42';
    c.fillRect(e.x-bw/2,e.y-sz/2-8,bw*(e.hp/e.maxHp),bh);
  }
  // Slow/freeze indicator
  if(e.frozenUntil>performance.now()){
    c.strokeStyle='rgba(100,200,255,0.7)';c.lineWidth=2;
    c.beginPath();c.arc(e.x,e.y,sz/2+4,0,Math.PI*2);c.stroke();
    c.fillStyle='rgba(100,200,255,0.15)';c.fill();
  } else if(e.slowUntil>performance.now()){
    c.strokeStyle='rgba(100,200,255,0.4)';c.lineWidth=1;
    c.beginPath();c.arc(e.x,e.y,sz/2+3,0,Math.PI*2);c.stroke();
  }
}

// ===== CASTLE DRAWING =====
function drawCastle(ts){
  let t=ts/1000;
  // Night sky + stars
  let skyGrad=ctx.createLinearGradient(0,0,0,castleY);
  skyGrad.addColorStop(0,'#0a0a2a');skyGrad.addColorStop(1,'#1a1a3e');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,castleY+20);
  // Stars
  for(let i=0;i<30;i++){
    let sx=(i*137.5+50)%W, sy=(i*97.3+20)%(castleY-10);
    let blink=0.5+0.5*Math.sin(t*2+i);
    ctx.fillStyle=`rgba(255,255,220,${blink*0.7})`;
    ctx.beginPath();ctx.arc(sx,sy,1+blink,0,Math.PI*2);ctx.fill();
  }
  // Moon
  ctx.fillStyle='#fffde7';ctx.shadowColor='#fffde7';ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(castleX+castleW*0.8,castleY-30,18,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Grass below castle
  ctx.fillStyle='#2d5a1e';
  ctx.fillRect(0,castleY+castleH,W,H-castleY-castleH);
  // Grass tufts
  ctx.fillStyle='#3a7a28';
  for(let i=0;i<20;i++){
    let gx=i*(W/20)+5;
    ctx.beginPath();ctx.moveTo(gx,castleY+castleH);
    ctx.lineTo(gx+4,castleY+castleH-8-Math.sin(t+i)*2);
    ctx.lineTo(gx+8,castleY+castleH);ctx.fill();
  }

  // Castle walls
  ctx.fillStyle='#c9a96e';
  ctx.fillRect(castleX,castleY,castleW,castleH);

  // Stone block texture
  ctx.strokeStyle='#8b7355';ctx.lineWidth=1;
  let brickH=castleH/16;
  for(let r=0;r<16;r++){
    let by=castleY+r*brickH;
    ctx.beginPath();ctx.moveTo(castleX,by);ctx.lineTo(castleX+castleW,by);ctx.stroke();
    let offset=(r%2)*cellW*0.5;
    for(let cx=castleX+offset;cx<castleX+castleW;cx+=cellW){
      ctx.beginPath();ctx.moveTo(cx,by);ctx.lineTo(cx,by+brickH);ctx.stroke();
    }
  }

  // Floor dividers (wooden beams)
  let floors=[getFloorY(0),getFloorY(1),getFloorY(2)];
  ctx.fillStyle='#6b4226';
  for(let f=0;f<3;f++){
    let fy=floors[f]+CELL*0.5;
    ctx.fillRect(castleX,fy,castleW,6);
    ctx.fillStyle='#8b5a2e';
    ctx.fillRect(castleX,fy-2,castleW,2);
    ctx.fillStyle='#6b4226';
  }

  // Floor tiles
  ctx.fillStyle='#deb887';
  let floorLeft=castleX+cellW;
  for(let f=0;f<3;f++){
    let fy=floors[f];
    for(let i=0;i<FLOOR_CELLS;i++){
      let tx=floorLeft+cellW*i;
      ctx.fillStyle=(i+f)%2===0?'#deb887':'#d2a870';
      ctx.fillRect(tx,fy-CELL*0.3,cellW,CELL*0.6);
      ctx.strokeStyle='#c9a050';ctx.lineWidth=0.5;
      ctx.strokeRect(tx,fy-CELL*0.3,cellW,CELL*0.6);
    }
  }

  // Stairs (right side: floor 0→1, left side: floor 1→2)
  ctx.fillStyle='#a08050';
  // Right stairs
  let rs_x=castleX+castleW-cellW*1.2;
  let rs_top=floors[1]+CELL*0.5;
  let rs_bot=floors[0]-CELL*0.3;
  let steps=6;
  for(let i=0;i<steps;i++){
    let sy=rs_bot-(rs_bot-rs_top)/steps*i;
    let sw=cellW*0.8;
    ctx.fillStyle=i%2===0?'#a08050':'#b89060';
    ctx.fillRect(rs_x,sy-(rs_bot-rs_top)/steps,sw,(rs_bot-rs_top)/steps+1);
  }
  // Left stairs
  let ls_x=castleX+cellW*0.2;
  let ls_top=floors[2]+CELL*0.5;
  let ls_bot=floors[1]-CELL*0.3;
  for(let i=0;i<steps;i++){
    let sy=ls_bot-(ls_bot-ls_top)/steps*i;
    let sw=cellW*0.8;
    ctx.fillStyle=i%2===0?'#a08050':'#b89060';
    ctx.fillRect(ls_x,sy-(ls_bot-ls_top)/steps,sw,(ls_bot-ls_top)/steps+1);
  }

  // Battlements on top
  ctx.fillStyle='#a08050';
  for(let i=0;i<Math.floor(castleW/20);i++){
    if(i%2===0) ctx.fillRect(castleX+i*20,castleY-12,18,14);
  }

  // Gate arch at bottom
  let gx=castleX+castleW/2, gy=castleY+castleH;
  ctx.fillStyle='#3a2510';
  ctx.beginPath();
  ctx.moveTo(gx-cellW*0.6,gy);
  ctx.lineTo(gx-cellW*0.6,gy-cellW*0.8);
  ctx.arc(gx,gy-cellW*0.8,cellW*0.6,Math.PI,0);
  ctx.lineTo(gx+cellW*0.6,gy);
  ctx.closePath();ctx.fill();
  // Gate bars
  ctx.strokeStyle='#5a3a1a';ctx.lineWidth=2;
  for(let i=-2;i<=2;i++){
    ctx.beginPath();ctx.moveTo(gx+i*cellW*0.15,gy);ctx.lineTo(gx+i*cellW*0.15,gy-cellW*1.0);ctx.stroke();
  }

  // Torches on walls (flickering)
  let torchPositions=[
    {x:castleX+cellW*0.4,y:floors[0]-CELL*0.1},
    {x:castleX+castleW-cellW*0.4,y:floors[0]-CELL*0.1},
    {x:castleX+cellW*0.4,y:floors[1]-CELL*0.1},
    {x:castleX+castleW-cellW*0.4,y:floors[1]-CELL*0.1},
    {x:castleX+castleW/2,y:floors[2]-CELL*0.1},
  ];
  for(let i=0;i<torchPositions.length;i++){
    let tp=torchPositions[i];
    // Stick
    ctx.fillStyle='#5a3a1a';
    ctx.fillRect(tp.x-2,tp.y,4,12);
    // Flame
    let flicker=0.7+0.3*Math.sin(t*8+i*1.5);
    let grad=ctx.createRadialGradient(tp.x,tp.y-4,0,tp.x,tp.y-4,10*flicker);
    grad.addColorStop(0,'rgba(255,200,50,0.9)');
    grad.addColorStop(0.5,'rgba(255,120,20,0.5)');
    grad.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(tp.x,tp.y-4,10*flicker,0,Math.PI*2);ctx.fill();
  }
}

// ===== DRAWING PATH OVERLAY =====
function drawPath(){
  ctx.strokeStyle='rgba(255,255,200,0.15)';ctx.lineWidth=CELL*0.4;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(let i=0;i<pathWaypoints.length;i++){
    let w=pathWaypoints[i];
    if(i===0) ctx.moveTo(w.x,w.y); else ctx.lineTo(w.x,w.y);
  }
  ctx.stroke();
}

// ===== DRAW BUILDABLE CELLS =====
function drawBuildCells(){
  if(selectedTrap===null) return;
  ctx.fillStyle='rgba(100,255,100,0.12)';
  ctx.strokeStyle='rgba(100,255,100,0.25)';ctx.lineWidth=1;
  for(let bc of buildableCells){
    if(traps.find(t=>t.cellRef===bc)) continue;
    let rx=bc.x-CELL*0.4, ry=bc.y-CELL*0.4, rw=CELL*0.8, rh=CELL*0.8;
    ctx.fillRect(rx,ry,rw,rh);
    ctx.strokeRect(rx,ry,rw,rh);
  }
}

// ===== DRAW CARROT =====
function drawCarrot(x,y){
  let s=CELL*0.3;
  ctx.fillStyle='#2ecc71';
  ctx.beginPath();ctx.moveTo(x-s*0.3,y-s);ctx.lineTo(x,y-s*1.5);ctx.lineTo(x+s*0.3,y-s);ctx.fill();
  ctx.fillStyle='#e67e22';
  ctx.beginPath();ctx.moveTo(x-s*0.45,y-s*0.5);ctx.lineTo(x+s*0.45,y-s*0.5);ctx.lineTo(x,y+s);ctx.fill();
}

// ===== WAVE GENERATION =====
function getWaveEnemies(level,wave){
  let hpMult=1+(level-1)*0.3;
  let spdMult=1+(level-1)*0.08;
  if(level>10){
    hpMult=(1+9*0.3)*1.5+(level-10)*0.2;
    spdMult=(1+9*0.08)*1.2+(level-10)*0.04;
  }
  let n=Math.min(3+level+wave*2,35);
  let list=[];
  for(let i=0;i<n;i++){
    let r=Math.random();
    if(level>=5&&r<0.08) list.push('boss');
    else if(level>=3&&r<0.23) list.push('splitter');
    else if(level>=2&&r<0.33) list.push('slime');
    else if(r<0.5) list.push('bear');
    else if(r<0.75) list.push('fox');
    else list.push('wolf');
  }
  if(wave>=10&&level>=3) list.push('boss');
  return {enemies:list,hpMult,spdMult};
}

function spawnEnemy(type,hpMult,spdMult,pathIdx,pos){
  let def=ENEMY_DEFS[type];
  if(!def) def=ENEMY_DEFS.wolf;
  let e={
    type,pathIdx:pathIdx||0,
    x:pos?pos.x:pathWaypoints[0].x,
    y:pos?pos.y:pathWaypoints[0].y,
    hp:def.hp*hpMult,maxHp:def.hp*hpMult,
    speed:def.speed*spdMult,
    atk:def.atk,reward:def.reward,xpReward:def.xpReward||0,
    size:def.size,color:def.color,
    slowUntil:0,frozenUntil:0,alive:true,
    isMini:false,damageMult:1,
    lastTrapAtk:0, // track trap attack cooldown
  };
  return e;
}

// ===== PET DAMAGE BOOST =====
function getPetDamageBoost(){
  let boost=1;
  boost+=(petLevel-1)*0.1;
  if(lambLevel>0) boost+=lambLevel*0.1;

}

  };

  let ac=document.createElement('canvas');
  ac.width=Math.min(W-20,300);ac.height=180;
  ac.style.cssText='border-radius:16px;background:rgba(255,255,255,0.2);margin:10px auto;display:block';
  el.appendChild(ac);

  let spacing=ac.width/3;
  let actx=ac.getContext('2d');
  function drawPrev(){
    actx.clearRect(0,0,ac.width,ac.height);
    let t=performance.now()/1000;
    for(let i=0;i<3;i++){
      let cx=spacing*i+spacing/2, cy=80;
      if(i===lambAdoptSel){
        actx.strokeStyle='#ffd700';actx.lineWidth=3;
        actx.beginPath();actx.roundRect?actx.roundRect(cx-spacing/2+4,10,spacing-8,140,12):actx.rect(cx-spacing/2+4,10,spacing-8,140);actx.stroke();
      }
      drawCuteLamb(cx,cy,18,i,false,false,t,actx);
      actx.font='10px Arial';actx.textAlign='center';actx.fillStyle='#2d5a3d';
      actx.fillText(LAMB_VARIANTS[i].name,cx,160);
    }
    if(gamePhase==='lambAdoption') requestAnimationFrame(drawPrev);
  }
  drawPrev();
  ac.onclick=e=>{let rect=ac.getBoundingClientRect();let idx=Math.floor((e.clientX-rect.left)/spacing);if(idx>=0&&idx<3)lambAdoptSel=idx;};

  let btn=document.createElement('button');
  btn.className='menu-btn green';btn.textContent='确认领养 🐑';
  btn.onclick=()=>{
    lambData={type:'lamb',variant:lambAdoptSel,name:LAMB_VARIANTS[lambAdoptSel].name};
    localStorage.setItem('bunnyCastleLamb',JSON.stringify(lambData));
    lambHappiness=5;lambLevel=1;savePetState();
    showMainMenu();
  };
  el.appendChild(btn);
}

// ===== LEVEL SELECT =====
function showLevelSelect(){
  gamePhase='levelSelect';
  hideAllScreens();
  let el=document.getElementById('levelSelect');
  el.classList.add('active');
  el.innerHTML='<h1 style="margin-top:20px">⚔️ 选择关卡</h1>';

  let grid=document.createElement('div');
  grid.style.cssText='display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:350px;margin:15px auto';
  for(let i=1;i<=15;i++){
    let btn=document.createElement('button');
    let unlocked=i<=maxLevelCleared+1;
    btn.className='menu-btn small'+(unlocked?'':' disabled');
    btn.style.width='60px';
    btn.textContent=i<=maxLevelCleared?`⭐ ${i}`:unlocked?`${i}`:`🔒 ${i}`;
    if(unlocked) btn.onclick=()=>startBattle(i);
    grid.appendChild(btn);
  }
  el.appendChild(grid);

  let back=document.createElement('button');
  back.className='menu-btn small blue';back.textContent='← 返回';
  back.style.marginTop='20px';
  back.onclick=()=>showMainMenu();
  el.appendChild(back);
}

// ===== BATTLE MODE =====
function startBattle(level){
  gamePhase='battle';
  hideAllScreens();
  document.getElementById('battleUI').classList.add('active');
  currentLevel=level;currentWave=0;waveActive=false;gameOver=false;gameWon=false;
  enemies=[];traps=[];projectiles=[];particles=[];coinPopups=[];spawnQueue=[];
  selectedTrap=null;showRangeTrap=null;coins=50;gameSpeed=1;
  document.getElementById('speedBtn').textContent='1x';
  document.getElementById('speedBtn').classList.remove('active');
  computeCastleLayout();
  updateBattleUI();
  document.getElementById('waveBtn').style.display='block';
  startAutoTimer();
}

function exitBattle(){
  clearAutoTimer();
  gamePhase='menu';
  hideAllScreens();
  showMainMenu();
}

function updateBattleUI(){
  document.getElementById('coins').textContent=coins;
  document.getElementById('waveInfo').textContent=`第 ${currentWave}/10 波`;
  document.getElementById('levelDisp').textContent=currentLevel;
  buildTrapPanel();
}

function buildTrapPanel(){
  let panel=document.getElementById('bottomPanel');
  panel.innerHTML='';
  TRAP_DEFS.forEach((t,i)=>{
    let unlocked=unlockedTraps.includes(t.id);
    let card=document.createElement('div');
    card.className='trap-card';
    if(!unlocked) card.classList.add('locked');
    else if(coins<t.cost) card.classList.add('disabled');
    if(selectedTrap===i) card.classList.add('selected');
    card.innerHTML=`<div class="icon">${t.icon}</div><div>${t.name}</div><div>🪙${t.cost}</div>`;
    if(unlocked) card.onclick=()=>{selectedTrap=selectedTrap===i?null:i;showRangeTrap=null;buildTrapPanel();};
    panel.appendChild(card);
  });
}

function toggleSpeed(){
  gameSpeed=gameSpeed===1?2:1;
  let btn=document.getElementById('speedBtn');
  btn.textContent=gameSpeed+'x';
  btn.classList.toggle('active',gameSpeed===2);
}

function startWave(){
  if(waveActive||gameOver||gameWon||gamePhase!=='battle') return;
  clearAutoTimer();
  currentWave++;
  waveActive=true;
  let wdata=getWaveEnemies(currentLevel,currentWave);
  spawnQueue=wdata.enemies.map(t=>({type:t,hpMult:wdata.hpMult,spdMult:wdata.spdMult}));
  spawnTimer=0;
  document.getElementById('waveBtn').style.display='none';
  document.getElementById('autoTimer').style.display='none';
  updateBattleUI();
}

function startAutoTimer(){
  autoCountdown=12;
  let el=document.getElementById('autoTimer');
  el.style.display='block';el.textContent=`${autoCountdown}秒后自动开始`;
  clearAutoTimer();
  autoTimerId=setInterval(()=>{
    autoCountdown--;
    if(autoCountdown<=0){clearAutoTimer();startWave();}
    else el.textContent=`${autoCountdown}秒后自动开始`;
  },1000);
}
function clearAutoTimer(){if(autoTimerId){clearInterval(autoTimerId);autoTimerId=null;}}

function showWaveComplete(){
  if(currentWave>=10){winLevel();return;}
  document.getElementById('waveBtn').style.display='block';
  startAutoTimer();
}

function winLevel(){
  gameWon=true;clearAutoTimer();
  let bonus=currentLevel*15;
  let xpGain=currentLevel*8;
  coins+=bonus;xp+=xpGain;
  if(currentLevel>maxLevelCleared){maxLevelCleared=currentLevel;}
  savePetState();

  // Check lamb unlock
  if(currentLevel>=10&&!lambData){
    setTimeout(()=>showLambAdoption(),1000);
    return;
  }

  let el=document.getElementById('overlay');
  el.classList.add('active');
  document.getElementById('overlayTitle').textContent=currentLevel>=15?'🎉 恭喜通关！':'🎉 关卡胜利！';
  document.getElementById('overlayText').textContent=`+${bonus}🪙  +${xpGain}XP`;
  let btns=document.getElementById('overlayBtns');
  btns.innerHTML='';
  if(currentLevel<15){
    let b=document.createElement('button');b.className='menu-btn green';b.textContent='下一关 →';
    b.onclick=()=>{el.classList.remove('active');startBattle(currentLevel+1);};btns.appendChild(b);
  }
  let b2=document.createElement('button');b2.className='menu-btn blue';b2.textContent='返回主菜单';
  b2.onclick=()=>{el.classList.remove('active');showMainMenu();};btns.appendChild(b2);
}

function loseGame(){
  gameOver=true;clearAutoTimer();
  petAnimState.angry=true;lambAnimState.angry=true;
  setTimeout(()=>{petAnimState.angry=false;lambAnimState.angry=false;},3000);
  let el=document.getElementById('overlay');
  el.classList.add('active');
  document.getElementById('overlayTitle').textContent='😡 城堡沦陷了！';
  document.getElementById('overlayText').textContent='敌人偷走了胡萝卜...';
  let btns=document.getElementById('overlayBtns');
  btns.innerHTML='';
  let b=document.createElement('button');b.className='menu-btn';b.textContent='重试本关';
  b.onclick=()=>{el.classList.remove('active');startBattle(currentLevel);};btns.appendChild(b);
  let b2=document.createElement('button');b2.className='menu-btn blue';b2.textContent='返回主菜单';
  b2.onclick=()=>{el.classList.remove('active');showMainMenu();};btns.appendChild(b2);
}

// ===== BATTLE INPUT =====
C.addEventListener('click',e=>{
  if(gamePhase!=='battle') return;
  let cx=e.clientX,cy=e.clientY;

  // Check if clicking on existing trap (show range)
  for(let t of traps){
    if(Math.abs(cx-t.x)<CELL*0.5&&Math.abs(cy-t.y)<CELL*0.5){
      showRangeTrap=showRangeTrap===t?null:t;
      return;
    }
  }
  showRangeTrap=null;

  if(selectedTrap===null) return;
  let def=TRAP_DEFS[selectedTrap];
  if(!unlockedTraps.includes(def.id)) return;
  if(coins<def.cost) return;

  // Find closest buildable cell
  let bestCell=null, bestDist=CELL*0.6;
  for(let bc of buildableCells){
    if(traps.find(t=>t.cellRef===bc)) continue;
    let d=Math.hypot(cx-bc.x,cy-bc.y);
    if(d<bestDist){bestDist=d;bestCell=bc;}
  }
  if(!bestCell) return;

  coins-=def.cost;
  traps.push({cellRef:bestCell,x:bestCell.x,y:bestCell.y,def,lastFire:0,hp:def.hp,maxHp:def.hp});
  updateBattleUI();
});

// Touch support
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  let touch=e.touches[0];
  C.dispatchEvent(new MouseEvent('click',{clientX:touch.clientX,clientY:touch.clientY}));
},{passive:false});

// ===== KILL ENEMY =====
function killEnemy(e){
  if(!e.alive) return;

  // Splitter mechanic
  if(e.type==='splitter'&&!e.isMini){
    e.alive=false;
    // Flash effect
    particles.push({x:e.x,y:e.y,r:e.size*(CELL||30)*0.6,color:'rgba(255,255,255,0.8)',life:200,maxLife:200,type:'area'});
    // Spawn 2 mini splitters
    for(let i=0;i<2;i++){
      let mini=spawnEnemy('splitter',1,1,e.pathIdx,{x:e.x+(i-0.5)*15,y:e.y});
      mini.hp=20;mini.maxHp=20;mini.speed=1.5;mini.atk=3;
      mini.reward=3;mini.xpReward=1;mini.size=0.2;
      mini.isMini=true;mini.damageMult=1.5;
      mini.pathIdx=e.pathIdx;
      mini.slowUntil=e.slowUntil;mini.frozenUntil=e.frozenUntil;
      enemies.push(mini);
    }
    // Partial reward for killing the big one
    coins+=Math.floor(e.reward/2);
    xp+=Math.floor((e.xpReward||0)/2);
    coinPopups.push({x:e.x,y:e.y,text:'+'+Math.floor(e.reward/2)+'🪙',life:800});
    updateBattleUI();
    return;
  }

  e.alive=false;
  coins+=e.reward;
  xp+=(e.xpReward||0);

  // Particles
  for(let i=0;i<6;i++){
    particles.push({x:e.x+Math.random()*12-6,y:e.y+Math.random()*12-6,r:3+Math.random()*4,
      color:'rgba(255,255,200,0.8)',life:400,maxLife:400,type:'poof',vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2});
  }
  coinPopups.push({x:e.x,y:e.y,text:'+'+e.reward+'🪙',life:800});
  updateBattleUI();
}

// ===== GAME UPDATE =====
function update(dt,ts){
  // Spawn
  spawnTimer-=dt;
  if(spawnQueue.length>0&&spawnTimer<=0){
    let s=spawnQueue.shift();
    enemies.push(spawnEnemy(s.type,s.hpMult,s.spdMult));
    spawnTimer=600;
  }

  let now=performance.now();

  // Move enemies
  for(let e of enemies){
    if(!e.alive) continue;
    if(e.frozenUntil>now) continue; // frozen, don't move
    let spdMul=e.slowUntil>now?0.4:1;
    let spd=e.speed*spdMul*CELL*dt/1000;
    let target=pathWaypoints[e.pathIdx];
    if(!target){e.alive=false;loseGame();return;}
    let dx=target.x-e.x, dy=target.y-e.y;
    let dist=Math.hypot(dx,dy);
    if(dist<spd+2){
      e.x=target.x;e.y=target.y;e.pathIdx++;
      if(e.pathIdx>=pathWaypoints.length){e.alive=false;loseGame();return;}
    } else {
      e.x+=dx/dist*spd;e.y+=dy/dist*spd;
    }

    // Enemy attacks traps
    if(now-e.lastTrapAtk>800){ // attack every 800ms
      for(let t of traps){
        if(t.hp<=0) continue;
        let td=Math.hypot(e.x-t.x,e.y-t.y);
        if(td<CELL*0.8){
          t.hp-=e.atk;
          e.lastTrapAtk=now;
          // Hit particle
          particles.push({x:t.x+Math.random()*8-4,y:t.y+Math.random()*8-4,r:3,
            color:'rgba(255,100,50,0.7)',life:250,maxLife:250,type:'poof',vx:(Math.random()-0.5)*1.5,vy:-Math.random()*1.5});
          if(t.hp<=0){
            // Trap destroyed — poof effect
            for(let k=0;k<8;k++){
              particles.push({x:t.x+Math.random()*16-8,y:t.y+Math.random()*16-8,r:4+Math.random()*3,
                color:'rgba(200,150,100,0.7)',life:500,maxLife:500,type:'poof',vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3});
            }
          }
          break; // only attack one trap per tick
        }
      }
    }
  }
  // Remove destroyed traps
  traps=traps.filter(t=>t.hp>0);

  // Traps fire
  let dmgBoost=getPetDamageBoost();
  for(let t of traps){
    if(now-t.lastFire<t.def.rate/gameSpeed) continue;
    let range=t.def.range*CELL;
    let targets=enemies.filter(e=>e.alive&&Math.hypot(e.x-t.x,e.y-t.y)<=range);
    if(targets.length===0) continue;
    t.lastFire=now;

    if(t.def.freeze){
      // Ice trap
      for(let e of targets) e.frozenUntil=Math.max(e.frozenUntil||0,now+t.def.freeze);
      particles.push({x:t.x,y:t.y,r:range,color:'rgba(100,200,255,0.25)',life:300,maxLife:300,type:'area'});
    } else if(t.def.area){
      // Bomb
      let dmg=t.def.damage*dmgBoost;
      for(let e of targets){
        let actualDmg=dmg*(e.damageMult||1);
        e.hp-=actualDmg;if(e.hp<=0) killEnemy(e);
      }
      particles.push({x:t.x,y:t.y,r:range,color:'rgba(255,100,50,0.3)',life:300,maxLife:300,type:'area'});
    } else if(t.def.floor){
      // Spikes — damage all enemies walking over
      let dmg=t.def.damage*dmgBoost;
      for(let e of targets){
        let actualDmg=dmg*(e.damageMult||1);
        e.hp-=actualDmg;if(e.hp<=0) killEnemy(e);
      }
    } else {
      // Projectile
      let closest=targets.reduce((a,b)=>(b.pathIdx>a.pathIdx||(b.pathIdx===a.pathIdx&&b.hp<a.hp))?b:a,targets[0]);
      let dmg=t.def.damage*dmgBoost;
      projectiles.push({x:t.x,y:t.y,tx:closest,damage:dmg,speed:5*CELL,
        color:t.def.id==='arrow'?'#fff':t.def.id==='sling'?'#ddd':'#ccc',alive:true});
      // Slow from debris
      if(t.def.slow>0&&t.def.slowDur>0){
        closest.slowUntil=Math.max(closest.slowUntil||0,now+t.def.slowDur);
      }
    }
  }

  // Projectiles
  for(let p of projectiles){
    if(!p.alive) continue;
    let t=p.tx;
    if(!t||!t.alive){p.alive=false;continue;}
    let dx=t.x-p.x,dy=t.y-p.y,dist=Math.hypot(dx,dy);
    let spd=p.speed*dt/1000;
    if(dist<spd+5){
      let actualDmg=p.damage*(t.damageMult||1);
      t.hp-=actualDmg;
      if(t.hp<=0) killEnemy(t);
      p.alive=false;
      particles.push({x:t.x,y:t.y,r:4,color:'rgba(255,255,200,0.6)',life:200,maxLife:200,type:'poof',vx:0,vy:0});
    } else {
      p.x+=dx/dist*spd;p.y+=dy/dist*spd;
    }
  }
  projectiles=projectiles.filter(p=>p.alive);

  // Wave complete check
  if(waveActive&&spawnQueue.length===0&&enemies.every(e=>!e.alive)){
    waveActive=false;enemies=[];showWaveComplete();
  }

  // Particles
  for(let p of particles) p.life-=dt;
  particles=particles.filter(p=>p.life>0);
  for(let c of coinPopups){c.life-=dt;c.y-=dt*0.03;}
  coinPopups=coinPopups.filter(c=>c.life>0);
}

// ===== BATTLE DRAW =====
function drawBattle(ts){
  let t=ts/1000;
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);

  drawCastle(ts);
  drawPath();
  drawBuildCells();

  // Carrot at end of path
  let lastWp=pathWaypoints[pathWaypoints.length-1];
  drawCarrot(lastWp.x,lastWp.y);

  // Draw pets near carrot
  if(petData){
    let px=lastWp.x-CELL*0.8, py=lastWp.y+CELL*0.3;
    let hop=petAnimState.feedAnim>0?Math.sin(petAnimState.feedAnim*0.5)*5:0;
    drawCuteBunny(px,py-hop,CELL*0.25,petData.variant,petAnimState.happy,petAnimState.angry,t);
  }
  if(lambData){
    let lx=lastWp.x-CELL*0.3, ly=lastWp.y+CELL*0.6;
    drawCuteLamb(lx,ly,CELL*0.2,lambData.variant,lambAnimState.happy,lambAnimState.angry,t);
  }

  // Traps
  for(let trap of traps){
    // Trap icon
    ctx.font=Math.floor(CELL*0.5)+'px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(trap.def.icon,trap.x,trap.y);
    // HP bar if damaged
    if(trap.hp<trap.maxHp){
      let bw=CELL*0.7,bh=3;
      ctx.fillStyle='#333';ctx.fillRect(trap.x-bw/2,trap.y-CELL*0.35,bw,bh);
      ctx.fillStyle=trap.hp/trap.maxHp>0.5?'#4f2':'#f42';
      ctx.fillRect(trap.x-bw/2,trap.y-CELL*0.35,bw*(trap.hp/trap.maxHp),bh);
    }
  }

  // Range display
  if(showRangeTrap){
    ctx.beginPath();ctx.arc(showRangeTrap.x,showRangeTrap.y,showRangeTrap.def.range*CELL,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.stroke();
  }

  // Enemies
  for(let e of enemies){
    if(!e.alive) continue;
    drawEnemy(e,t);
  }

  // Projectiles
  for(let p of projectiles){
    if(!p.alive) continue;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
  }

  // Particles
  for(let p of particles){
    let alpha=Math.max(0,p.life/p.maxLife);
    if(p.type==='area'){
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*alpha,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();
    } else if(p.type==='poof'){
      p.x+=(p.vx||0);p.y+=(p.vy||0);
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*alpha,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,200,${alpha*0.8})`;ctx.fill();
    }
  }

  // Coin popups
  ctx.font='bold 13px Arial';ctx.textAlign='center';
  for(let cp of coinPopups){
    ctx.fillStyle=`rgba(255,215,0,${cp.life/800})`;
    ctx.fillText(cp.text,cp.x,cp.y);
  }

  // Heart particles (from feeding)
  ctx.font='14px Arial';ctx.textAlign='center';
  for(let h of heartParticles){
    ctx.globalAlpha=h.life/60;ctx.fillText('❤️',h.x,h.y);
  }
  ctx.globalAlpha=1;
}

// ===== MAIN LOOP =====
let lastTime=0;
function gameLoop(ts){
  if(!lastTime) lastTime=ts;
  let rawDt=ts-lastTime;lastTime=ts;
  if(rawDt>100) rawDt=16;
  let dt=rawDt*gameSpeed;

  // Anim state
  petAnimState.bobT+=rawDt/1000;
  lambAnimState.bobT+=rawDt/1000;
  if(petAnimState.feedAnim>0) petAnimState.feedAnim--;
  if(lambAnimState.feedAnim>0) lambAnimState.feedAnim--;
  for(let h of heartParticles){h.y+=h.vy;h.life--;}
  heartParticles=heartParticles.filter(h=>h.life>0);

  if(gamePhase==='battle'){
    if(!gameOver&&!gameWon) update(dt,ts);
    drawBattle(ts);
  } else {
    // Draw a soft bg for canvas behind menu screens
    ctx.fillStyle='#fce4ec';ctx.fillRect(0,0,W,H);
  }

  requestAnimationFrame(gameLoop);
}

// ===== RESIZE HANDLER FOR BATTLE =====
window.addEventListener('resize',()=>{
  resize();
  if(gamePhase==='battle') computeCastleLayout();
});

// ===== INIT =====
if(!petData){
  showAdoption();
} else {
  showMainMenu();
}
requestAnimationFrame(gameLoop);
</script>
