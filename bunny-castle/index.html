const waves=[

];

let spawnQueues=[];

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function lerp(a,b,t){return{x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t};}

function getPathPos(path,progress){
  let totalLen=0;
  const segs=[];
  for(let i=1;i<path.length;i++){
    const d=dist(path[i-1],path[i]);
    segs.push({start:path[i-1],end:path[i],len:d});
    totalLen+=d;
  }
  let target=progress*totalLen;
  for(const seg of segs){
    if(target<=seg.len){
      const t=target/seg.len;
      return lerp(seg.start,seg.end,t);
    }
    target-=seg.len;
  }
  return path[path.length-1];
}

function getPathLen(path){
  let t=0;
  for(let i=1;i<path.length;i++) t+=dist(path[i-1],path[i]);
  return t;
}

function spawnEnemy(pathName,typeName){
  const path=pathName==='red'?redPath:bluePath;
  const et=enemyTypes[typeName];
  const pathLen=getPathLen(path);
  enemies.push({
    path,pathName,type:typeName,
    hp:et.hp,maxHp:et.hp,
    speed:et.speed,
    progress:0,pathLen,
    emoji:et.emoji,
    flying:et.flying,
    reward:et.reward,
    slowed:0,confused:0,
    dead:false,reached:false,
    teleporting:0,teleportAlpha:1
  });
}

function killEnemy(e){e.dead=true;e.deathTimer=20;gold+=e.reward;if(enemyTypes[e.type]&&enemyTypes[e.type].splits){var et2=enemyTypes.bibaSmall;for(var si=0;si<2;si++){enemies.push({path:e.path,pathName:e.pathName,type:'bibaSmall',hp:et2.hp,maxHp:et2.hp,speed:et2.speed,progress:e.progress+0.005*si,pathLen:e.pathLen,emoji:et2.emoji,flying:et2.flying,reward:et2.reward,slowed:0,confused:0,dead:false,reached:false,teleporting:0,teleportAlpha:1});}}}
function startWave(){
  if(wave>=waves.length){state='won';return;}
  const w=waves[wave];
  prepTimer=w.prep*60;
  waveActive=false;
  spawnQueues=w.spawns.map(s=>({...s,spawned:0,timer:0}));
}

function updateEnemies(){
  for(const e of enemies){
    if(e.dead||e.reached)continue;
    if(e.teleporting>0){e.teleporting--;e.teleportAlpha=e.teleporting>15?((30-e.teleporting)/15):(e.teleporting/15);if(e.teleporting===15){/* jump done, already moved */}continue;}
    let spd=e.speed;
    if(e.slowed>0){spd*=0.4;e.slowed--;}
    if(e.confused>0){spd*=-0.5;e.confused--;}
    e.progress+=spd/e.pathLen;
    if(e.progress>=1){
      e.reached=true;
      // Steal carrot
      if(e.pathName==='red')carrots.left=false;
      else carrots.right=false;
      if(!carrots.left&&!carrots.right)state='lost';
    }
  }
  enemies=enemies.filter(e=>!e.dead||e.deathTimer>0);
}

function updateWeapons(){
  for(const s of slots){
    if(!s.weapon)continue;
    if(s.cooldown>0){s.cooldown--;continue;}
    const w=weapons.find(w=>w.id===s.weapon);
    if(!w)continue;
    // Find target
    let target=null, minDist=w.range;
    for(const e of enemies){
      if(e.dead||e.reached||e.teleporting>0)continue;
      if(!e.flying&&(w.type==='zone')){}// zone hits all ground
      const pos=getPathPos(e.path,e.progress);
      const d=dist(s,pos);
      if(d<minDist){minDist=d;target=e;}
    }
    if(!target)continue;
    const tpos=getPathPos(target.path,target.progress);
    s.cooldown=w.cooldownMax;

    if(w.type==='single'){
      target.hp-=w.damage;
      projectiles.push({x:s.x,y:s.y,tx:tpos.x,ty:tpos.y,timer:10,color:'#fff'});
      if(target.hp<=0){killEnemy(target);}
    }else if(w.type==='slow'){
      target.slowed=180;target.hp-=w.damage;
      effects.push({x:tpos.x,y:tpos.y,timer:20,type:'ice'});
      if(target.hp<=0){killEnemy(target);}
    }else if(w.type==='aoe'){
      for(const e2 of enemies){
        if(e2.dead||e2.reached)continue;
        const p2=getPathPos(e2.path,e2.progress);
        if(dist(tpos,p2)<80){e2.hp-=w.damage;if(e2.hp<=0){killEnemy(e2);}}
      }
      effects.push({x:tpos.x,y:tpos.y,timer:25,type:'explosion'});
    }else if(w.type==='zone'){
      for(const e2 of enemies){
        if(e2.dead||e2.reached||e2.flying)continue;
        const p2=getPathPos(e2.path,e2.progress);
        if(dist(s,p2)<w.range){e2.slowed=120;e2.hp-=w.damage;}
      }
      effects.push({x:s.x,y:s.y,timer:30,type:'choco'});
    }else if(w.type==='pushback'){
      if(!target.flying){target.progress=Math.max(0,target.progress-0.03);target.hp-=w.damage;}
      effects.push({x:tpos.x,y:tpos.y,timer:15,type:'spring'});
      if(target.hp<=0){killEnemy(target);}
    }else if(w.type==='confuse'){
      target.confused=180;
      effects.push({x:tpos.x,y:tpos.y,timer:25,type:'flower'});
    }
  }
}

function update(){
  tick++;
  if(state!=='playing')return;

  // Gold income
  goldTimer++;
  if(goldTimer>=600){goldTimer=0;gold+=5;}

  // Prep phase
  if(prepTimer>0&&!waveActive){
    prepTimer--;
    if(prepTimer<=0)waveActive=true;
    return;
  }

  // Spawn
  if(waveActive){
    let allDone=true;
    for(const q of spawnQueues){
      if(q.spawned<q.count){
        allDone=false;
        q.timer++;
        if(q.timer>=q.interval){q.timer=0;spawnEnemy(q.path,q.type);q.spawned++;}
      }
    }
    if(allDone&&enemies.filter(e=>!e.dead&&!e.reached).length===0){
      wave++;
      if(wave>=waves.length){
        state=carrots.left&&carrots.right?'won':'won';
      }else{
        startWave();
      }
    }
  }

  updateEnemies();
  updateWeapons();

  // Update effects
  for(const ef of effects)ef.timer--;
  effects=effects.filter(e=>e.timer>0);
  for(const p of projectiles)p.timer--;
  projectiles=projectiles.filter(p=>p.timer>0);
  // Death timers
  for(const e of enemies)if(e.dead&&e.deathTimer>0)e.deathTimer--;
  enemies=enemies.filter(e=>!(e.dead&&e.deathTimer<=0)&&!e.reached);
}

function drawPath(path,color){
  ctx.strokeStyle=color;
  ctx.lineWidth=30;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(path[0].x,path[0].y);
  for(let i=1;i<path.length;i++)ctx.lineTo(path[i].x,path[i].y);
  ctx.stroke();
}

function render(){
  ctx.clearRect(0,0,W,H);

  // BG
  if(bgImg.complete)ctx.drawImage(bgImg,0,0,W,H);

  if(state==='menu'){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 72px sans-serif';ctx.textAlign='center';
    ctx.fillText('🐰 小兔守城记',W/2,500);
    ctx.font='36px sans-serif';
    ctx.fillText('守护胡萝卜，击退入侵者！',W/2,580);
    // Start button
    ctx.fillStyle='rgba(255,150,200,0.85)';
    roundRect(ctx,W/2-150,680,300,80,20,true);
    ctx.fillStyle='#fff';ctx.font='bold 42px sans-serif';
    ctx.fillText('开始游戏',W/2,732);
    ctx.font='24px sans-serif';ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillText('v4 - 精美背景版',W/2,800);
    return;
  }

  if(state==='loading')return;

  // Draw paths
  ctx.globalAlpha=0.35;
  drawPath(redPath,'#ff4444');
  drawPath(bluePath,'#4488ff');
  ctx.globalAlpha=1;

  // Draw slots
  for(let i=0;i<slots.length;i++){
    const s=slots[i];
    if(s.weapon){
      const w=weapons.find(w=>w.id===s.weapon);
      ctx.font='44px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(w.emoji,s.x,s.y);
      // Range circle when selected
      if(selectedSlot===i){
        ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(s.x,s.y,w.range,0,Math.PI*2);ctx.stroke();
      }
      // Cooldown indicator
      if(s.cooldown>0){
        const pct=s.cooldown/weapons.find(w=>w.id===s.weapon).cooldownMax;
        ctx.fillStyle='rgba(0,0,0,0.4)';
        ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.arc(s.x,s.y,18,-.5*Math.PI,(-.5+2*pct)*Math.PI);ctx.fill();
      }
    }else{
      const pulse=Math.sin(tick*0.05+i)*0.15+0.55;
      ctx.globalAlpha=pulse;
      ctx.font='38px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#fff';
      ctx.fillText('✖️',s.x,s.y);
      ctx.globalAlpha=1;
    }
  }

  // Draw projectiles
  for(const p of projectiles){
    const t=1-p.timer/10;
    const px=p.x+(p.tx-p.x)*t, py=p.y+(p.ty-p.y)*t;
    ctx.fillStyle=p.color||'#fff';
    ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
  }

  // Draw effects
  for(const ef of effects){
    ctx.globalAlpha=ef.timer/30;
    if(ef.type==='ice'){
      ctx.fillStyle='rgba(100,200,255,0.6)';ctx.beginPath();ctx.arc(ef.x,ef.y,25,0,Math.PI*2);ctx.fill();
    }else if(ef.type==='explosion'){
      ctx.fillStyle='rgba(255,150,50,0.6)';ctx.beginPath();ctx.arc(ef.x,ef.y,40+((25-ef.timer)*2),0,Math.PI*2);ctx.fill();
    }else if(ef.type==='choco'){
      ctx.fillStyle='rgba(139,90,43,0.5)';ctx.beginPath();ctx.arc(ef.x,ef.y,50,0,Math.PI*2);ctx.fill();
    }else if(ef.type==='spring'){
      ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText('💥',ef.x,ef.y);
    }else if(ef.type==='flower'){
      ctx.font='36px sans-serif';ctx.textAlign='center';ctx.fillText('🌀',ef.x,ef.y);
    }
    ctx.globalAlpha=1;
  }

  // Draw enemies
  for(const e of enemies){
    if(e.reached)continue;
    const pos=getPathPos(e.path,e.progress);
    if(e.dead){
      ctx.globalAlpha=e.deathTimer/20;
      ctx.font='44px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💀',pos.x,pos.y);
      ctx.globalAlpha=1;
      continue;
    }
    ctx.globalAlpha=e.teleporting>0?Math.abs(e.teleportAlpha):1;
    ctx.save();
    // Custom drawn enemies
    if(e.type==='yu'){
      // 淤 - 烂泥怪/史莱姆，不规则，软趴趴
      const sz=22,t=tick*0.06;
      ctx.fillStyle='#7a6b3a';
      ctx.beginPath();
      ctx.moveTo(pos.x-sz+Math.sin(t)*4,pos.y+sz*0.3);
      ctx.quadraticCurveTo(pos.x-sz*0.8,pos.y-sz*0.6+Math.sin(t+1)*3,pos.x-sz*0.2,pos.y-sz*0.8);
      ctx.quadraticCurveTo(pos.x+sz*0.1,pos.y-sz+Math.cos(t)*3,pos.x+sz*0.5,pos.y-sz*0.6);
      ctx.quadraticCurveTo(pos.x+sz+Math.sin(t+2)*4,pos.y-sz*0.2,pos.x+sz*0.9,pos.y+sz*0.3);
      ctx.quadraticCurveTo(pos.x+sz*0.3,pos.y+sz*0.5+Math.sin(t)*2,pos.x-sz+Math.sin(t)*4,pos.y+sz*0.3);
      ctx.fill();
      // Darker spots
      ctx.fillStyle='#5a4b2a';
      ctx.beginPath();ctx.arc(pos.x-6,pos.y-2,5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(pos.x+8,pos.y+4,4,0,Math.PI*2);ctx.fill();
      // Droopy eyes
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.ellipse(pos.x-8,pos.y-10,5,6,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(pos.x+8,pos.y-8,5,6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#222';
      ctx.beginPath();ctx.arc(pos.x-7,pos.y-8,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(pos.x+9,pos.y-6,2.5,0,Math.PI*2);ctx.fill();
      // Drooling mouth
      ctx.strokeStyle='#5a4b2a';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(pos.x+2,pos.y+2,6,0.2,Math.PI-0.2);ctx.stroke();
    }else if(e.type==='bibaGuai'){
      // 逼扒怪 - 方块组成，一块一块像积木，很硬
      const bs=8;
      const blocks=[[-2,-3],[- 1,-3],[0,-3],[1,-3],[-2,-2],[-1,-2],[0,-2],[1,-2],[2,-2],[-3,-1],[-2,-1],[-1,-1],[0,-1],[1,-1],[2,-1],[-3,0],[-2,0],[-1,0],[0,0],[1,0],[2,0],[3,0],[-2,1],[-1,1],[0,1],[1,1],[2,1],[-3,2],[-2,2],[1,2],[2,2]];
      for(const b of blocks){
        const bx=pos.x+b[0]*bs-bs/2,by=pos.y+b[1]*bs-bs/2;
        ctx.fillStyle=(b[0]+b[1])%2===0?'#8b5e3c':'#6d4830';
        ctx.fillRect(bx,by,bs-1,bs-1);
      }
      // Angry eyes
      ctx.fillStyle='#ff0';
      ctx.fillRect(pos.x-14,pos.y-18,8,6);
      ctx.fillRect(pos.x+6,pos.y-18,8,6);
      ctx.fillStyle='#f00';
      ctx.fillRect(pos.x-12,pos.y-16,4,4);
      ctx.fillRect(pos.x+8,pos.y-16,4,4);
      // Cracks
      ctx.strokeStyle='#3a2510';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pos.x-5,pos.y-8);ctx.lineTo(pos.x-2,pos.y+5);ctx.lineTo(pos.x+3,pos.y+2);ctx.stroke();
    }else if(e.type==='bibaSmall'){
      // 逼扒小怪 - 分裂后的小方块怪
      const bs=5;
      const blocks=[[-1,-2],[0,-2],[1,-2],[-2,-1],[-1,-1],[0,-1],[1,-1],[-1,0],[0,0],[1,0],[-2,1],[1,1]];
      for(const b of blocks){
        const bx=pos.x+b[0]*bs-bs/2,by=pos.y+b[1]*bs-bs/2;
        ctx.fillStyle=(b[0]+b[1])%2===0?'#a07050':'#8b5e3c';
        ctx.fillRect(bx,by,bs-1,bs-1);
      }
      ctx.fillStyle='#ff0';
      ctx.fillRect(pos.x-6,pos.y-8,4,3);
      ctx.fillRect(pos.x+2,pos.y-8,4,3);
      ctx.fillStyle='#f00';
      ctx.fillRect(pos.x-5,pos.y-7,2,2);
      ctx.fillRect(pos.x+3,pos.y-7,2,2);
    }else{
      // Default: use emoji
      ctx.font='44px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(e.emoji,pos.x,pos.y);
    }
    ctx.restore();
    // HP bar
    const hpPct=e.hp/e.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(pos.x-24,pos.y-34,48,7);
    ctx.fillStyle=hpPct>0.5?'#4f4':'#f44';ctx.fillRect(pos.x-24,pos.y-34,48*hpPct,7);
    // Slow/confuse indicators
    if(e.slowed>0){ctx.font='14px sans-serif';ctx.fillText('❄️',pos.x+20,pos.y-15);}
    if(e.confused>0){ctx.font='14px sans-serif';ctx.fillText('💫',pos.x-20,pos.y-15);}
    ctx.globalAlpha=1;
  }

  // Carrot status at attic positions
  ctx.font='36px sans-serif';ctx.textAlign='center';
  if(carrots.left)ctx.fillText('🥕',170,250);else ctx.fillText('❌',170,250);
  if(carrots.right)ctx.fillText('🥕',850,250);else ctx.fillText('❌',850,250);

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,60);
  ctx.fillStyle='#ffd700';ctx.font='bold 28px sans-serif';ctx.textAlign='left';
  ctx.fillText('💰 '+gold,20,42);
  ctx.fillStyle='#fff';ctx.textAlign='center';
  if(prepTimer>0&&!waveActive){
    ctx.fillText('第 '+(wave+1)+' 波 - 准备中 '+Math.ceil(prepTimer/60)+'s',W/2,42);
  }else{
    ctx.fillText('第 '+(wave+1)+' / '+waves.length+' 波',W/2,42);
  }
  ctx.textAlign='right';
  ctx.fillText((carrots.left?'🥕':'❌')+' '+(carrots.right?'🥕':'❌'),W-20,42);

  // Weapon menu
  if(menuOpen&&selectedSlot!==null){
    const s=slots[selectedSlot];
    const menuW=420,menuH=240;
    let mx=s.x-menuW/2,my=s.y-menuH-30;
    if(my<70)my=s.y+30;
    if(mx<10)mx=10;if(mx+menuW>W-10)mx=W-10-menuW;
    ctx.fillStyle='rgba(30,20,50,0.9)';
    roundRect(ctx,mx,my,menuW,menuH,12,true);
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
    roundRect(ctx,mx,my,menuW,menuH,12,false,true);
    // 6 weapons in 2 rows of 3
    for(let i=0;i<6;i++){
      const col=i%3,row=Math.floor(i/3);
      const bx=mx+15+col*130,by=my+15+row*105;
      const w=weapons[i];
      const affordable=gold>=w.cost;
      ctx.fillStyle=affordable?'rgba(255,255,255,0.1)':'rgba(100,100,100,0.1)';
      roundRect(ctx,bx,by,120,95,8,true);
      ctx.globalAlpha=affordable?1:0.4;
      ctx.font='36px sans-serif';ctx.textAlign='center';
      ctx.fillText(w.emoji,bx+60,by+35);
      ctx.font='14px sans-serif';ctx.fillStyle='#fff';
      ctx.fillText(w.name,bx+60,by+60);
      ctx.fillStyle='#ffd700';ctx.font='bold 14px sans-serif';
      ctx.fillText('💰'+w.cost,bx+60,by+82);
      ctx.globalAlpha=1;
    }
  }

  // Win/lose screens
  if(state==='won'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd700';ctx.font='bold 64px sans-serif';ctx.textAlign='center';
    const perfect=carrots.left&&carrots.right;
    ctx.fillText(perfect?'⭐ 完美通关！':'🎉 胜利！',W/2,700);
    ctx.font='32px sans-serif';ctx.fillStyle='#fff';
    ctx.fillText(perfect?'两根胡萝卜都保住了！':'至少保住了一根胡萝卜！',W/2,770);
    ctx.fillStyle='rgba(255,150,200,0.85)';roundRect(ctx,W/2-120,820,240,70,16,true);
    ctx.fillStyle='#fff';ctx.font='bold 32px sans-serif';ctx.fillText('再来一次',W/2,865);
  }
  if(state==='lost'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444';ctx.font='bold 64px sans-serif';ctx.textAlign='center';
    ctx.fillText('💔 城堡沦陷...',W/2,700);
    ctx.font='32px sans-serif';ctx.fillStyle='#fff';
    ctx.fillText('所有胡萝卜都被偷走了！',W/2,770);
    ctx.fillStyle='rgba(255,150,200,0.85)';roundRect(ctx,W/2-120,820,240,70,16,true);
    ctx.fillStyle='#fff';ctx.font='bold 32px sans-serif';ctx.fillText('重新开始',W/2,865);
  }
}

function roundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(fill)ctx.fill();if(stroke)ctx.stroke();
}

function gameToScreen(gx,gy){
  const rect=canvas.getBoundingClientRect();
  const sx=rect.width/W, sy=rect.height/H;
  return{x:gx*sx+rect.left,y:gy*sy+rect.top};
}
function screenToGame(sx,sy){
  const rect=canvas.getBoundingClientRect();
  return{x:(sx-rect.left)*W/rect.width,y:(sy-rect.top)*H/rect.height};
}

canvas.addEventListener('click',function(ev){
  const p=screenToGame(ev.clientX,ev.clientY);

  if(state==='menu'){
    // Start button
    if(p.x>W/2-150&&p.x<W/2+150&&p.y>680&&p.y<760){
      state='playing';wave=0;gold=30;
      carrots={left:true,right:true};
      enemies=[];projectiles=[];effects=[];
      slots.forEach(s=>{s.weapon=null;s.cooldown=0;});
      startWave();
    }
    return;
  }
  if(state==='won'||state==='lost'){
    if(p.x>W/2-120&&p.x<W/2+120&&p.y>820&&p.y<890){
      state='playing';wave=0;gold=30;
      carrots={left:true,right:true};
      enemies=[];projectiles=[];effects=[];
      slots.forEach(s=>{s.weapon=null;s.cooldown=0;});
      startWave();
    }
    return;
  }

  // Weapon menu click
  if(menuOpen&&selectedSlot!==null){
    const s=slots[selectedSlot];
    const menuW=420,menuH=240;
    let mx=s.x-menuW/2,my=s.y-menuH-30;
    if(my<70)my=s.y+30;
    if(mx<10)mx=10;if(mx+menuW>W-10)mx=W-10-menuW;
    for(let i=0;i<6;i++){
      const col=i%3,row=Math.floor(i/3);
      const bx=mx+15+col*130,by=my+15+row*105;
      if(p.x>=bx&&p.x<=bx+105&&p.y>=by&&p.y<=by+80){
        const w=weapons[i];
        if(gold>=w.cost){
          slots[selectedSlot].weapon=w.id;
          gold-=w.cost;
        }
        menuOpen=false;selectedSlot=null;
        return;
      }
    }
    menuOpen=false;selectedSlot=null;
    return;
  }

  // Click on slot
  for(let i=0;i<slots.length;i++){
    if(dist(p,slots[i])<25){
      if(!slots[i].weapon){
        selectedSlot=i;menuOpen=true;
      }else{
        selectedSlot=selectedSlot===i?null:i;menuOpen=false;
      }
      return;
    }
  }
  menuOpen=false;selectedSlot=null;
});

function loop(ts){
  if(!lastTime)lastTime=ts;
  const dt=ts-lastTime;
  lastTime=ts;
  // Run at ~60fps logic
  update();
  render();
  requestAnimationFrame(loop);
}

bgImg.onload=function(){
  state='menu';
  requestAnimationFrame(loop);
};
bgImg.onerror=function(){
  state='menu';
  requestAnimationFrame(loop);
};
</script>
