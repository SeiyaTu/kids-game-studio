<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小兔守城记 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a00;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Microsoft YaHei',sans-serif;overflow:hidden}
#gameContainer{position:relative;width:800px;height:1000px;max-width:100vw;max-height:100vh}
canvas{width:100%;height:100%;display:block;image-rendering:auto}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;padding:8px;display:flex;justify-content:space-between;color:#fff;font-size:14px;text-shadow:1px 1px 2px #000}
#ui>div{background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:8px;pointer-events:auto}
#weaponBar{position:absolute;bottom:0;left:0;width:100%;display:flex;justify-content:center;gap:4px;padding:6px;pointer-events:auto}
.weaponBtn{width:60px;height:60px;border:2px solid #8B4513;border-radius:8px;background:rgba(60,30,10,0.85);color:#fff;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;transition:all 0.15s}
.weaponBtn:hover{background:rgba(139,69,19,0.9);transform:scale(1.05)}
.weaponBtn.selected{border-color:#FFD700;box-shadow:0 0 8px #FFD700}
.weaponBtn.disabled{opacity:0.4;cursor:not-allowed}
.weaponBtn .icon{font-size:22px}
.weaponBtn .cost{font-size:10px;color:#FFD700}
#startScreen,#endScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(30,10,0,0.92);color:#fff;z-index:10;pointer-events:auto}
#startScreen h1{font-size:42px;color:#FFD700;text-shadow:2px 2px 4px #000;margin-bottom:10px}
#startScreen p{font-size:16px;color:#DEB887;margin-bottom:20px}
.btn{padding:12px 36px;font-size:20px;border:none;border-radius:12px;cursor:pointer;color:#fff;background:linear-gradient(135deg,#8B4513,#D2691E);box-shadow:0 4px 8px rgba(0,0,0,0.4);transition:all 0.2s}
.btn:hover{transform:scale(1.05);box-shadow:0 6px 12px rgba(0,0,0,0.5)}
#endScreen h2{font-size:36px;margin-bottom:10px}
#endScreen p{font-size:18px;color:#DEB887;margin-bottom:20px}
#waveInfo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#FFD700;font-size:28px;font-weight:bold;text-shadow:2px 2px 4px #000;pointer-events:none;opacity:0;transition:opacity 0.5s;z-index:5}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="gc" width="800" height="1000"></canvas>
<div id="ui">
<div id="goldDisplay">🪙 30</div>
<div id="waveDisplay">波次 0/6</div>
<div id="lifeDisplay">🥕🥕</div>
</div>
<div id="weaponBar">
<button class="weaponBtn" data-w="0"><span class="icon">🪨</span><span class="cost">10</span></button>
<button class="weaponBtn" data-w="1"><span class="icon">🧊</span><span class="cost">15</span></button>
<button class="weaponBtn" data-w="2"><span class="icon">🥕</span><span class="cost">25</span></button>
<button class="weaponBtn" data-w="3"><span class="icon">🍫</span><span class="cost">20</span></button>
<button class="weaponBtn" data-w="4"><span class="icon">⚡</span><span class="cost">30</span></button>
<button class="weaponBtn" data-w="5"><span class="icon">🌸</span><span class="cost">35</span></button>
</div>
<div id="waveInfo"></div>
<div id="startScreen">
<h1>🐰 小兔守城记</h1>
<p>保护城堡里的胡萝卜！</p>
<button class="btn" id="startBtn">开始游戏</button>
</div>
<div id="endScreen" style="display:none">
<h2 id="endTitle"></h2>
<p id="endMsg"></p>
<button class="btn" id="restartBtn">再来一次</button>
</div>
</div>

<script>
const C=document.getElementById('gc'),ctx=C.getContext('2d');
const W=800,H=1000;

// Colors
const COL={
  wallOuter:'#4A2810',wallInner:'#F5DEB3',floorDark:'#3E1E0E',
  floorLight:'#6B3A1F',macaronYellow:'#FAEBD7',roofBrown:'#5C2E0F',
  hillGreen:'#4A7A3B',hillDark:'#2D5A1F',pathRed:'#C0392B',pathDark:'#2C3E50',
  skyBlue:'#87CEEB'
};

// Game state
let gold=30,wave=0,lives=2,gameState='start',selectedWeapon=-1;
let enemies=[],towers=[],projectiles=[],particles=[];
let frameCount=0,goldTimer=0,waveTimer=0,waveActive=false,spawning=false;
let spawnQueue=[],spawnTimer=0;
let portalAngle=0;

// Placement slots - x,y positions for weapon placement
const slots=[];
// Path waypoints for route 1 (right entry) and route 2 (left entry)
let path1=[],path2=[];

// Portal pairs: portal1A->portal1B, portal2A->portal2B
let portals={};

function initPaths(){
  // Castle cross-section interior corridors
  // Route 1 (①, dark path): enters bottom-right, goes up through castle
  // Route 2 (②, red path): enters bottom-left, goes up through castle

  const castleL=100,castleR=700,castleTop=120,castleBot=750;
  
  // Floor Y positions
  const f4y=720, f3y=580, f2y=440, f1y=300;
  // Corridor heights ~60px
  
  // Route 1: right side entry → bottom floor left → stair up → floor 3 right → portal1A → portal1B → floor 1 → right attic (carrot B)
  path1=[
    {x:650,y:830},{x:650,y:780},// outside approach
    {x:620,y:f4y+30},// enter bottom floor
    {x:200,y:f4y+30},// walk left across bottom
    // portal 1 entrance
    {x:180,y:f4y+30},
    // TELEPORT to portal 1 exit (floor 2)
    {x:600,y:f3y+30},
    {x:650,y:f3y+30},// floor 3 right side
    {x:650,y:f3y-20},// stairs up
    {x:620,y:f2y+30},// floor 2
    {x:200,y:f2y+30},// walk left
    {x:180,y:f2y-20},// stairs up
    {x:200,y:f1y+30},// floor 1
    {x:620,y:f1y+30},// walk right
    {x:660,y:f1y-10},// up to right attic
    {x:660,y:230},// right attic carrot B
  ];
  
  // Route 2: left side entry → bottom floor right → stair up → portal2A → portal2B → floor 1 → left attic (carrot A)
  path2=[
    {x:150,y:830},{x:150,y:780},
    {x:180,y:f4y+30},
    {x:600,y:f4y+30},// walk right across bottom
    {x:620,y:f4y-20},// stairs up  
    {x:600,y:f3y+30},// floor 3
    {x:200,y:f3y+30},// walk left
    // portal 2 entrance
    {x:180,y:f3y+30},
    // TELEPORT to portal 2 exit
    {x:600,y:f2y+30},
    {x:620,y:f2y-20},// stairs up
    {x:600,y:f1y+30},// floor 1
    {x:200,y:f1y+30},// walk left
    {x:140,y:f1y-10},// up to left attic
    {x:140,y:230},// left attic carrot A
  ];

  // Portal positions (visual)
  portals={
    p1a:{x:180,y:720+30},p1b:{x:600,y:580+30},// portal ①
    p2a:{x:180,y:580+30},p2b:{x:600,y:440+30},// portal ②
  };
  // portal indices in paths
  // path1: index 4 → teleport to index 5
  // path2: index 7 → teleport to index 8

  // Generate placement slots along corridors
  slots.length=0;
  const sy=[f1y+15,f2y+15,f3y+15,f4y+15];
  for(let fi=0;fi<4;fi++){
    const y=sy[fi];
    const count=fi===2?5:fi===3?4:3;
    for(let i=0;i<count;i++){
      const x=180+i*(440/(count-1||1));
      slots.push({x,y,tower:null});
    }
  }
  // Left attic column slots
  for(let i=0;i<4;i++) slots.push({x:140,y:310+i*40,tower:null});
  // Right attic slots
  for(let i=0;i<3;i++) slots.push({x:660,y:310+i*40,tower:null});
}

// Weapon definitions
const WEAPONS=[
  {name:'石头弹弓',icon:'🪨',cost:10,range:80,damage:15,rate:60,type:'single'},
  {name:'冰冻陷阱',icon:'🧊',cost:15,range:50,damage:0,rate:120,type:'freeze',dur:180},
  {name:'胡萝卜炮',icon:'🥕',cost:25,range:90,damage:25,rate:90,type:'aoe',aoeR:40},
  {name:'巧克力粘液',icon:'🍫',cost:20,range:60,damage:0,rate:100,type:'slow',dur:150},
  {name:'弹簧踏板',icon:'⚡',cost:30,range:40,damage:5,rate:150,type:'bounce'},
  {name:'花朵迷雾',icon:'🌸',cost:35,range:70,damage:0,rate:180,type:'confuse',dur:120},
];

const ENEMIES={
  caterpillar:{name:'毛毛虫',hp:40,speed:0.8,color:'#7CFC00',size:8,reward:5},
  fox:{name:'小狐狸',hp:70,speed:1.5,color:'#FF8C00',size:10,reward:8},
  bear:{name:'大黑熊',hp:150,speed:0.5,color:'#4A4A4A',size:14,reward:12},
  eagle:{name:'秃鹰',hp:60,speed:1.0,color:'#696969',size:10,reward:10,flying:true},
  wolf:{name:'狼队长',hp:200,speed:0.8,color:'#555',size:16,reward:20,boss:true},
};

const WAVES=[
  [{type:'caterpillar',route:2,count:5}],
  [{type:'caterpillar',route:1,count:5}],
  [{type:'caterpillar',route:2,count:3},{type:'caterpillar',route:1,count:3}],
  [{type:'fox',route:2,count:2},{type:'caterpillar',route:1,count:3}],
  [{type:'caterpillar',route:2,count:3},{type:'fox',route:1,count:2}],
  [{type:'bear',route:2,count:1},{type:'caterpillar',route:2,count:3},{type:'bear',route:1,count:1},{type:'caterpillar',route:1,count:3}],
];

// Hatching patterns
function drawHatch(x,y,w,h,color='#3E1E0E',spacing=8){
  ctx.save();
  ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
  ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=0.3;
  for(let i=-h;i<w+h;i+=spacing){
    ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i-h,y+h);ctx.stroke();
  }
  ctx.restore();
}

function drawCastle(){
  // Hill
  ctx.fillStyle='#5A8A3B';
  ctx.beginPath();
  ctx.ellipse(400,820,380,100,0,Math.PI,0);
  ctx.fill();
  ctx.fillStyle='#4A7A2B';
  ctx.beginPath();
  ctx.ellipse(400,830,380,80,0,Math.PI,0);
  ctx.fill();

  // Winding paths on hill
  ctx.lineWidth=12;ctx.lineCap='round';
  // Path 2 (red) - left side
  ctx.strokeStyle=COL.pathRed;ctx.globalAlpha=0.7;
  ctx.beginPath();
  ctx.moveTo(80,950);ctx.quadraticCurveTo(120,900,160,870);
  ctx.quadraticCurveTo(200,840,150,810);ctx.quadraticCurveTo(100,790,150,770);
  ctx.stroke();
  // Path 1 (dark) - right side
  ctx.strokeStyle=COL.pathDark;
  ctx.beginPath();
  ctx.moveTo(720,950);ctx.quadraticCurveTo(680,900,640,870);
  ctx.quadraticCurveTo(600,840,650,810);ctx.quadraticCurveTo(700,790,650,770);
  ctx.stroke();
  ctx.globalAlpha=1;

  // Castle outer walls
  const cl=100,cr=700,ct=140,cb=760;
  ctx.fillStyle=COL.wallOuter;
  ctx.fillRect(cl,ct,cr-cl,cb-ct);
  
  // Inner area
  ctx.fillStyle=COL.macaronYellow;
  ctx.fillRect(cl+15,ct+10,cr-cl-30,cb-ct-20);

  // Floor separators with hatch texture
  const floors=[300,440,580,720];
  for(let i=0;i<floors.length;i++){
    const fy=floors[i];
    // Floor/ceiling
    ctx.fillStyle=COL.wallOuter;
    ctx.fillRect(cl+15,fy-8,cr-cl-30,16);
    drawHatch(cl+15,fy-8,cr-cl-30,16,COL.wallOuter,6);
  }

  // Corridors background (lighter)
  const corridorYs=[[300+8,440-8],[440+8,580-8],[580+8,720-8],[720+8,cb-20]];
  for(const[y1,y2] of corridorYs){
    ctx.fillStyle=COL.macaronYellow;
    ctx.fillRect(cl+15,y1,cr-cl-30,y2-y1);
  }

  // Pillars/columns
  ctx.fillStyle=COL.wallOuter;
  for(let fi=0;fi<4;fi++){
    const y1=floors[fi]+8;
    const y2=fi<3?floors[fi+1]-8:cb-20;
    // 2-3 pillars per floor
    const pillars=fi===2?3:2;
    for(let p=1;p<=pillars;p++){
      const px=cl+15+p*((cr-cl-30)/(pillars+1));
      ctx.fillRect(px-6,y1,12,y2-y1);
      drawHatch(px-6,y1,12,y2-y1,'#2A1508',5);
    }
  }

  // Stairs/ladders between floors
  const stairPositions=[[200,300],[600,440],[200,580],[500,720]];
  for(const[sx,sy] of stairPositions){
    ctx.strokeStyle=COL.wallOuter;ctx.lineWidth=2;
    // Ladder
    ctx.beginPath();ctx.moveTo(sx-8,sy-20);ctx.lineTo(sx-8,sy+20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+8,sy-20);ctx.lineTo(sx+8,sy+20);ctx.stroke();
    for(let r=-15;r<=15;r+=8){
      ctx.beginPath();ctx.moveTo(sx-8,sy+r);ctx.lineTo(sx+8,sy+r);ctx.stroke();
    }
  }

  // Outer wall borders
  ctx.strokeStyle=COL.wallOuter;ctx.lineWidth=4;
  ctx.strokeRect(cl,ct,cr-cl,cb-ct);

  // Left attic
  ctx.fillStyle=COL.wallOuter;
  ctx.beginPath();
  ctx.moveTo(cl,ct);ctx.lineTo(cl,240);ctx.lineTo(cl+80,240);ctx.lineTo(cl+80,ct);
  ctx.moveTo(cl,ct);ctx.lineTo(cl+40,ct-40);ctx.lineTo(cl+80,ct);
  ctx.fill();
  ctx.fillStyle=COL.macaronYellow;
  ctx.fillRect(cl+8,ct+5,64,90);
  // Orange carrot in left attic
  drawCarrot(cl+40,ct+50,'#FF8C00');
  // Triangle roof
  ctx.fillStyle=COL.roofBrown;
  ctx.beginPath();ctx.moveTo(cl-5,ct);ctx.lineTo(cl+40,ct-45);ctx.lineTo(cl+85,ct);ctx.closePath();ctx.fill();

  // Right attic (arch style)
  ctx.fillStyle=COL.wallOuter;
  ctx.beginPath();
  ctx.moveTo(cr-80,ct);ctx.lineTo(cr-80,240);ctx.lineTo(cr,240);ctx.lineTo(cr,ct);
  ctx.closePath();ctx.fill();
  // Arch
  ctx.fillStyle=COL.macaronYellow;
  ctx.beginPath();
  ctx.arc(cr-40,ct+10,30,Math.PI,0);
  ctx.lineTo(cr-10,ct+95);ctx.lineTo(cr-70,ct+95);ctx.closePath();ctx.fill();
  // Cyan-white carrot
  drawCarrot(cr-40,ct+55,'#B0E0E6');
  // Arch roof
  ctx.fillStyle=COL.roofBrown;
  ctx.beginPath();ctx.arc(cr-40,ct-5,42,Math.PI,0);ctx.closePath();ctx.fill();

  // Main tower roof
  const mx=400,rw=180;
  ctx.fillStyle=COL.roofBrown;
  ctx.beginPath();ctx.moveTo(mx-rw,ct);ctx.lineTo(mx,ct-80);ctx.lineTo(mx+rw,ct);ctx.closePath();ctx.fill();
  // Three circular decorations on roof
  for(let i=-1;i<=1;i++){
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.arc(mx+i*50,ct-50+Math.abs(i)*15,10,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=COL.wallOuter;ctx.lineWidth=2;ctx.stroke();
  }

  // Main window with bunny
  ctx.fillStyle='#87CEEB';
  ctx.fillRect(mx-70,ct+10,140,80);
  ctx.strokeStyle=COL.wallOuter;ctx.lineWidth=3;
  ctx.strokeRect(mx-70,ct+10,140,80);
  
  // Heart lamp (left)
  drawHeart(mx-45,ct+25,10,'#FF6B81');
  // Star lamp (right)
  drawStar(mx+45,ct+25,8,'#FFD700');
  // Bunny in window
  drawBunny(mx,ct+55);

  // Flower rail below window
  ctx.fillStyle='#8B4513';
  ctx.fillRect(mx-75,ct+90,150,8);
  for(let i=0;i<6;i++){
    const fx=mx-60+i*24;
    ctx.fillStyle=['#FF69B4','#FF6347','#FFD700','#FF69B4','#87CEEB','#DDA0DD'][i];
    ctx.beginPath();ctx.arc(fx,ct+88,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#228B22';
    ctx.fillRect(fx-1,ct+90,2,6);
  }

  // Draw portals
  drawPortal(portals.p1a.x,portals.p1a.y,'①','#4169E1');
  drawPortal(portals.p1b.x,portals.p1b.y,'①','#4169E1');
  drawPortal(portals.p2a.x,portals.p2a.y,'②','#DC143C');
  drawPortal(portals.p2b.x,portals.p2b.y,'②','#DC143C');

  // Draw slots
  for(const s of slots){
    if(!s.tower){
      ctx.strokeStyle='#888';ctx.lineWidth=2;
      const sz=14;
      ctx.beginPath();ctx.moveTo(s.x-sz,s.y-sz);ctx.lineTo(s.x+sz,s.y+sz);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s.x+sz,s.y-sz);ctx.lineTo(s.x-sz,s.y+sz);ctx.stroke();
    }
  }

  // Legend
  ctx.font='12px sans-serif';ctx.fillStyle='#fff';
  ctx.fillStyle=COL.pathRed;ctx.fillRect(20,940,20,3);
  ctx.fillStyle='#fff';ctx.fillText('②队路径',45,944);
  ctx.fillStyle=COL.pathDark;ctx.fillRect(20,955,20,3);
  ctx.fillStyle='#fff';ctx.fillText('①队路径',45,959);
}

function drawCarrot(x,y,color){
  ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(x,y+18);ctx.lineTo(x-8,y-8);ctx.lineTo(x+8,y-8);ctx.closePath();ctx.fill();
  ctx.fillStyle='#228B22';
  ctx.beginPath();
  ctx.ellipse(x-4,y-10,4,8,-.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x+4,y-10,4,8,.3,0,Math.PI*2);ctx.fill();
}

function drawHeart(x,y,s,color){
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(x,y+s*0.7);
  ctx.bezierCurveTo(x-s,y,x-s,y-s*0.7,x,y-s*0.3);
  ctx.bezierCurveTo(x+s,y-s*0.7,x+s,y,x,y+s*0.7);
  ctx.fill();
  // String
  ctx.strokeStyle='#aaa';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x,y-s*0.3);ctx.lineTo(x,y-s*1.2);ctx.stroke();
}

function drawStar(x,y,r,color){
  ctx.fillStyle=color;ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=Math.PI*2*i/5-Math.PI/2;
    const a2=a+Math.PI/5;
    ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
    ctx.lineTo(x+Math.cos(a2)*r*0.4,y+Math.sin(a2)*r*0.4);
  }
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#aaa';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x,y-r);ctx.lineTo(x,y-r*2);ctx.stroke();
}

function drawBunny(x,y){
  // Body
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(x,y+5,18,20,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.beginPath();ctx.arc(x,y-12,14,0,Math.PI*2);ctx.fill();
  // Ears
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(x-8,y-38,5,18,-.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+8,y-38,5,18,.15,0,Math.PI*2);ctx.fill();
  // Inner ears
  ctx.fillStyle='#FFB6C1';
  ctx.beginPath();ctx.ellipse(x-8,y-36,3,12,-.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+8,y-36,3,12,.15,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x-6,y-14,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+6,y-14,3,0,Math.PI*2);ctx.fill();
  // Eye highlights
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x-5,y-15,1.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+7,y-15,1.2,0,Math.PI*2);ctx.fill();
  // Blush
  ctx.fillStyle='rgba(255,150,150,0.5)';
  ctx.beginPath();ctx.ellipse(x-12,y-9,5,3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+12,y-9,5,3,0,0,Math.PI*2);ctx.fill();
  // W mouth
  ctx.strokeStyle='#FF69B4';ctx.lineWidth=1.5;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x-6,y-7);ctx.lineTo(x-3,y-4);ctx.lineTo(x,y-7);ctx.lineTo(x+3,y-4);ctx.lineTo(x+6,y-7);
  ctx.stroke();
}

function drawPortal(x,y,label,color){
  ctx.save();
  ctx.translate(x,y);
  // Vortex
  for(let i=3;i>=0;i--){
    const r=12+i*4;
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.globalAlpha=0.3+i*0.15;
    ctx.beginPath();
    ctx.arc(0,0,r,portalAngle+i*0.5,portalAngle+i*0.5+Math.PI*1.5);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,0,0);
  ctx.restore();
}

function drawEnemy(e){
  const info=ENEMIES[e.type];
  ctx.save();ctx.translate(e.x,e.y);
  
  if(e.frozen>0){ctx.globalAlpha=0.7;ctx.fillStyle='#00BFFF';}
  else if(e.confused>0){ctx.fillStyle='#DA70D6';}
  else{ctx.fillStyle=info.color;}
  
  // Body
  const s=info.size;
  if(e.type==='caterpillar'){
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.arc(-i*s*0.6,0,s*0.6,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(s*0.3,-s*0.2,1.5,0,Math.PI*2);ctx.fill();
  }else if(e.type==='fox'){
    ctx.beginPath();ctx.ellipse(0,0,s,s*0.7,0,0,Math.PI*2);ctx.fill();
    // Ears
    ctx.beginPath();ctx.moveTo(-s*0.5,-s*0.5);ctx.lineTo(-s*0.3,-s);ctx.lineTo(-s*0.1,-s*0.5);ctx.fill();
    ctx.beginPath();ctx.moveTo(s*0.1,-s*0.5);ctx.lineTo(s*0.3,-s);ctx.lineTo(s*0.5,-s*0.5);ctx.fill();
    // Tail
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-s,s*0.2,s*0.3,0,Math.PI*2);ctx.fill();
  }else if(e.type==='bear'){
    ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-s*0.7,-s*0.7,s*0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(s*0.7,-s*0.7,s*0.3,0,Math.PI*2);ctx.fill();
  }else if(e.type==='eagle'){
    ctx.beginPath();ctx.ellipse(0,0,s,s*0.5,0,0,Math.PI*2);ctx.fill();
    // Wings
    const wingFlap=Math.sin(frameCount*0.2)*s*0.3;
    ctx.beginPath();ctx.moveTo(-s*0.3,0);ctx.lineTo(-s*1.2,-s*0.5+wingFlap);ctx.lineTo(-s*0.5,s*0.2);ctx.fill();
    ctx.beginPath();ctx.moveTo(s*0.3,0);ctx.lineTo(s*1.2,-s*0.5+wingFlap);ctx.lineTo(s*0.5,s*0.2);ctx.fill();
  }else if(e.type==='wolf'){
    ctx.beginPath();ctx.ellipse(0,0,s,s*0.8,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(-s*0.6,-s*0.6);ctx.lineTo(-s*0.4,-s*1.1);ctx.lineTo(-s*0.2,-s*0.6);ctx.fill();
    ctx.beginPath();ctx.moveTo(s*0.2,-s*0.6);ctx.lineTo(s*0.4,-s*1.1);ctx.lineTo(s*0.6,-s*0.6);ctx.fill();
    // Crown for boss
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.moveTo(-s*0.5,-s*0.8);ctx.lineTo(-s*0.3,-s*1.3);ctx.lineTo(0,-s*0.9);ctx.lineTo(s*0.3,-s*1.3);ctx.lineTo(s*0.5,-s*0.8);ctx.closePath();ctx.fill();
  }
  
  ctx.restore();
  
  // HP bar
  const hpPct=e.hp/e.maxHp;
  if(hpPct<1){
    ctx.fillStyle='#333';ctx.fillRect(e.x-12,e.y-info.size-8,24,4);
    ctx.fillStyle=hpPct>0.5?'#2ECC71':hpPct>0.25?'#F39C12':'#E74C3C';
    ctx.fillRect(e.x-12,e.y-info.size-8,24*hpPct,4);
  }
}

function drawTower(t){
  const w=WEAPONS[t.type];
  ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(w.icon,t.x,t.y);
  // Range circle when selected
  if(t===selectedTowerObj){
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(t.x,t.y,w.range,0,Math.PI*2);ctx.stroke();
  }
  // Cooldown indicator
  if(t.cooldown>0){
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.arc(t.x,t.y,12,0,Math.PI*2);ctx.fill();
  }
}

let selectedTowerObj=null;

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function spawnEnemy(type,route){
  const path=route===1?path1:path2;
  const info=ENEMIES[type];
  enemies.push({
    type,x:path[0].x,y:path[0].y,
    pathIdx:0,path,
    hp:info.hp,maxHp:info.hp,speed:info.speed,
    frozen:0,slowed:0,confused:0,
    route,alive:true,
    reachedEnd:false,
    bounceBack:0
  });
}

function updateEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    
    let spd=e.speed;
    if(e.frozen>0){spd=0;e.frozen--;}
    else if(e.slowed>0){spd*=0.4;e.slowed--;}
    if(e.confused>0){
      e.confused--;
      if(e.bounceBack>0){
        // Move backward
        e.bounceBack--;
        const pi=Math.max(0,e.pathIdx-1);
        const target=e.path[pi];
        const dx=target.x-e.x,dy=target.y-e.y;
        const d=Math.hypot(dx,dy);
        if(d<3){e.pathIdx=pi;}
        else{e.x+=dx/d*spd;e.y+=dy/d*spd;}
        continue;
      }
    }
    
    if(e.pathIdx>=e.path.length-1){
      // Reached end - steal carrot
      e.alive=false;e.reachedEnd=true;
      loseCarrot(e.route);
      continue;
    }
    
    // Check teleport points
    // Path1 index 4→5 (portal1), Path2 index 7→8 (portal2)
    if(e.path===path1 && e.pathIdx===4){
      const pp=portals.p1a;
      if(dist(e,pp)<15){
        e.x=portals.p1b.x;e.y=portals.p1b.y;e.pathIdx=5;
        addParticles(portals.p1a.x,portals.p1a.y,'#4169E1');
        addParticles(portals.p1b.x,portals.p1b.y,'#4169E1');
        continue;
      }
    }
    if(e.path===path2 && e.pathIdx===7){
      const pp=portals.p2a;
      if(dist(e,pp)<15){
        e.x=portals.p2b.x;e.y=portals.p2b.y;e.pathIdx=8;
        addParticles(portals.p2a.x,portals.p2a.y,'#DC143C');
        addParticles(portals.p2b.x,portals.p2b.y,'#DC143C');
        continue;
      }
    }
    
    const target=e.path[e.pathIdx+1];
    const dx=target.x-e.x,dy=target.y-e.y;
    const d=Math.hypot(dx,dy);
    if(d<3){
      e.pathIdx++;
    }else{
      e.x+=dx/d*spd;e.y+=dy/d*spd;
    }
  }
  enemies=enemies.filter(e=>e.alive);
}

function updateTowers(){
  for(const t of towers){
    if(t.cooldown>0){t.cooldown--;continue;}
    const w=WEAPONS[t.type];
    // Find target in range
    let target=null;
    let minDist=Infinity;
    for(const e of enemies){
      if(!e.alive)continue;
      const d=dist(t,e);
      if(d<w.range&&d<minDist){minDist=d;target=e;}
    }
    if(!target)continue;
    t.cooldown=w.rate;
    
    switch(w.type){
      case'single':
        projectiles.push({x:t.x,y:t.y,tx:target.x,ty:target.y,target,damage:w.damage,speed:4,type:'bullet'});
        break;
      case'freeze':
        if(dist(t,target)<w.range)target.frozen=w.dur;
        addParticles(target.x,target.y,'#00BFFF');
        break;
      case'aoe':
        projectiles.push({x:t.x,y:t.y,tx:target.x,ty:target.y,damage:w.damage,speed:3,type:'aoe',aoeR:w.aoeR});
        break;
      case'slow':
        for(const e of enemies){if(dist(t,e)<w.range)e.slowed=w.dur;}
        addParticles(t.x,t.y,'#8B4513');
        break;
      case'bounce':
        if(dist(t,target)<w.range){
          target.hp-=w.damage;
          target.confused=60;target.bounceBack=30;
          addParticles(target.x,target.y,'#FFD700');
        }
        break;
      case'confuse':
        if(dist(t,target)<w.range){
          target.confused=w.dur;target.bounceBack=w.dur;
          addParticles(target.x,target.y,'#FF69B4');
        }
        break;
    }
  }
}

function updateProjectiles(){
  for(const p of projectiles){
    const dx=p.tx-p.x,dy=p.ty-p.y;
    const d=Math.hypot(dx,dy);
    if(d<5){
      if(p.type==='bullet'&&p.target&&p.target.alive){
        p.target.hp-=p.damage;
        if(p.target.hp<=0){p.target.alive=false;gold+=ENEMIES[p.target.type].reward;addParticles(p.target.x,p.target.y,'#FFD700');}
      }else if(p.type==='aoe'){
        for(const e of enemies){
          if(dist({x:p.tx,y:p.ty},e)<p.aoeR){
            e.hp-=p.damage;
            if(e.hp<=0){e.alive=false;gold+=ENEMIES[e.type].reward;addParticles(e.x,e.y,'#FFD700');}
          }
        }
        addParticles(p.tx,p.ty,'#FF6347');
      }
      p.done=true;
    }else{
      p.x+=dx/d*p.speed;p.y+=dy/d*p.speed;
    }
  }
  projectiles=projectiles.filter(p=>!p.done);
}

function addParticles(x,y,color){
  for(let i=0;i<6;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:30,color});
  }
}

function updateParticles(){
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.life--;
  }
  particles=particles.filter(p=>p.life>0);
}

function drawProjectiles(){
  for(const p of projectiles){
    ctx.fillStyle=p.type==='aoe'?'#FF6347':'#DEB887';
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function loseCarrot(route){
  lives--;
  if(lives<=0){endGame(false);}
  updateUI();
}

let carrotALost=false,carrotBLost=false;
function loseCarrot(route){
  if(route===2&&!carrotALost){carrotALost=true;lives--;}
  else if(route===1&&!carrotBLost){carrotBLost=true;lives--;}
  else{lives--;}
  if(lives<=0)endGame(false);
  updateUI();
}

function updateUI(){
  document.getElementById('goldDisplay').textContent='🪙 '+gold;
  document.getElementById('waveDisplay').textContent='波次 '+wave+'/6';
  let lifeStr='';
  if(!carrotALost)lifeStr+='🥕';else lifeStr+='💔';
  if(!carrotBLost)lifeStr+='🥕';else lifeStr+='💔';
  document.getElementById('lifeDisplay').textContent=lifeStr;
  // Update weapon buttons
  document.querySelectorAll('.weaponBtn').forEach(btn=>{
    const wi=+btn.dataset.w;
    btn.classList.toggle('disabled',gold<WEAPONS[wi].cost);
    btn.classList.toggle('selected',wi===selectedWeapon);
  });
}

function startWave(){
  if(wave>=6)return;
  wave++;
  const waveData=WAVES[wave-1];
  spawnQueue=[];
  for(const group of waveData){
    for(let i=0;i<group.count;i++){
      spawnQueue.push({type:group.type,route:group.route,delay:i*60+Math.random()*20});
    }
  }
  spawnQueue.sort((a,b)=>a.delay-b.delay);
  spawnTimer=0;spawning=true;waveActive=true;
  showWaveInfo('第 '+wave+' 波！');
  updateUI();
}

function showWaveInfo(text){
  const el=document.getElementById('waveInfo');
  el.textContent=text;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',2000);
}

function checkWaveEnd(){
  if(!waveActive)return;
  if(spawnQueue.length===0&&enemies.length===0){
    waveActive=false;spawning=false;
    if(wave>=6){
      endGame(true);
    }else{
      setTimeout(startWave,3000);
    }
  }
}

function endGame(won){
  gameState='end';
  const title=document.getElementById('endTitle');
  const msg=document.getElementById('endMsg');
  if(won){
    if(lives===2){title.textContent='🏆 完美通关！';msg.textContent='两根胡萝卜都保住了！';}
    else{title.textContent='🎉 胜利！';msg.textContent='保住了一根胡萝卜！';}
    title.style.color='#FFD700';
  }else{
    title.textContent='💀 失败...';msg.textContent='胡萝卜都被偷走了！';
    title.style.color='#E74C3C';
  }
  document.getElementById('endScreen').style.display='flex';
}

function resetGame(){
  gold=30;wave=0;lives=2;enemies=[];towers=[];projectiles=[];particles=[];
  frameCount=0;goldTimer=0;waveActive=false;spawning=false;spawnQueue=[];
  selectedWeapon=-1;carrotALost=false;carrotBLost=false;selectedTowerObj=null;
  for(const s of slots)s.tower=null;
  document.getElementById('endScreen').style.display='none';
  gameState='playing';
  updateUI();
  setTimeout(startWave,1000);
}

// Input handling
document.querySelectorAll('.weaponBtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const wi=+btn.dataset.w;
    if(gold<WEAPONS[wi].cost)return;
    selectedWeapon=selectedWeapon===wi?-1:wi;
    updateUI();
  });
});

C.addEventListener('click',e=>{
  if(gameState!=='playing')return;
  const rect=C.getBoundingClientRect();
  const scaleX=W/rect.width,scaleY=H/rect.height;
  const mx=(e.clientX-rect.left)*scaleX;
  const my=(e.clientY-rect.top)*scaleY;
  
  if(selectedWeapon>=0){
    // Find closest empty slot
    let best=null,bestD=30;
    for(const s of slots){
      if(s.tower)continue;
      const d=dist({x:mx,y:my},s);
      if(d<bestD){bestD=d;best=s;}
    }
    if(best&&gold>=WEAPONS[selectedWeapon].cost){
      gold-=WEAPONS[selectedWeapon].cost;
      const t={x:best.x,y:best.y,type:selectedWeapon,cooldown:0};
      towers.push(t);
      best.tower=t;
      selectedWeapon=-1;
      updateUI();
    }
  }
});

function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(gameState!=='playing')return;
  frameCount++;
  portalAngle+=0.05;
  
  // Gold income
  goldTimer++;
  if(goldTimer>=600){goldTimer=0;gold+=5;updateUI();}
  
  // Spawn enemies
  if(spawning&&spawnQueue.length>0){
    spawnTimer++;
    while(spawnQueue.length>0&&spawnTimer>=spawnQueue[0].delay){
      const s=spawnQueue.shift();
      spawnEnemy(s.type,s.route);
    }
    if(spawnQueue.length===0)spawning=false;
  }
  
  updateEnemies();
  updateTowers();
  updateProjectiles();
  updateParticles();
  checkWaveEnd();
  
  // Draw
  ctx.clearRect(0,0,W,H);
  
  // Sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,'#4A2810');skyGrad.addColorStop(0.3,'#6B3A1F');skyGrad.addColorStop(1,'#2D1508');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H);
  
  drawCastle();
  
  // Draw towers
  for(const t of towers)drawTower(t);
  // Draw enemies
  for(const e of enemies)if(e.alive)drawEnemy(e);
  drawProjectiles();
  drawParticles();
  
  updateUI();
}

// Start/restart
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('startScreen').style.display='none';
  gameState='playing';
  resetGame();
});
document.getElementById('restartBtn').addEventListener('click',resetGame);

initPaths();
gameLoop();
</script>
</body>
